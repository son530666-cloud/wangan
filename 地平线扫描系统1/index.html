<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地平线扫描系统</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <nav class="top-nav">
        <div class="logo">电网能源地平线扫描系统</div>
        <ul class="nav-links">
            <li><a href="index.html" class="active">首页</a></li>
            <li><a href="pages/awareness.html">态势感知</a></li>
            <li><a href="pages/analysis.html">技术分析</a></li>
        </ul>
    </nav>

    <div class="main-container">
        <!-- 左侧筛选面板 -->
        <aside class="left-panel">
            <div class="panel-header">
                <h3>筛选条件</h3>
            </div>
            <div class="filter-section">
                <h4>技术分类</h4>
                <div class="filter-group" id="category-filters">
                    <label class="filter-item">
                        <input type="checkbox" value="transmission" checked>
                        <span class="checkmark"></span>
                        <span class="label-text">输电技术</span>
                    </label>
                    <label class="filter-item">
                        <input type="checkbox" value="storage" checked>
                        <span class="checkmark"></span>
                        <span class="label-text">储能技术</span>
                    </label>
                    <label class="filter-item">
                        <input type="checkbox" value="renewable" checked>
                        <span class="checkmark"></span>
                        <span class="label-text">新能源</span>
                    </label>
                    <label class="filter-item">
                        <input type="checkbox" value="digital" checked>
                        <span class="checkmark"></span>
                        <span class="label-text">数字化电网</span>
                    </label>
                    <label class="filter-item">
                        <input type="checkbox" value="hydrogen" checked>
                        <span class="checkmark"></span>
                        <span class="label-text">氢能</span>
                    </label>
                    <label class="filter-item">
                        <input type="checkbox" value="nuclear" checked>
                        <span class="checkmark"></span>
                        <span class="label-text">核电</span>
                    </label>
                </div>
            </div>
            <div class="filter-section">
                <h4>变革性技术</h4>
                <div class="filter-group" id="tech-filters">
                    <label class="filter-item">
                        <input type="checkbox" value="transformative" checked>
                        <span class="checkmark"></span>
                        <span class="label-text">仅看变革性技术</span>
                    </label>
                </div>
            </div>
            <div class="filter-section">
                <h4>时间范围</h4>
                <div class="filter-group">
                    <select id="time-range" class="custom-select">
                        <option value="all">全部时间</option>
                        <option value="2024">2024年</option>
                        <option value="2025">2025年</option>
                        <option value="2026">2026年预测</option>
                    </select>
                </div>
            </div>
            <div class="stats-summary">
                <div class="stat-item">
                    <span class="stat-number" id="tech-count">0</span>
                    <span class="stat-label">技术总数</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="country-count">0</span>
                    <span class="stat-label">覆盖国家</span>
                </div>
            </div>
        </aside>

        <!-- 中间3D地图 -->
        <section class="center-panel">
            <div id="globe-container"></div>
            <div class="globe-controls">
                <button id="rotate-toggle" class="control-btn">暂停旋转</button>
                <button id="reset-view" class="control-btn">重置视角</button>
            </div>
            <div class="map-legend">
                <div class="legend-item">
                    <span class="legend-dot" style="background:#ff4444"></span>
                    <span>输电技术</span>
                </div>
                <div class="legend-item">
                    <span class="legend-dot" style="background:#44aaff"></span>
                    <span>储能技术</span>
                </div>
                <div class="legend-item">
                    <span class="legend-dot" style="background:#44ff44"></span>
                    <span>新能源</span>
                </div>
                <div class="legend-item">
                    <span class="legend-dot" style="background:#8844ff"></span>
                    <span>数字化电网</span>
                </div>
                <div class="legend-item">
                    <span class="legend-dot" style="background:#ffaa00"></span>
                    <span>氢能</span>
                </div>
                <div class="legend-item">
                    <span class="legend-dot" style="background:#ff44aa"></span>
                    <span>核电</span>
                </div>
            </div>
        </section>

        <!-- 右侧数据面板 -->
        <aside class="right-panel">
            <div class="panel-header">
                <h3>数据概览</h3>
            </div>
            <div class="data-overview" id="data-overview">
                <!-- 动态生成 -->
            </div>

            <div class="panel-header" style="margin-top:20px;">
                <h3>最新动态</h3>
            </div>
            <div class="latest-list" id="latest-list">
                <!-- 动态生成 -->
            </div>
        </aside>
    </div>

    <script src="js/data.js"></script>
    <script src="js/globe.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
