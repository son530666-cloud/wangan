<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术变革扫描模块 - 南网地平线</title>
    <!-- 主 CDN：360 CDN -->
    <script src="https://lib.baomitu.com/echarts/5.4.3/echarts.min.js"></script>
    <!-- 自动检测 + 备用加载 -->
    <script>
        (function() {
            var cdnList = [
                'https://lib.baomitu.com/echarts/5.4.3/echarts.min.js',
                'https://lf9-cdn-tos.bytecdntp.com/cdn/expire-1-M/echarts/5.4.3/echarts.min.js',
                'https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js'
            ];
            var tried = 0;
            function checkAndLoad() {
                if (typeof echarts !== 'undefined') return;
                tried++;
                if (tried < cdnList.length) {
                    var s = document.createElement('script');
                    s.src = cdnList[tried];
                    s.onerror = function() { setTimeout(checkAndLoad, 500); };
                    document.head.appendChild(s);
                }
            }
            setTimeout(checkAndLoad, 2000);
        })();
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #0d1f3c 50%, #0a1628 100%);
            color: #e0e6ed;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
        }

        /* 页面标题 */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding: 16px 0;
            border-bottom: 1px solid rgba(64, 169, 255, 0.2);
        }

        .page-header h1 {
            font-size: 18px;
            font-weight: 700;
            color: #40a9ff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-header h1::before {
            content: '';
            width: 4px;
            height: 18px;
            background: linear-gradient(180deg, #40a9ff, #0099ff);
            border-radius: 2px;
        }

        .page-header .subtitle {
            font-size: 13px;
            color: #8896b3;
            margin-top: 4px;
            margin-left: 14px;
        }

        /* 通用卡片样式 */
        .section-card {
            background: rgba(16, 30, 60, 0.6);
            border: 1px solid rgba(64, 169, 255, 0.15);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .section-card:hover {
            border-color: rgba(64, 169, 255, 0.3);
            box-shadow: 0 8px 32px rgba(64, 169, 255, 0.1);
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: #40a9ff;
            margin-bottom: 18px;
            padding-left: 12px;
            border-left: 4px solid #40a9ff;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .section-title .badge {
            font-size: 13px;
            padding: 3px 12px;
            border-radius: 12px;
            background: rgba(64, 169, 255, 0.15);
            color: #40a9ff;
            border: 1px solid rgba(64, 169, 255, 0.3);
        }

        /* ========== 第一部分：技术预警模块 ========== */
        .warning-section {
            background: linear-gradient(135deg, rgba(255, 77, 79, 0.08) 0%, rgba(16, 30, 60, 0.6) 100%);
            border-color: rgba(255, 77, 79, 0.3);
        }

        .warning-section .section-title {
            color: #ff4d4f;
            border-left-color: #ff4d4f;
        }

        .warning-section .section-title .badge {
            background: rgba(255, 77, 79, 0.15);
            color: #ff4d4f;
            border-color: rgba(255, 77, 79, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .warning-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .warning-card {
            background: linear-gradient(135deg, rgba(255, 77, 79, 0.1) 0%, rgba(16, 30, 60, 0.4) 100%);
            border: 1px solid rgba(255, 77, 79, 0.25);
            border-radius: 10px;
            padding: 16px;
            display: flex;
            align-items: flex-start;
            gap: 14px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .warning-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #ff4d4f, #ff7875);
        }

        .warning-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 77, 79, 0.15);
            border-color: rgba(255, 77, 79, 0.4);
        }

        .warning-icon {
            width: 44px;
            height: 44px;
            background: rgba(255, 77, 79, 0.15);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border: 1px solid rgba(255, 77, 79, 0.2);
            object-fit: contain;
            padding: 8px;
        }

        .warning-content {
            flex: 1;
            min-width: 0;
        }

        .warning-name {
            font-size: 15px;
            font-weight: 600;
            color: #ffccc7;
            margin-bottom: 6px;
        }

        .warning-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .warning-score {
            font-size: 20px;
            font-weight: 700;
            color: #ff4d4f;
        }

        .warning-tag {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(255, 77, 79, 0.1);
            color: #ff7875;
            border: 1px solid rgba(255, 77, 79, 0.2);
        }

        .warning-date {
            font-size: 12px;
            color: #8896b3;
            margin-top: 6px;
        }

        /* ========== 第二部分：雷达图 + 新技术清单 ========== */
        .scan-section {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 20px;
            align-items: stretch;
            height: 760px;
            max-height: calc(100vh - 220px);
        }

        .scan-section > .section-card {
            padding: 16px;
        }

        .scan-section .section-title {
            margin-bottom: 16px;
        }

        .radar-container {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #radarChart {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .radar-chart-wrap {
            position: relative;
            width: 100%;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        /* 扫描动效 */
        .radar-scan-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            transform: translate(-50%, -50%);
            pointer-events: none;
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(57, 255, 20, 0.4);
            opacity: 0;
        }

        .radar-scan-effect.scanning {
            animation: radarPulse 2.5s ease-out infinite;
        }

        @keyframes radarPulse {
            0% { width: 0; height: 0; opacity: 0.8; box-shadow: 0 0 0 0 rgba(57, 255, 20, 0.5); }
            50% { opacity: 0.4; }
            100% { width: 480px; height: 480px; opacity: 0; box-shadow: 0 0 0 0 rgba(57, 255, 20, 0); }
        }

        @keyframes radarRotate {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes dataPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.3); }
        }

        /* 工具栏 */
        .radar-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding: 0 4px;
        }

        .last-scan-time {
            font-size: 13px;
            color: #8896b3;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .scan-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: linear-gradient(135deg, rgba(57, 255, 20, 0.15), rgba(57, 255, 20, 0.05));
            border: 1px solid rgba(57, 255, 20, 0.3);
            border-radius: 6px;
            color: #39ff14;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .scan-btn:hover {
            background: linear-gradient(135deg, rgba(57, 255, 20, 0.25), rgba(57, 255, 20, 0.1));
            border-color: #39ff14;
            box-shadow: 0 0 12px rgba(57, 255, 20, 0.2);
        }

        .scan-btn.scanning {
            pointer-events: none;
            opacity: 0.7;
            animation: btnPulse 1s ease-in-out infinite;
        }

        @keyframes btnPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(57, 255, 20, 0.3); }
            50% { box-shadow: 0 0 12px 4px rgba(57, 255, 20, 0.1); }
        }

        .scan-btn-icon {
            font-size: 14px;
            display: inline-block;
        }

        .scan-btn.scanning .scan-btn-icon {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes fallbackRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes fallbackBreath {
            0%, 100% { transform: scale(1); opacity: 0.95; }
            50% { transform: scale(1.35); opacity: 0.65; }
        }

        /* ========== 雷达图技术点 + 维度标签 + 扫描线（荧光绿版） ========== */
        .radar-chart-wrap { position: relative; overflow: hidden; }

        .radar-tech-dot {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            z-index: 10;
            pointer-events: auto;
            animation: radarBreath 2.2s ease-in-out infinite;
        }
        .radar-tech-dot.new-tech-dot { animation-delay: 0s; }
        .radar-tech-dot.old-tech-dot { animation-delay: 1.1s; }
        .radar-tech-dot-inner {
            position: absolute;
            top: 50%; left: 50%;
            width: 7px; height: 7px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            box-shadow: 0 0 8px 2px currentColor;
        }
        .radar-tech-dot-glow {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            background: radial-gradient(circle, currentColor 0%, transparent 70%);
            opacity: 0.55;
        }
        @keyframes radarBreath {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.95; }
            50% { transform: translate(-50%, -50%) scale(1.35); opacity: 0.65; }
        }

        .radar-dim-label {
            position: absolute;
            font-size: 18px;
            font-weight: 600;
            color: #39ff14;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
            text-shadow: 0 0 10px rgba(57,255,20,0.5);
            animation: dimBlink 3s ease-in-out infinite;
            white-space: nowrap;
        }
        .radar-dim-label:nth-of-type(1) { animation-delay: 0s; }
        .radar-dim-label:nth-of-type(2) { animation-delay: 0.75s; }
        .radar-dim-label:nth-of-type(3) { animation-delay: 1.5s; }
        .radar-dim-label:nth-of-type(4) { animation-delay: 2.25s; }
        @keyframes dimBlink {
            0%, 100% { opacity: 1; text-shadow: 0 0 14px rgba(57,255,20,0.8); color: #39ff14; }
            50% { opacity: 0.5; text-shadow: 0 0 4px rgba(57,255,20,0.2); color: #6aff47; }
        }

        .radar-scan-sector {
            position: absolute;
            top: 50%; left: 50%;
            pointer-events: none;
            z-index: 4;
            transform-origin: 0 0;
            animation: scanRotate 4s linear infinite;
        }

        .radar-tooltip-el {
            position: absolute;
            display: none;
            background: rgba(16,30,60,0.95);
            border: 1px solid rgba(57,255,20,0.35);
            border-radius: 6px;
            padding: 8px 14px;
            color: #e0e6ed;
            font-size: 14px;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        .radar-legend {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 8px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #a0aec0;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .legend-dot.new-tech {
            background: #40a9ff;
            box-shadow: 0 0 8px rgba(64, 169, 255, 0.6);
        }

        .legend-dot.old-tech {
            background: #ffa940;
            box-shadow: 0 0 8px rgba(255, 169, 64, 0.6);
        }

        .new-tech-panel {
            display: flex;
            flex-direction: column;
            max-height: none;
            overflow: hidden;
        }

        .new-tech-panel .section-title {
            flex-shrink: 0;
        }

        /* ========== 滑动组件 ========== */
        .slider-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .slider-track {
            display: flex;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            gap: 12px;
            flex: 1;
            min-height: 0;
        }

        .slider-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            background: rgba(16, 30, 60, 0.9);
            border: 1px solid rgba(64, 169, 255, 0.3);
            border-radius: 50%;
            color: #40a9ff;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: all 0.2s;
            user-select: none;
        }

        .slider-arrow:hover {
            background: rgba(64, 169, 255, 0.2);
            border-color: #40a9ff;
        }

        .slider-arrow.prev { left: 4px; }
        .slider-arrow.next { right: 4px; }
        .slider-arrow.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }

        .slider-dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 12px;
        }

        .slider-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(64, 169, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s;
        }

        .slider-dot.active {
            background: #40a9ff;
            width: 18px;
            border-radius: 3px;
        }

        /* 新技术统计摘要 */
        .newtech-summary {
            margin-top: 10px;
            padding: 8px 12px;
            background: rgba(57, 255, 20, 0.04);
            border: 1px solid rgba(57, 255, 20, 0.12);
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .summary-item {
            flex: 1;
            text-align: center;
            padding: 4px 0;
        }

        .summary-item:not(:last-child) {
            border-right: 1px solid rgba(57, 255, 20, 0.1);
        }

        .summary-label {
            font-size: 13px;
            color: #8896b3;
            margin-bottom: 4px;
        }

        .summary-value {
            font-size: 17px;
            font-weight: 700;
            color: #39ff14;
        }

        .summary-sub {
            font-size: 12px;
            color: #8896b3;
            margin-top: 2px;
        }

        /* ========== 新技术卡片（滑动版） ========== */
        .tech-card {
            flex: 0 0 100%;
            background: rgba(64, 169, 255, 0.05);
            border: 1px solid rgba(64, 169, 255, 0.12);
            border-radius: 10px;
            padding: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .tech-card:hover {
            background: rgba(64, 169, 255, 0.08);
            border-color: rgba(64, 169, 255, 0.3);
        }

        .tech-card.new-highlight {
            border-left: 3px solid #40a9ff;
        }

        .tech-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .tech-card-name {
            font-size: 17px;
            font-weight: 600;
            color: #e0e6ed;
        }

        .tech-card-score-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tech-card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .tech-meta-cat {
            color: #40a9ff;
            background: rgba(64, 169, 255, 0.1);
            border: 1px solid rgba(64, 169, 255, 0.2);
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
        }

        .tech-meta-time {
            color: #8896b3;
            font-size: 13px;
        }

        .tech-card-score {
            font-size: 18px;
            font-weight: 700;
            color: #40a9ff;
            background: rgba(64, 169, 255, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .tech-card-trend {
            font-size: 13px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .tech-card-trend.up {
            background: rgba(255, 77, 79, 0.1);
            color: #ff4d4f;
        }

        .tech-card-trend.down {
            background: rgba(115, 209, 61, 0.1);
            color: #73d13d;
        }

        .tech-card-radar {
            margin: 14px 0;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            padding: 16px;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .tech-card-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .tech-tag {
            font-size: 13px;
            padding: 3px 10px;
            border-radius: 4px;
            background: rgba(138, 180, 248, 0.1);
            color: #8ab4f8;
            border: 1px solid rgba(138, 180, 248, 0.15);
        }

        .tech-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: #8896b3;
        }

        .tech-card-time {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .new-badge {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(64, 169, 255, 0.15);
            color: #40a9ff;
            border: 1px solid rgba(64, 169, 255, 0.25);
        }

        /* ========== 第三部分：历史技术清单 ========== */
        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        .history-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 16px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .history-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(64, 169, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .history-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .history-card-name {
            font-size: 15px;
            font-weight: 600;
            color: #e0e6ed;
        }

        .history-card-score {
            font-size: 16px;
            font-weight: 700;
        }

        .history-card-score.high {
            color: #ff4d4f;
        }

        .history-card-score.medium {
            color: #ffa940;
        }

        .history-card-score.low {
            color: #73d13d;
        }

        .history-card-desc {
            font-size: 13px;
            color: #8896b3;
            line-height: 1.6;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .history-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .history-card-meta {
            display: flex;
            gap: 12px;
            font-size: 12px;
            color: #8896b3;
        }

        .history-status {
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 4px;
        }

        .history-status.tracking {
            background: rgba(64, 169, 255, 0.1);
            color: #40a9ff;
            border: 1px solid rgba(64, 169, 255, 0.2);
        }

        .history-status.mature {
            background: rgba(115, 209, 61, 0.1);
            color: #73d13d;
            border: 1px solid rgba(115, 209, 61, 0.2);
        }

        .history-status.obsolete {
            background: rgba(140, 140, 140, 0.1);
            color: #8c8c8c;
            border: 1px solid rgba(140, 140, 140, 0.2);
        }

        /* ========== 历史技术清单（融合图片维度） ========== */
        .history-grid {

    <div class="container">
        <!-- 页面标题 -->
        <div class="page-header">

        </div>

            <div class="section-title">
                <span>🔥 高分技术预警（分值 ≥ 90）</span>

                    <div class="radar-scan-effect" id="radarScanEffect"></div>

        // ========== 迷你四维雷达图生成器（纯SVG） ==========
        function getMiniRadar(dim) {
            const cx = 100, cy = 82, r = 46;
            const scores = [dim.novelty, dim.value, dim.relevance, dim.prospect];
            const labels = ['新颖性', '价值性', '关联性', '前瞻性'];
            const angleStep = (Math.PI * 2) / 4;
            const startAngle = -Math.PI / 2; // 从顶部开始

            // 计算四个顶点坐标
            function getPoint(score, idx) {
                const angle = startAngle + idx * angleStep;
                const ratio = score / 100;
                return { x: cx + r * ratio * Math.cos(angle), y: cy + r * ratio * Math.sin(angle) };
            }

            const points = scores.map((s, i) => getPoint(s, i));
            const polyPoints = points.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');

            // 生成背景网格
            let gridPolys = '';
            [0.25, 0.5, 0.75, 1.0].forEach((ratio, idx) => {
                const gPoints = [0, 1, 2, 3].map(i => {
                    const angle = startAngle + i * angleStep;
                    return `${cx + r * ratio * Math.cos(angle)},${cy + r * ratio * Math.sin(angle)}`;
                }).join(' ');
                const opacity = 0.05 + idx * 0.03;
                gridPolys += `<polygon points="${gPoints}" fill="rgba(57,255,20,${opacity})" stroke="rgba(57,255,20,0.15)" stroke-width="0.5"/>`;
            });

            // 轴线
            let axes = '';
            [0, 1, 2, 3].forEach(i => {
                const angle = startAngle + i * angleStep;
                const x2 = cx + r * Math.cos(angle);
                const y2 = cy + r * Math.sin(angle);
                axes += `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="rgba(57,255,20,0.2)" stroke-width="0.5"/>`;
            });

            // 标签位置（稍远一点）
            const labelDist = r + 16;
            const labelPoints = labels.map((text, i) => {
                const angle = startAngle + i * angleStep;
                const x = cx + labelDist * Math.cos(angle);
                const y = cy + labelDist * Math.sin(angle);
                const anchor = i === 0 ? 'middle' : i === 1 ? 'start' : i === 2 ? 'middle' : 'end';
                return `<text x="${x}" y="${y + 4}" text-anchor="${anchor}" fill="#8896b3" font-size="10" font-family="system-ui, sans-serif">${text}</text>`;
            }).join('');

            // 数据点圆点
            const dots = points.map((p, i) => {
                const color = ['#39ff14', '#73d13d', '#ffa940', '#ff4d4f'][i];
                return `<circle cx="${p.x}" cy="${p.y}" r="3" fill="${color}" stroke="#0a1628" stroke-width="1.5"/>`;
            }).join('');

            return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" style="width:100%;height:auto;max-height:160px;">${gridPolys}${axes}<polygon points="${polyPoints}" fill="rgba(57,255,20,0.15)" stroke="#39ff14" stroke-width="1.5" stroke-linejoin="round"/>${dots}${labelPoints}</svg>`;
        }

        // ========== 纯SVG降级雷达图（无ECharts依赖） ==========
        function renderFallbackRadar(container) {
            const W=600, H=480, CX=300, CY=240, R=170;
            const dims=['技术新颖性','技术价值性','技术关联性','技术前瞻性'];
            const angles=[-Math.PI/2,0,Math.PI/2,Math.PI];
            const newTechList=weeklyTechs.filter(t=>t.isNew);

            // 动态归一化：让所有技术均匀分布在雷达图内
            const allRawX=weeklyTechs.map(t=>(t.dimensions4.value-t.dimensions4.prospect)/2);
            const allRawY=weeklyTechs.map(t=>(t.dimensions4.relevance-t.dimensions4.novelty)/2);
            const maxAbsX=Math.max(...allRawX.map(Math.abs),1);
            const maxAbsY=Math.max(...allRawY.map(Math.abs),1);

            function calcPos(d4){
                const rawX=(d4.value-d4.prospect)/2, rawY=(d4.relevance-d4.novelty)/2;
                return {x:CX+(rawX/maxAbsX)*R*0.85, y:CY+(rawY/maxAbsY)*R*0.85};
            }

            // 背景网格（同心圆）
            let grid='';
            [0.25,0.5,0.75,1].forEach((ratio,idx)=>{
                const op=0.03+idx*0.02;
                const fillOp = 0.04 + idx * 0.03;
                grid+=`<circle cx="${CX}" cy="${CY}" r="${(R*ratio).toFixed(1)}" fill="rgba(57,255,20,${fillOp})" stroke="rgba(57,255,20,0.20)" stroke-width="0.5"/>`;
            });
            // 中心填充区域（最内层半透明圆）
            grid+=`<circle cx="${CX}" cy="${CY}" r="${(R*0.25).toFixed(1)}" fill="rgba(57,255,20,0.03)" stroke="none"/>`;
            // 轴线
            let axes='';
            angles.forEach(a=>{
                const x=CX+R*Math.cos(a), y=CY+R*Math.sin(a);
                axes+=`<line x1="${CX}" y1="${CY}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="rgba(57,255,20,0.15)" stroke-width="0.5"/>`;
            });
            // 维度标签（带闪烁）
            let labels='';
            const labelDist=R+30;
            angles.forEach((a,i)=>{
                const x=CX+labelDist*Math.cos(a), y=CY+labelDist*Math.sin(a);
                labels+=`<text x="${x.toFixed(1)}" y="${(y+5).toFixed(1)}" text-anchor="middle" fill="#39ff14" font-size="12" font-weight="600" font-family="system-ui,sans-serif" style="animation:dimBlink 3s ease-in-out infinite;animation-delay:${i*0.75}s;text-shadow:0 0 10px rgba(57,255,20,0.5);">${dims[i]}</text>`;
            });
            // 技术点（SMIL 半径/透明度动画，避免 CSS transform 位移 bug）
            let dots='';
            weeklyTechs.forEach((tech,idx)=>{
                const pos=calcPos(tech.dimensions4);
                const isNew=tech.isNew, color=isNew?'#40a9ff':'#ffa940';
                const newIdx=newTechList.findIndex(t=>t.id===tech.id);
                const dly=(idx*0.2).toFixed(1);
                dots+=`<g transform="translate(${pos.x.toFixed(1)},${pos.y.toFixed(1)})" style="cursor:pointer;"
                    class="fallback-tech-dot" data-name="${tech.name}" data-cat="${tech.category}" data-score="${tech.score}" data-isnew="${isNew}" data-newidx="${newIdx}"
                    onclick="fallbackDotClick(this)" onmouseenter="fallbackDotEnter(this,event)" onmouseleave="fallbackDotLeave()" onmousemove="fallbackDotMove(this,event)"
                >
                    <circle fill="url(#dotGlow${isNew?'N':'O'})" opacity="0.5">
                        <animate attributeName="r" values="10;16;10" dur="2.2s" repeatCount="indefinite" begin="${dly}s" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1"/>
                        <animate attributeName="opacity" values="0.5;0.85;0.5" dur="2.2s" repeatCount="indefinite" begin="${dly}s" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1"/>
                    </circle>
                    <circle fill="${color}" stroke="#0a1628" stroke-width="1.5">
                        <animate attributeName="r" values="4;5.5;4" dur="2.2s" repeatCount="indefinite" begin="${dly}s" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1"/>
                    </circle>
                </g>`;
            });

            container.innerHTML=`
                <svg id="fallbackRadarSvg" viewBox="0 0 ${W} ${H}" style="width:100%;height:100%;display:block;">
                    <defs>
                        <linearGradient id="scanGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="rgba(57,255,20,0)"/><stop offset="100%" stop-color="rgba(57,255,20,0.50)"/></linearGradient>
                        <radialGradient id="dotGlowN"><stop offset="0%" stop-color="rgba(64,169,255,0.6)"/><stop offset="100%" stop-color="rgba(64,169,255,0)"/></radialGradient>
                        <radialGradient id="dotGlowO"><stop offset="0%" stop-color="rgba(255,169,64,0.6)"/><stop offset="100%" stop-color="rgba(255,169,64,0)"/></radialGradient>
                    </defs>
                    ${grid}${axes}${labels}${dots}
                    <g style="transform-origin:${CX}px ${CY}px;animation:fallbackRotate 4s linear infinite;">
                        <path d="M ${CX} ${CY} L ${(CX+R*Math.cos(-0.35)).toFixed(1)} ${(CY+R*Math.sin(-0.35)).toFixed(1)} A ${R} ${R} 0 0 1 ${(CX+R*Math.cos(0.35)).toFixed(1)} ${(CY+R*Math.sin(0.35)).toFixed(1)} Z" fill="url(#scanGrad)" opacity="0.5" pointer-events="none"/>
                    </g>
                </svg>
                <div id="fallbackRadarTooltip" class="radar-tooltip-el"></div>
            `;
            container.style.position='relative';

            window._fallbackScan=function(){
                const g=container.querySelector('#fallbackRadarSvg > g:last-child');
                if(g) g.style.animationDuration='0.8s';
                container.querySelectorAll('.fallback-tech-dot').forEach(d=>{ d.style.animationDuration='0.6s'; });
                setTimeout(()=>{
                    if(g) g.style.animationDuration='4s';
                    container.querySelectorAll('.fallback-tech-dot').forEach(d=>{ d.style.animationDuration='2.2s'; });
                },2500);
            };
        }

        // 降级方案点交互（全局函数供SVG onclick调用）
        function fallbackDotEnter(el,e){
            const ttip=document.getElementById('fallbackRadarTooltip');
            if(!ttip) return;
            const tech = weeklyTechs.find(t => t.name === el.dataset.name);
            const ev = tech?.dimensionEvidence || {};
            const d4 = tech?.dimensions4 || {};
            const dimRows = [
                { key: 'novelty',   label: '新颖性', color: '#ff4d4f', barColor: 'linear-gradient(90deg,#ff4d4f,#ff7875)' },
                { key: 'prospect',  label: '前瞻性', color: '#ffa940', barColor: 'linear-gradient(90deg,#ffa940,#ffc53d)' },
                { key: 'relevance', label: '关联性', color: '#40a9ff', barColor: 'linear-gradient(90deg,#40a9ff,#69c0ff)' },
                { key: 'value',     label: '价值性', color: '#73d13d', barColor: 'linear-gradient(90deg,#73d13d,#95de64)' }
            ].map(dim => {
                const score = ev[dim.key]?.score || d4[dim.key] || 0;
                return buildDimWithSubsHtml(dim.key, dim.label, dim.color, dim.barColor, tech.name, score);
            }).join('');
            ttip.innerHTML=`
                <div style="font-weight:600;margin-bottom:6px;font-size:15px;">${el.dataset.name}</div>
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
                    <span style="color:#8896b3;">${el.dataset.cat}</span>
                    <span style="color:#40a9ff;font-weight:700;">${el.dataset.score}分</span>
                    <span style="color:#8896b3;font-size:12px;">${el.dataset.isnew==='true'?'本周新识别':'持续追踪'}</span>
                </div>
                ${dimRows}
                <div style="margin-top:6px;font-size:11px;color:#8896b3;">点击查看详细评分依据</div>`;
            ttip.style.display='block';
            ttip.style.width='260px';
            ttip.style.whiteSpace='normal';

        }
        function fallbackDotMove(el,e){
            const ttip=document.getElementById('fallbackRadarTooltip');
            if(!ttip) return;
            const rect=el.closest('.radar-chart-wrap, #radarChart').getBoundingClientRect();
            ttip.style.left=(e.clientX-rect.left+12)+'px';
            ttip.style.top=(e.clientY-rect.top-8)+'px';
        }
        function fallbackDotLeave(){
            const ttip=document.getElementById('fallbackRadarTooltip');
            if(ttip) ttip.style.display='none';
        }
        function fallbackDotClick(el){
            if(el.dataset.isnew==='true' && el.dataset.newidx!=='-1'){
                slideNewTechTo(parseInt(el.dataset.newidx));
            }
            const tech = weeklyTechs.find(t => t.name === el.dataset.name);
            if (tech) showTechDimPopup(tech, el);
        }

        // ========== 雷达图全局状态 ==========
        let radarChartInstance = null;
        let radarScanInterval = null;
        let scanRotation = 0;

        // ========== 绘制雷达图DOM叠加层（技术点 + 维度标签 + 扫描线） ==========
        function drawRadarOverlay(container) {
            container.querySelectorAll('.radar-overlay-el').forEach(el=> el.remove());
            const rect = container.getBoundingClientRect();
            const cx = rect.width / 2, cy = rect.height / 2, r = Math.min(cx, cy) * 0.65;
            const dims = ['技术新颖性','技术价值性','技术关联性','技术前瞻性'];
            const angles = [-Math.PI/2, 0, Math.PI/2, Math.PI];
            const newTechList = weeklyTechs.filter(t=> t.isNew);

            // 动态归一化：让所有技术均匀分布在雷达图内
            const allRawX = weeklyTechs.map(t => (t.dimensions4.value - t.dimensions4.prospect) / 2);
            const allRawY = weeklyTechs.map(t => (t.dimensions4.relevance - t.dimensions4.novelty) / 2);
            const maxAbsX = Math.max(...allRawX.map(Math.abs), 1);
            const maxAbsY = Math.max(...allRawY.map(Math.abs), 1);

            function calcPos(d4) {
                const rawX = (d4.value - d4.prospect) / 2;
                const rawY = (d4.relevance - d4.novelty) / 2;
                return {
                    x: cx + (rawX / maxAbsX) * r * 0.85,
                    y: cy + (rawY / maxAbsY) * r * 0.85
                };
            }

            // 维度标签（带闪烁）
            const labelDist = r + 30;
            dims.forEach((text, i) => {
                const a = angles[i];
                const el = document.createElement('div');
                el.className = 'radar-dim-label radar-overlay-el';
                el.textContent = text;
                el.style.left = (cx + labelDist * Math.cos(a)) + 'px';
                el.style.top = (cy + labelDist * Math.sin(a) + 4) + 'px';
                el.style.animationDelay = `${i * 0.75}s`;
                container.appendChild(el);
            });

            // 扫描线 SVG
            const svgNS = 'http://www.w3.org/2000/svg';
            const svg = document.createElementNS(svgNS, 'svg');
            svg.setAttribute('width', rect.width);
            svg.setAttribute('height', rect.height);
            svg.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;z-index:4;';
            svg.classList.add('radar-overlay-el');
            const defs = document.createElementNS(svgNS, 'defs');
            const grad = document.createElementNS(svgNS, 'linearGradient');
            grad.setAttribute('id', 'domScanGrad');
            grad.innerHTML = '<stop offset="0%" stop-color="rgba(57,255,20,0)"/><stop offset="100%" stop-color="rgba(57,255,20,0.45)"/>';
            defs.appendChild(grad);
            svg.appendChild(defs);
            const scanG = document.createElementNS(svgNS, 'g');
            scanG.style.cssText = `transform-origin:${cx}px ${cy}px;animation:scanRotate 4s linear infinite;`;
            const scanPath = document.createElementNS(svgNS, 'path');
            const p1x = cx + r * Math.cos(-0.35), p1y = cy + r * Math.sin(-0.35);
            const p2x = cx + r * Math.cos(0.35), p2y = cy + r * Math.sin(0.35);
            scanPath.setAttribute('d', `M ${cx} ${cy} L ${p1x} ${p1y} A ${r} ${r} 0 0 1 ${p2x} ${p2y} Z`);
            scanPath.setAttribute('fill', 'url(#domScanGrad)');
            scanPath.setAttribute('opacity', '0.5');
            scanG.appendChild(scanPath);
            svg.appendChild(scanG);
            container.appendChild(svg);

            // Tooltip
            const tooltip = document.createElement('div');
            tooltip.className = 'radar-tooltip-el radar-overlay-el';
            container.appendChild(tooltip);

            // 技术点（呼吸闪烁）
            weeklyTechs.forEach((tech, idx) => {
                const pos = calcPos(tech.dimensions4);
                const isNew = tech.isNew, color = isNew ? '#40a9ff' : '#ffa940';
                const newIdx = newTechList.findIndex(t => t.id === tech.id);
                const dot = document.createElement('div');
                dot.className = `radar-tech-dot ${isNew ? 'new-tech-dot' : 'old-tech-dot'} radar-overlay-el`;
                dot.style.left = pos.x + 'px';
                dot.style.top = pos.y + 'px';
                dot.style.color = color;
                dot.style.animationDelay = `${idx * 0.2}s`;
                dot.innerHTML = `<div class="radar-tech-dot-glow" style="background:radial-gradient(circle, ${color} 0%, transparent 70%);"></div>
                    <div class="radar-tech-dot-inner" style="background:${color};"></div>`;
                dot.addEventListener('mouseenter', e => {
                    const ev = tech.dimensionEvidence || {};
                    const d4 = tech.dimensions4 || {};
                    const dimRows = [
                        { key: 'novelty',   label: '新颖性', color: '#ff4d4f', barColor: 'linear-gradient(90deg,#ff4d4f,#ff7875)' },
                        { key: 'prospect',  label: '前瞻性', color: '#ffa940', barColor: 'linear-gradient(90deg,#ffa940,#ffc53d)' },
                        { key: 'relevance', label: '关联性', color: '#40a9ff', barColor: 'linear-gradient(90deg,#40a9ff,#69c0ff)' },
                        { key: 'value',     label: '价值性', color: '#73d13d', barColor: 'linear-gradient(90deg,#73d13d,#95de64)' }
                    ].map(dim => {
                        const score = ev[dim.key]?.score || d4[dim.key] || 0;
                        return buildDimWithSubsHtml(dim.key, dim.label, dim.color, dim.barColor, tech.name, score);
                    }).join('');
                    tooltip.innerHTML = `
                        <div style="font-weight:600;margin-bottom:6px;font-size:15px;">${tech.name}</div>
                        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
                            <span style="color:#8896b3;">${tech.category}</span>
                            <span style="color:#40a9ff;font-weight:700;">${tech.score}分</span>
                            <span style="color:#8896b3;font-size:12px;">${isNew ? '本周新识别' : '持续追踪'}</span>
                        </div>
                        ${dimRows}
                        <div style="margin-top:6px;font-size:11px;color:#8896b3;">点击查看详细评分依据</div>
                    `;
                    tooltip.style.display = 'block';
                    tooltip.style.width = '260px';
                    tooltip.style.whiteSpace = 'normal';
                    const crect = container.getBoundingClientRect();
                    tooltip.style.left = (e.clientX - crect.left + 12) + 'px';
                    tooltip.style.top = (e.clientY - crect.top - 8) + 'px';
                });
                dot.addEventListener('mousemove', e => {
                    const crect = container.getBoundingClientRect();
                    tooltip.style.left = (e.clientX - crect.left + 12) + 'px';
                    tooltip.style.top = (e.clientY - crect.top - 8) + 'px';
                });
                dot.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
                dot.addEventListener('click', () => {
                    if (isNew && newIdx >= 0) slideNewTechTo(newIdx);
                    showTechDimPopup(tech, dot);
                });
                container.appendChild(dot);
            });
        }

        // ========== 点击雷达点定位到右侧卡片 ==========
        function slideNewTechTo(index) {
            const track = document.getElementById('newTechList');
            const dotsContainer = document.getElementById('sliderDots');
            const prevBtn = document.getElementById('sliderPrev');
            const nextBtn = document.getElementById('sliderNext');
            if (!track) return;
            track.style.transform = `translateX(-${index * 100}%)`;
            if (dotsContainer) {
                dotsContainer.querySelectorAll('.slider-dot').forEach((dot, i) => {
                    dot.classList.toggle('active', i === index);
                });
            }
            const total = weeklyTechs.filter(t => t.isNew).length;
            if (prevBtn) prevBtn.classList.toggle('disabled', index === 0);
            if (nextBtn) nextBtn.classList.toggle('disabled', index === total - 1);
        }

        // ========== 渲染雷达图（ECharts背景 + DOM叠加） ==========
        function renderRadarChart() {
            const chartDom = document.getElementById('radarChart');
            if (typeof echarts === 'undefined') {
                renderFallbackRadar(chartDom);
                return;
            }
            if (radarChartInstance) {
                radarChartInstance.dispose();
                clearInterval(radarScanInterval);
            }
            radarChartInstance = echarts.init(chartDom);
            radarChartInstance.setOption({

        // ========== 手动扫描（新版：控制DOM动画） ==========
        function triggerManualScan() {
            const btn = document.getElementById('manualScanBtn');
            const effect = document.getElementById('radarScanEffect');
            const timeLabel = document.getElementById('lastScanTime');
            if (btn.classList.contains('scanning')) return;

            btn.classList.add('scanning');
            effect.classList.add('scanning');

            // 降级方案同步调用
            if (typeof window._fallbackScan === 'function') window._fallbackScan();

            // 加速所有扫描线
            document.querySelectorAll('#radarChart svg g[style*="scanRotate"], #fallbackRadarSvg g[style*="fallbackRotate"]').forEach(g => {
                g.style.animationDuration = '0.8s';
            });
            // 加速技术点呼吸
            document.querySelectorAll('.radar-tech-dot, .fallback-tech-dot').forEach(d => {
                d.style.animationDuration = '0.6s';
            });

            setTimeout(() => {
                btn.classList.remove('scanning');
                effect.classList.remove('scanning');
                document.querySelectorAll('#radarChart svg g[style*="scanRotate"], #fallbackRadarSvg g[style*="fallbackRotate"]').forEach(g => {
                    g.style.animationDuration = '';
                });
                document.querySelectorAll('.radar-tech-dot, .fallback-tech-dot').forEach(d => {
                    d.style.animationDuration = '';
                });
                const now = new Date();
                const ts = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' +
                    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0') + ':' + String(now.getSeconds()).padStart(2,'0');
                timeLabel.innerHTML = '🕐 最近扫描：' + ts;
            }, 2500);
        }

        // ========== 渲染新技术清单（滑动卡片 + 迷你雷达 + 分数对比） ==========
        function renderNewTechList() {
            const newTechs = weeklyTechs
                .filter(t => t.isNew)
                .sort((a, b) => new Date(b.identifyTime) - new Date(a.identifyTime));

            const track = document.getElementById('newTechList');
            const dotsContainer = document.getElementById('sliderDots');
            const prevBtn = document.getElementById('sliderPrev');
            const nextBtn = document.getElementById('sliderNext');

            // 渲染卡片
            track.innerHTML = newTechs.map(tech => {
                const diff = tech.score - (tech.prevScore || tech.score);
                const diffAbs = Math.abs(diff);
                const trendClass = diff > 0 ? 'up' : diff < 0 ? 'down' : '';
                const trendIcon = diff > 0 ? '↑' : diff < 0 ? '↓' : '−';
                const trendText = diff !== 0 ? `${trendIcon}${diffAbs}` : '−';
                const miniRadar = getMiniRadar(tech.dimensions4 || { novelty: 80, value: 80, relevance: 80, prospect: 80 });

                return `
                    <div class="tech-card new-highlight">
                        <div class="tech-card-header">
                            <span class="tech-card-name">${tech.name}</span>
                            <div class="tech-card-score-wrap">
                                ${diff !== 0 ? `<span class="tech-card-trend ${trendClass}" title="较上周${diff > 0 ? '上升' : '下降'}${diffAbs}分">${trendText}</span>` : ''}
                                <span class="tech-card-score">${tech.score}分</span>
                            </div>
                        </div>
                        <div class="tech-card-meta">
                            <span class="tech-meta-cat">${tech.category}</span>
                            <span class="tech-meta-time">🕐 ${tech.identifyTime}</span>
                        </div>
                        <div class="tech-card-radar">${miniRadar}</div>
                        <div class="tech-card-tags">
                            ${tech.tags.map(tag => `<span class="tech-tag">${tag}</span>`).join('')}
                        </div>
                        <div class="tech-card-footer">
                            <span class="new-badge">NEW</span>
                        </div>
                    </div>
                `;
            }).join('');

            // 渲染指示器
            dotsContainer.innerHTML = newTechs.map((_, i) => `
                <div class="slider-dot ${i === 0 ? 'active' : ''}" data-index="${i}"></div>
            `).join('');

            // 滑动逻辑
            let currentIndex = 0;
            const total = newTechs.length;

            function updateSlider() {
                track.style.transform = `translateX(-${currentIndex * 100}%)`;
                dotsContainer.querySelectorAll('.slider-dot').forEach((dot, i) => {
                    dot.classList.toggle('active', i === currentIndex);
                });
                prevBtn.classList.toggle('disabled', currentIndex === 0);
                nextBtn.classList.toggle('disabled', currentIndex === total - 1);
            }

            prevBtn.addEventListener('click', () => {
                if (currentIndex > 0) { currentIndex--; updateSlider(); }
            });

            nextBtn.addEventListener('click', () => {
                if (currentIndex < total - 1) { currentIndex++; updateSlider(); }
            });

            dotsContainer.querySelectorAll('.slider-dot').forEach(dot => {
                dot.addEventListener('click', () => {
                    currentIndex = parseInt(dot.dataset.index);
                    updateSlider();
                });
            });

            updateSlider();

            // 渲染底部统计摘要
            const summaryContainer = document.getElementById('newTechSummary');
            if (summaryContainer) {
                const highScoreCount = newTechs.filter(t => t.score >= 90).length;
                const maxTech = newTechs.reduce((m, t) => t.score > m.score ? t : m, newTechs[0]);
                summaryContainer.innerHTML = `
                    <div class="summary-item">
                        <div class="summary-label">≥90分技术数</div>
                        <div class="summary-value">${highScoreCount}</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">最高分</div>
                        <div class="summary-value" style="font-size:13px;line-height:1.4;word-break:break-all;">${maxTech.name}</div>
                        <div class="summary-sub">${maxTech.score}分</div>
                    </div>
                `;
            }

            // 绑定卡片雷达图 hover 事件
            setTimeout(() => {
                const cards = track.querySelectorAll('.tech-card');
                newTechs.forEach((tech, idx) => {
                    const card = cards[idx];
                    if (!card) return;
                    const radarEl = card.querySelector('.tech-card-radar');
                    if (!radarEl) return;
                    radarEl.addEventListener('mouseenter', () => showTechDimPopup(tech, radarEl));
                    radarEl.addEventListener('mouseleave', () => {
                        setTimeout(() => {
                            if (!document.querySelector('.tech-dim-popup:hover')) hideTechDimPopup();
                        }, 150);
                    });
                });
            }, 0);
        }

        // 技术成熟度 TRL（根据 lifecycleScore 映射到 9 个阶段）
        function getTrlByScore(score) {
            const stages = [
                { min: 0,  label: 'TRL 1 基本原理发现' },
                { min: 12, label: 'TRL 2 技术概念形成' },
                { min: 23, label: 'TRL 3 关键功能验证' },
                { min: 34, label: 'TRL 4 实验室环境验证' },
                { min: 45, label: 'TRL 5 相关环境验证' },
                { min: 56, label: 'TRL 6 系统/子系统模型验证' },
                { min: 67, label: 'TRL 7 真实环境系统验证' },
                { min: 78, label: 'TRL 8 系统完成并验证' },
                { min: 89, label: 'TRL 9 系统实际应用' }
            ];
            for (let i = stages.length - 1; i >= 0; i--) {
                if (score >= stages[i].min) return stages[i].label;
            }
            return stages[0].label;
        }

        // ========== 渲染历史技术清单（融合图片8维度 + 一二级领域筛选） ==========
        function renderHistoryList() {
            const container = document.getElementById('historyGrid');
            const primaryFilter = document.getElementById('filterPrimary')?.value || '';
            const secondaryFilter = document.getElementById('filterSecondary')?.value || '';
            const sortValue = document.getElementById('filterSort')?.value || 'firstSeen-desc';

            const filtered = historyTechs.filter(tech => {
                if (primaryFilter && tech.primaryField !== primaryFilter) return false;
                if (secondaryFilter && tech.secondaryField !== secondaryFilter) return false;
                return true;
            });

            filtered.sort((a, b) => {
                switch (sortValue) {
                    case 'firstSeen-desc':
                        return (b.firstSeen || '').localeCompare(a.firstSeen || '');
                    case 'firstSeen-asc':
                        return (a.firstSeen || '').localeCompare(b.firstSeen || '');
                    case 'score-desc':
                        return (b.score || 0) - (a.score || 0);
                    case 'score-asc':
                        return (a.score || 0) - (b.score || 0);
                    case 'novelty-desc':
                        return (b.dimensions4?.novelty || 0) - (a.dimensions4?.novelty || 0);
                    case 'value-desc':
                        return (b.dimensions4?.value || 0) - (a.dimensions4?.value || 0);
                    case 'relevance-desc':
                        return (b.dimensions4?.relevance || 0) - (a.dimensions4?.relevance || 0);
                    case 'prospect-desc':
                        return (b.dimensions4?.prospect || 0) - (a.dimensions4?.prospect || 0);
                    default:
                        return 0;
                }
            });

            // 更新总数显示
            const badge = document.getElementById('historyBadge');
            if (badge) badge.textContent = `累计识别（${filtered.length}/${historyTechs.length}项）`;

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-state-icon">🔍</div>
                        <div>当前筛选条件下无匹配技术</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(tech => {
                const hasDetails = !!tech.lifecycle;

                // 主要数据源
                const dsHtml = hasDetails && tech.dataSources ? `
                    <div class="history-section-title">主要数据源</div>
                    <div class="history-datasource">${tech.dataSources.map(ds => `
                        <div class="history-datasource-item">
                            <span class="history-datasource-tag">${ds.type}</span>
                            <span class="history-datasource-text">${ds.content}</span>
                        </div>
                    `).join('')}</div>
                ` : '';

                // 影响域
                const impactHtml = hasDetails && tech.impactScope ? `
                    <div class="history-section-title">影响域</div>
                    <div class="history-impact">${tech.impactScope.map(im => `
                        <span class="history-impact-tag ${im.type}">${im.label}</span>
                    `).join('')}</div>
                ` : '';

                // 竞争格局
                const compHtml = hasDetails && tech.competition ? `
                    <div class="history-section-title">竞争格局</div>
                    <div class="history-competition">${tech.competition}</div>
                ` : '';

                // 关键指标
                const metricHtml = hasDetails && tech.keyMetrics ? `
                    <div class="history-section-title">关键指标</div>
                    <div class="history-metrics">${tech.keyMetrics.map(m => `
                        <span class="history-metric-tag">${m.label} ${m.value}</span>
                    `).join('')}</div>
                ` : '';

                // 评估维度标签
                const dimTagsHtml = tech.dimensions4 ? `
                    <div class="history-section-title">评估维度</div>
                    <div class="history-metrics">
                        <span class="history-metric-tag" style="background:rgba(255,77,79,0.08);color:#ff4d4f;border-color:rgba(255,77,79,0.15);">新颖性 ${tech.dimensions4.novelty}</span>
                        <span class="history-metric-tag" style="background:rgba(115,209,61,0.08);color:#73d13d;border-color:rgba(115,209,61,0.15);">价值性 ${tech.dimensions4.value}</span>
                        <span class="history-metric-tag" style="background:rgba(64,169,255,0.08);color:#40a9ff;border-color:rgba(64,169,255,0.15);">关联性 ${tech.dimensions4.relevance}</span>
                        <span class="history-metric-tag" style="background:rgba(255,169,64,0.08);color:#ffa940;border-color:rgba(255,169,64,0.15);">前瞻性 ${tech.dimensions4.prospect}</span>
                    </div>
                ` : '';

                // 风险信号
                const riskHtml = hasDetails && tech.riskSignals ? `
                    <div class="history-risk">${tech.riskSignals.join('；')}</div>
                ` : '';

                // 技术成熟度 TRL（根据 lifecycleScore 映射到 9 个阶段）
                const lifeHtml = hasDetails && tech.lifecycle ? `
                    <div class="history-lifecycle">
                        <div class="history-lifecycle-label">
                            <span>技术成熟度</span>
                            <span class="stage">${getTrlByScore(tech.lifecycleScore)}</span>

            // 绑定卡片点击打开详情页
            container.querySelectorAll('.history-card').forEach(card => {

        // ========== 初始化历史清单筛选器 ==========
        function initHistoryFilter() {
            const primarySelect = document.getElementById('filterPrimary');
            const secondarySelect = document.getElementById('filterSecondary');
            const sortSelect = document.getElementById('filterSort');
            const resetBtn = document.getElementById('filterReset');
            if (!primarySelect || !secondarySelect) return;

            // 提取唯一领域值
            const primarySet = new Set();
            const secondaryMap = new Map(); // primary -> Set of secondary
            historyTechs.forEach(tech => {
                if (tech.primaryField) primarySet.add(tech.primaryField);
                if (tech.primaryField && tech.secondaryField) {
                    if (!secondaryMap.has(tech.primaryField)) secondaryMap.set(tech.primaryField, new Set());
                    secondaryMap.get(tech.primaryField).add(tech.secondaryField);
                }
            });

            const sortedPrimary = Array.from(primarySet).sort();
            const allSecondary = new Set();
            historyTechs.forEach(t => { if (t.secondaryField) allSecondary.add(t.secondaryField); });
            const sortedAllSecondary = Array.from(allSecondary).sort();

            // 填充一级领域
            primarySelect.innerHTML = '<option value="">全部领域</option>' + sortedPrimary.map(p => `<option value="${p}">${p}</option>`).join('');

            // 填充二级领域（全部）
            function fillSecondary(primaryVal) {
                let list = sortedAllSecondary;
                if (primaryVal && secondaryMap.has(primaryVal)) {
                    list = Array.from(secondaryMap.get(primaryVal)).sort();
                }
                const currentSec = secondarySelect.value;
                secondarySelect.innerHTML = '<option value="">全部</option>' + list.map(s => `<option value="${s}">${s}</option>`).join('');
                // 如果当前值仍在列表中则保留
                if (currentSec && list.includes(currentSec)) secondarySelect.value = currentSec;
            }
            fillSecondary('');

            // 事件绑定
            primarySelect.addEventListener('change', () => {
                fillSecondary(primarySelect.value);
                renderHistoryList();
            });
            secondarySelect.addEventListener('change', () => {
                renderHistoryList();
            });
            if (sortSelect) {
                sortSelect.addEventListener('change', () => {
                    renderHistoryList();
                });
            }
            resetBtn.addEventListener('click', () => {
                primarySelect.value = '';
                fillSecondary('');
                if (sortSelect) sortSelect.value = 'firstSeen-desc';
                renderHistoryList();
            });
        }

        // ========== 技术维度详情弹层控制 ==========
        const dimConfig = [
            { key: 'novelty',   label: '新颖性', icon: '💡', color: '#ff4d4f', barColor: 'linear-gradient(90deg,#ff4d4f,#ff7875)' },
            { key: 'prospect',  label: '前瞻性', icon: '🔭', color: '#ffa940', barColor: 'linear-gradient(90deg,#ffa940,#ffc53d)' },
            { key: 'relevance', label: '关联性', icon: '🔗', color: '#40a9ff', barColor: 'linear-gradient(90deg,#40a9ff,#69c0ff)' },
            { key: 'value',     label: '价值性', icon: '💎', color: '#73d13d', barColor: 'linear-gradient(90deg,#73d13d,#95de64)' }
        ];

        function getDimSummary(dimKey, score) {
            if (score >= 90) {
                if (dimKey === 'novelty') return '该维度表现突出，技术处于高度创新活跃期，近期专利与论文增长迅速，原创性成果密集涌现。';
                if (dimKey === 'prospect') return '发展前景广阔，技术路线清晰，产业化预期明确，未来3-5年有望实现规模化突破。';
                if (dimKey === 'relevance') return '与产业链上下游及核心应用场景关联性极高，技术落地路径顺畅，生态支撑完善。';
                if (dimKey === 'value') return '经济价值显著，投资回报可期，规模化应用后有望带来明显的成本下降与效率提升。';
            } else if (score >= 80) {
                if (dimKey === 'novelty') return '创新活跃度较高，专利与论文保持稳健增长，技术持续迭代优化。';
                if (dimKey === 'prospect') return '发展趋势向好，关键瓶颈逐步突破，具备中长期产业化潜力。';
                if (dimKey === 'relevance') return '与主流应用场景匹配度良好，已具备一定的产业链协同基础。';
                if (dimKey === 'value') return '具备较好的商业化价值，随着成本下降和技术成熟，投资回报率将进一步提升。';
            } else if (score >= 70) {
                if (dimKey === 'novelty') return '创新活动较为平稳，技术进入工程优化阶段，原创性突破相对较少。';
                if (dimKey === 'prospect') return '发展前景尚可，但部分技术路线和商业模式仍需进一步验证。';
                if (dimKey === 'relevance') return '与部分应用场景关联性一般，需进一步拓展适配场景。';
                if (dimKey === 'value') return '价值潜力有待释放，当前成本或市场接受度仍是主要制约因素。';
            } else {
                if (dimKey === 'novelty') return '技术相对成熟或创新活跃度较低，近期重大原创成果较少。';
                if (dimKey === 'prospect') return '发展前景受限，可能面临技术瓶颈或替代路线竞争。';
                if (dimKey === 'relevance') return '与当前主流应用场景关联性有限，落地空间较小。';
                if (dimKey === 'value') return '短期经济价值有限，需等待技术突破或成本大幅下降。';
            }
        }

        // 构建雷达图 tooltip 中“维度 + 子指标”的 HTML

                    <span style="width:26px;text-align:right;color:${color};font-weight:600;">${sub.score}</span>

                <div style="margin-bottom:6px;">

        function showTechDimPopup(tech, anchorEl) {
            const popup = document.getElementById('techDimPopup');

            document.getElementById('popupIcon').innerHTML = `<img src="${getTechIcon(tech.category)}" alt="${tech.name}">`;

                const summary = getDimSummary(dim.key, d.score);

                const subCfg = subIndicatorConfig[dim.key] || {};
                const subHtml = subIndicators.map(sub => `

                return `

                            <span class="popup-dim-toggle">▶</span>
                        </div>
                        <div class="popup-evidence">
                            <div class="popup-evidence-summary">${summary}</div>
                            <div class="popup-sub-indicators">${subHtml}</div>
                        </div>
                    </div>
                `;
            }).join('');

            // Position
            const rect = anchorEl.getBoundingClientRect();
            const popupRect = popup.getBoundingClientRect();
            let left = rect.left + rect.width / 2 - 170;
            let top = rect.top - 360;
            if (top < 10) top = rect.bottom + 10;
            if (left < 10) left = 10;
            if (left + 340 > window.innerWidth) left = window.innerWidth - 350;
            popup.style.left = left + 'px';
            popup.style.top = top + 'px';
            popup.classList.add('show');
        }

        function hideTechDimPopup() {
            const popup = document.getElementById('techDimPopup');
            if (popup) popup.classList.remove('show');
        }

        let detailRadarChart = null;

        // ========== 打开技术详情页 ==========
        function openTechDetail(tech) {
            const modal = document.getElementById('techDetailModal');
            if (!modal || !tech) return;

            document.getElementById('detailIcon').innerHTML = `<img src="${getTechIcon(tech.category)}" alt="${tech.name}">`;
            document.getElementById('detailName').textContent = tech.name;
            document.getElementById('detailScore').textContent = `${tech.score}分`;
            document.getElementById('detailMeta').innerHTML = `
                <span>🏷️ ${tech.category}</span>
                <span>📅 识别时间：${tech.firstSeen}</span>
                <span>📊 综合评分：${tech.score}</span>
            `;

            // 描述
            document.getElementById('detailDesc').textContent = tech.desc || '暂无描述';

            // 关键指标
            const metricsEl = document.getElementById('detailMetrics');
            if (tech.keyMetrics && tech.keyMetrics.length) {
                metricsEl.innerHTML = tech.keyMetrics.map(m => `
                    <span class="tech-detail-metric">${m.label} ${m.value}</span>
                `).join('');
            } else {
                metricsEl.innerHTML = '<span style="color:#8896b3;font-size:12px;">暂无关键指标</span>';
            }

            // 影响域
            const impactEl = document.getElementById('detailImpact');
            if (tech.impactScope && tech.impactScope.length) {
                impactEl.innerHTML = tech.impactScope.map(im => `
                    <span class="tech-detail-impact-tag ${im.type}">${im.label}</span>
                `).join('');
            } else {
                impactEl.innerHTML = '<span style="color:#8896b3;font-size:12px;">暂无影响域数据</span>';
            }

            // 技术成熟度 TRL
            const trlEl = document.getElementById('detailTrl');
            if (tech.lifecycle) {
                trlEl.innerHTML = `
                    <div class="tech-detail-trl-label">
                        <span>当前阶段</span>
                        <span class="stage">${getTrlByScore(tech.lifecycleScore)}</span>
                    </div>
                    <div class="tech-detail-trl-bar">
                        <div class="tech-detail-trl-bar-inner" style="width:${tech.lifecycleScore}%"></div>
                    </div>
                `;
            } else {
                trlEl.innerHTML = '<span style="color:#8896b3;font-size:12px;">暂无技术成熟度数据</span>';
            }

            // 风险
            const risksEl = document.getElementById('detailRisks');
            if (tech.riskSignals && tech.riskSignals.length) {
                risksEl.innerHTML = tech.riskSignals.map(r => `
                    <div class="tech-detail-risk-item">${r}</div>
                `).join('');
            } else {
                risksEl.innerHTML = '<span style="color:#8896b3;font-size:12px;">暂无风险信号</span>';
            }

            // 渲染雷达图
            modal.classList.add('show');
            document.body.style.overflow = 'hidden';
            // 延迟初始化，确保容器已有尺寸
            setTimeout(() => renderDetailRadar(tech), 50);
        }

        function closeTechDetail() {
            const modal = document.getElementById('techDetailModal');
            if (modal) modal.classList.remove('show');
            document.body.style.overflow = '';
            if (detailRadarChart) {
                detailRadarChart.dispose();
                detailRadarChart = null;
            }
        }

        // ========== 详情页雷达图（纯 SVG，不依赖 ECharts） ==========
        function renderDetailRadar(tech) {
            const dom = document.getElementById('detailRadar');
            if (!dom) return;
            if (detailRadarChart) {
                detailRadarChart.dispose();
                detailRadarChart = null;
            }

            const d4 = tech.dimensions4 || { novelty: 80, value: 80, relevance: 80, prospect: 80 };
            const indicators = [
                { name: '新颖性', key: 'novelty', color: '#ff4d4f' },
                { name: '价值性', key: 'value', color: '#73d13d' },
                { name: '关联性', key: 'relevance', color: '#40a9ff' },
                { name: '前瞻性', key: 'prospect', color: '#ffa940' }
            ];

            const W = 400, H = 340, CX = 200, CY = 170, R = 110;
            const angleStep = (Math.PI * 2) / 4;
            const startAngle = -Math.PI / 2;

            function getPoint(score, idx) {
                const angle = startAngle + idx * angleStep;
                const ratio = score / 100;
                return { x: CX + R * ratio * Math.cos(angle), y: CY + R * ratio * Math.sin(angle) };
            }

            // 网格
            let grid = '';
            [0.25, 0.5, 0.75, 1.0].forEach((ratio, idx) => {
                const gPoints = [0, 1, 2, 3].map(i => {
                    const angle = startAngle + i * angleStep;
                    return `${CX + R * ratio * Math.cos(angle)},${CY + R * ratio * Math.sin(angle)}`;
                }).join(' ');
                const opacity = 0.04 + idx * 0.03;
                grid += `<polygon points="${gPoints}" fill="rgba(57,255,20,${opacity})" stroke="rgba(57,255,20,0.12)" stroke-width="0.5"/>`;
            });

            // 轴线
            let axes = '';
            [0, 1, 2, 3].forEach(i => {
                const angle = startAngle + i * angleStep;
                const x2 = CX + R * Math.cos(angle);
                const y2 = CY + R * Math.sin(angle);
                axes += `<line x1="${CX}" y1="${CY}" x2="${x2}" y2="${y2}" stroke="rgba(57,255,20,0.15)" stroke-width="0.5"/>`;
            });

            // 数据点
            const points = indicators.map((ind, i) => ({ ...getPoint(d4[ind.key], i), score: d4[ind.key], ...ind }));
            const polyPoints = points.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');

            // 标签 + 分值
            const labelDist = R + 26;
            let labels = '';
            points.forEach((p, i) => {
                const angle = startAngle + i * angleStep;
                const x = CX + labelDist * Math.cos(angle);
                const y = CY + labelDist * Math.sin(angle);
                const anchor = i === 0 ? 'middle' : i === 1 ? 'start' : i === 2 ? 'middle' : 'end';
                const subs = getSubIndicators(p.key, tech.name, p.score);
                const title = `${p.name}: ${p.score}\n` + subs.map(s => `${s.label}: ${s.score}`).join('\n');
                labels += `
                    <g style="cursor:default;">
                        <title>${title.replace(/"/g, '&quot;')}</title>
                        <text x="${x.toFixed(1)}" y="${(y - 6).toFixed(1)}" text-anchor="${anchor}" fill="${p.color}" font-size="13" font-weight="600">${p.name} ${p.score}</text>
                    </g>
                `;
            });

            // 顶点圆点
            const dots = points.map(p => `
                <circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4" fill="${p.color}" stroke="#0a1628" stroke-width="1.5"/>
            `).join('');

            dom.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" style="width:100%;height:100%;">
                    ${grid}${axes}
                    <polygon points="${polyPoints}" fill="rgba(57,255,20,0.15)" stroke="#39ff14" stroke-width="2" stroke-linejoin="round"/>
                    ${dots}${labels}
                </svg>
            `;
        }

        window.toggleDimEvidence = function(el) {
            const dim = el.closest('.popup-dim');
            if (dim) dim.classList.toggle('expanded');
        };

        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', () => {
            try { renderWarningModule(); } catch (e) { console.error('预警模块渲染失败:', e); }
            try { renderRadarChart(); } catch (e) { console.error('雷达图渲染失败:', e); }
            try { renderNewTechList(); } catch (e) { console.error('新技术列表渲染失败:', e); }
            try { renderHistoryList(); } catch (e) { console.error('历史清单渲染失败:', e); }
            try { initHistoryFilter(); } catch (e) { console.error('筛选器初始化失败:', e); }

            // 弹层鼠标移出时隐藏
            const popup = document.getElementById('techDimPopup');
            if (popup) {
                popup.addEventListener('mouseleave', () => hideTechDimPopup());
            }
        });
    </script>
</body>
</html>
