<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术变革扫描模块 - 南网地平线</title>
    <!-- 主 CDN：360 CDN -->
    <script src="https://lib.baomitu.com/echarts/5.4.3/echarts.min.js"></script>
    <!-- 自动检测 + 备用加载 -->
    <script>
        (function() {
            var cdnList = [
                'https://lib.baomitu.com/echarts/5.4.3/echarts.min.js',
                'https://lf9-cdn-tos.bytecdntp.com/cdn/expire-1-M/echarts/5.4.3/echarts.min.js',
                'https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js'
            ];
            var tried = 0;
            function checkAndLoad() {
                if (typeof echarts !== 'undefined') return;
                tried++;
                if (tried < cdnList.length) {
                    var s = document.createElement('script');
                    s.src = cdnList[tried];
                    s.onerror = function() { setTimeout(checkAndLoad, 500); };
                    document.head.appendChild(s);
                }
            }
            setTimeout(checkAndLoad, 2000);
        })();
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #eef2f7 0%, #e6ecf4 50%, #eef2f7 100%);
            color: #2b3a4f;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
        }

        /* 页面标题 */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding: 16px 0;
            border-bottom: 1px solid rgba(22, 119, 255, 0.2);
        }

        .page-header h1 {
            font-size: 18px;
            font-weight: 700;
            color: #1677ff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-header h1::before {
            content: '';
            width: 4px;
            height: 18px;
            background: linear-gradient(180deg, #1677ff, #0099ff);
            border-radius: 2px;
        }

        .page-header .subtitle {
            font-size: 13px;
            color: #6e7d95;
            margin-top: 4px;
            margin-left: 14px;
        }

        /* 通用卡片样式 */
        .section-card {
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(22, 119, 255, 0.15);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .section-card:hover {
            border-color: rgba(22, 119, 255, 0.3);
            box-shadow: 0 8px 32px rgba(22, 119, 255, 0.1);
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: #1677ff;
            margin-bottom: 18px;
            padding-left: 12px;
            border-left: 4px solid #1677ff;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .section-title .badge {
            font-size: 13px;
            padding: 3px 12px;
            border-radius: 12px;
            background: rgba(22, 119, 255, 0.15);
            color: #1677ff;
            border: 1px solid rgba(22, 119, 255, 0.3);
        }

        /* ========== 第一部分：技术预警模块 ========== */
        .warning-section {
            background: linear-gradient(135deg, rgba(255, 77, 79, 0.08) 0%, rgba(255, 255, 255, 0.92) 100%);
            border-color: rgba(255, 77, 79, 0.3);
        }

        .warning-section .section-title {
            color: #ff4d4f;
            border-left-color: #ff4d4f;
        }

        .warning-section .section-title .badge {
            background: rgba(255, 77, 79, 0.15);
            color: #ff4d4f;
            border-color: rgba(255, 77, 79, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .warning-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .warning-card {
            background: linear-gradient(135deg, rgba(255, 77, 79, 0.1) 0%, rgba(255, 255, 255, 0.92) 100%);
            border: 1px solid rgba(255, 77, 79, 0.25);
            border-radius: 10px;
            padding: 16px;
            display: flex;
            align-items: flex-start;
            gap: 14px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .warning-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #ff4d4f, #ff7875);
        }

        .warning-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 77, 79, 0.15);
            border-color: rgba(255, 77, 79, 0.4);
        }

        .warning-icon {
            width: 44px;
            height: 44px;
            background: rgba(255, 77, 79, 0.15);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border: 1px solid rgba(255, 77, 79, 0.2);
            object-fit: contain;
            padding: 8px;
        }

        .warning-content {
            flex: 1;
            min-width: 0;
        }

        .warning-name {
            font-size: 15px;
            font-weight: 600;
            color: #cf1322;
            margin-bottom: 6px;
        }

        .warning-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .warning-score {
            font-size: 20px;
            font-weight: 700;
            color: #ff4d4f;
        }

        .warning-tag {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(255, 77, 79, 0.1);
            color: #d4380d;
            border: 1px solid rgba(255, 77, 79, 0.2);
        }

        .warning-date {
            font-size: 12px;
            color: #6e7d95;
            margin-top: 6px;
        }

        .warning-reason {
            font-size: 12px;
            line-height: 1.55;
            color: #8c3330;
            margin-top: 8px;
            padding: 8px 10px 8px 24px;
            background: rgba(255, 77, 79, 0.06);
            border: 1px solid rgba(255, 77, 79, 0.15);
            border-radius: 6px;
            position: relative;
        }

        .warning-reason::before {
            content: '⚡';
            position: absolute;
            left: 8px;
            top: 8px;
            font-size: 11px;
        }

        /* ========== 第二部分：雷达图 + 新技术清单 ========== */
        .scan-section {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 20px;
            align-items: stretch;
            height: 760px;
            max-height: calc(100vh - 220px);
        }

        .scan-section > .section-card {
            padding: 16px;
        }

        .scan-section .section-title {
            margin-bottom: 16px;
        }

        .radar-container {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #radarChart {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .radar-chart-wrap {
            position: relative;
            width: 100%;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        /* 扫描动效 */
        .radar-scan-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            transform: translate(-50%, -50%);
            pointer-events: none;
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(82, 196, 26, 0.4);
            opacity: 0;
        }

        .radar-scan-effect.scanning {
            animation: radarPulse 2.5s ease-out infinite;
        }

        @keyframes radarPulse {
            0% { width: 0; height: 0; opacity: 0.8; box-shadow: 0 0 0 0 rgba(82, 196, 26, 0.5); }
            50% { opacity: 0.4; }
            100% { width: 480px; height: 480px; opacity: 0; box-shadow: 0 0 0 0 rgba(82, 196, 26, 0); }
        }

        @keyframes radarRotate {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes dataPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.3); }
        }

        /* 工具栏 */
        .radar-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding: 0 4px;
        }

        .last-scan-time {
            font-size: 13px;
            color: #6e7d95;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .scan-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: linear-gradient(135deg, rgba(82, 196, 26, 0.15), rgba(82, 196, 26, 0.05));
            border: 1px solid rgba(82, 196, 26, 0.3);
            border-radius: 6px;
            color: #52c41a;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .scan-btn:hover {
            background: linear-gradient(135deg, rgba(82, 196, 26, 0.25), rgba(82, 196, 26, 0.1));
            border-color: #52c41a;
            box-shadow: 0 0 12px rgba(82, 196, 26, 0.2);
        }

        .scan-btn.scanning {
            pointer-events: none;
            opacity: 0.7;
            animation: btnPulse 1s ease-in-out infinite;
        }

        @keyframes btnPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(82, 196, 26, 0.3); }
            50% { box-shadow: 0 0 12px 4px rgba(82, 196, 26, 0.1); }
        }

        .scan-btn-icon {
            font-size: 14px;
            display: inline-block;
        }

        .scan-btn.scanning .scan-btn-icon {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes fallbackRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes fallbackBreath {
            0%, 100% { transform: scale(1); opacity: 0.95; }
            50% { transform: scale(1.35); opacity: 0.65; }
        }

        /* ========== 雷达图技术点 + 维度标签 + 扫描线（荧光绿版） ========== */
        .radar-chart-wrap { position: relative; overflow: hidden; }

        .radar-tech-dot {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            z-index: 10;
            pointer-events: auto;
            animation: radarBreath 2.2s ease-in-out infinite;
        }
        .radar-tech-dot.new-tech-dot { animation-delay: 0s; }
        .radar-tech-dot.old-tech-dot { animation-delay: 1.1s; }
        .radar-tech-dot-inner {
            position: absolute;
            top: 50%; left: 50%;
            width: 7px; height: 7px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            box-shadow: 0 0 8px 2px currentColor;
        }
        .radar-tech-dot-glow {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            background: radial-gradient(circle, currentColor 0%, transparent 70%);
            opacity: 0.55;
        }
        @keyframes radarBreath {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.95; }
            50% { transform: translate(-50%, -50%) scale(1.35); opacity: 0.65; }
        }

        .radar-dim-label {
            position: absolute;
            font-size: 18px;
            font-weight: 600;
            color: #52c41a;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
            text-shadow: 0 0 10px rgba(82, 196, 26,0.5);
            animation: dimBlink 3s ease-in-out infinite;
            white-space: nowrap;
        }
        .radar-dim-label:nth-of-type(1) { animation-delay: 0s; }
        .radar-dim-label:nth-of-type(2) { animation-delay: 0.75s; }
        .radar-dim-label:nth-of-type(3) { animation-delay: 1.5s; }
        .radar-dim-label:nth-of-type(4) { animation-delay: 2.25s; }
        @keyframes dimBlink {
            0%, 100% { opacity: 1; text-shadow: 0 0 14px rgba(82, 196, 26,0.8); color: #52c41a; }
            50% { opacity: 0.5; text-shadow: 0 0 4px rgba(82, 196, 26,0.2); color: #6aff47; }
        }

        .radar-scan-sector {
            position: absolute;
            top: 50%; left: 50%;
            pointer-events: none;
            z-index: 4;
            transform-origin: 0 0;
            animation: scanRotate 4s linear infinite;
        }

        .radar-tooltip-el {
            position: absolute;
            display: none;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(82, 196, 26,0.35);
            border-radius: 6px;
            padding: 8px 14px;
            color: #2b3a4f;
            font-size: 14px;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        .radar-legend {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 8px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #7a8aa0;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .legend-dot.new-tech {
            background: #1677ff;
            box-shadow: 0 0 8px rgba(22, 119, 255, 0.6);
        }

        .legend-dot.old-tech {
            background: #ffa940;
            box-shadow: 0 0 8px rgba(255, 169, 64, 0.6);
        }

        .new-tech-panel {
            display: flex;
            flex-direction: column;
            max-height: none;
            overflow: hidden;
        }

        .new-tech-panel .section-title {
            flex-shrink: 0;
        }

        /* ========== 滑动组件 ========== */
        .slider-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .slider-track {
            display: flex;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            gap: 12px;
            flex: 1;
            min-height: 0;
        }

        .slider-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(22, 119, 255, 0.3);
            border-radius: 50%;
            color: #1677ff;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: all 0.2s;
            user-select: none;
        }

        .slider-arrow:hover {
            background: rgba(22, 119, 255, 0.2);
            border-color: #1677ff;
        }

        .slider-arrow.prev { left: 4px; }
        .slider-arrow.next { right: 4px; }
        .slider-arrow.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }

        .slider-dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 12px;
        }

        .slider-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(22, 119, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s;
        }

        .slider-dot.active {
            background: #1677ff;
            width: 18px;
            border-radius: 3px;
        }

        /* 新技术统计摘要 */
        .newtech-summary {
            margin-top: 10px;
            padding: 8px 12px;
            background: rgba(82, 196, 26, 0.04);
            border: 1px solid rgba(82, 196, 26, 0.12);
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .summary-item {
            flex: 1;
            text-align: center;
            padding: 4px 0;
        }

        .summary-item:not(:last-child) {
            border-right: 1px solid rgba(82, 196, 26, 0.1);
        }

        .summary-label {
            font-size: 13px;
            color: #6e7d95;
            margin-bottom: 4px;
        }

        .summary-value {
            font-size: 17px;
            font-weight: 700;
            color: #52c41a;
        }

        .summary-sub {
            font-size: 12px;
            color: #6e7d95;
            margin-top: 2px;
        }

        /* ========== 新技术卡片（滑动版） ========== */
        .tech-card {
            flex: 0 0 100%;
            background: rgba(22, 119, 255, 0.05);
            border: 1px solid rgba(22, 119, 255, 0.12);
            border-radius: 10px;
            padding: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .tech-card::-webkit-scrollbar {
            width: 6px;
        }
        .tech-card::-webkit-scrollbar-thumb {
            background: rgba(22, 119, 255, 0.25);
            border-radius: 3px;
        }

        /* 新技术卡片内的技术变革理由：紧凑排版 */
        .tech-card .history-section-title {
            margin: 10px 0 6px 0;
        }
        .tech-card .history-change-basis {
            gap: 5px;
        }
        .tech-card .history-change-item {
            padding: 5px 9px;
        }
        .tech-card .history-change-value {
            font-size: 11px;
        }

        .tech-card:hover {
            background: rgba(22, 119, 255, 0.08);
            border-color: rgba(22, 119, 255, 0.3);
        }

        .tech-card.new-highlight {
            border-left: 3px solid #1677ff;
        }

        .tech-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .tech-card-name {
            font-size: 17px;
            font-weight: 600;
            color: #2b3a4f;
        }

        .tech-card-score-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tech-card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .tech-meta-cat {
            color: #1677ff;
            background: rgba(22, 119, 255, 0.1);
            border: 1px solid rgba(22, 119, 255, 0.2);
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
        }

        .tech-meta-time {
            color: #6e7d95;
            font-size: 13px;
        }

        .tech-card-score {
            font-size: 18px;
            font-weight: 700;
            color: #1677ff;
            background: rgba(22, 119, 255, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .tech-card-trend {
            font-size: 13px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .tech-card-trend.up {
            background: rgba(255, 77, 79, 0.1);
            color: #ff4d4f;
        }

        .tech-card-trend.down {
            background: rgba(115, 209, 61, 0.1);
            color: #73d13d;
        }

        .tech-card-radar {
            margin: 10px 0;
            background: rgba(22, 119, 255, 0.05);
            border-radius: 8px;
            padding: 10px;
            height: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .tech-card-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .tech-tag {
            font-size: 13px;
            padding: 3px 10px;
            border-radius: 4px;
            background: rgba(138, 180, 248, 0.1);
            color: #8ab4f8;
            border: 1px solid rgba(138, 180, 248, 0.15);
        }

        .tech-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: #6e7d95;
        }

        .tech-card-time {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .new-badge {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(22, 119, 255, 0.15);
            color: #1677ff;
            border: 1px solid rgba(22, 119, 255, 0.25);
        }

        /* ========== 第三部分：历史技术清单 ========== */
        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        .history-card {
            background: rgba(40, 70, 120, 0.05);
            border: 1px solid rgba(40, 70, 120, 0.10);
            border-radius: 10px;
            padding: 16px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .history-card:hover {
            background: rgba(40, 70, 120, 0.08);
            border-color: rgba(22, 119, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .history-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .history-card-name {
            font-size: 15px;
            font-weight: 600;
            color: #2b3a4f;
        }

        .history-card-score {
            font-size: 16px;
            font-weight: 700;
        }

        .history-card-score.high {
            color: #ff4d4f;
        }

        .history-card-score.medium {
            color: #ffa940;
        }

        .history-card-score.low {
            color: #73d13d;
        }

        .history-card-desc {
            font-size: 13px;
            color: #6e7d95;
            line-height: 1.6;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .history-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 10px;
            border-top: 1px solid rgba(40, 70, 120, 0.07);

        .history-card-meta {
            display: flex;
            gap: 12px;
            font-size: 12px;
            color: #6e7d95;
        }

        .history-status {
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 4px;
        }

        .history-status.tracking {
            background: rgba(22, 119, 255, 0.1);
            color: #1677ff;
            border: 1px solid rgba(22, 119, 255, 0.2);
        }

        .history-status.mature {
            background: rgba(115, 209, 61, 0.1);
            color: #73d13d;
            border: 1px solid rgba(115, 209, 61, 0.2);

            border: 1px solid rgba(140, 140, 140, 0.2);

        /* ========== 历史技术清单（融合图片维度） ========== */
        .history-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .history-card {
            background: rgba(255, 255, 255, 0.92);

            border-radius: 12px;

        .history-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .history-card-name {

            font-weight: 700;
            color: #2b3a4f;
        }

        .history-card-score {
            font-size: 20px;
            font-weight: 700;
            color: #ff4d4f;

        /* 生命周期 */

            overflow: hidden;

            height: 100%;

            transition: width 0.8s ease;

        /* 主要数据源 */
        .history-section-title {
            font-size: 12px;
            font-weight: 600;
            color: #6e7d95;
            margin: 14px 0 8px 0;
            text-transform: uppercase;
            letter-spacing: 1px;

        .history-section-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;

        .history-last-active {

            font-weight: 500;
            color: #8ab4f8;
            background: rgba(138, 180, 248, 0.08);
            border: 1px solid rgba(138, 180, 248, 0.18);
            border-radius: 4px;
            padding: 2px 8px;
            text-transform: none;
            letter-spacing: 0;
            white-space: nowrap;
        }

        .history-datasource {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .history-datasource-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;

            line-height: 1.5;

        .history-datasource-tag {

            border: 1px solid rgba(22, 119, 255, 0.2);
            font-weight: 600;

            color: #5a6a82;

        /* 影响域 */
        .history-impact {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
        }

        .history-impact-tag {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 4px;
            background: rgba(138, 180, 248, 0.08);
            color: #8ab4f8;
            border: 1px solid rgba(138, 180, 248, 0.15);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .history-impact-tag.supply::before { content: '⊕'; }
        .history-impact-tag.demand::before { content: '⊖'; }
        .history-impact-tag.grid::before { content: '⊗'; }

        /* 竞争格局 */
        .history-competition {
            background: rgba(40, 70, 120, 0.05);
            border: 1px solid rgba(40, 70, 120, 0.08);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 12px;
            color: #5a6a82;
            line-height: 1.6;
            margin-top: 4px;
            position: relative;
            padding-left: 24px;
        }

        .history-competition::before {
            content: '▲';
            position: absolute;
            left: 10px;
            top: 10px;
            color: #ffa940;
            font-size: 10px;
        }

        /* 主要玩家 */
        .history-players {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
        }
        .history-player-tag {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 4px;
            background: rgba(22, 119, 255, 0.08);
            color: #1677ff;
            border: 1px solid rgba(22, 119, 255, 0.15);
        }

        /* 关键指标 */
        .history-metrics {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
        }

        .history-metric-tag {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 4px;
            background: rgba(115, 209, 61, 0.08);
            color: #73d13d;
            border: 1px solid rgba(115, 209, 61, 0.15);
        }

        /* 技术变革依据 */
        .history-change-basis {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 4px;
        }

        .history-change-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 7px 10px;
            border-radius: 6px;
            background: rgba(40, 70, 120, 0.05);
            border: 1px solid rgba(40, 70, 120, 0.08);
            border-left: 3px solid #6e7d95;
            font-size: 12px;
        }

        .history-change-item.trend-up { border-left-color: #52c41a; }
        .history-change-item.trend-flat { border-left-color: #52c41a; }
        .history-change-item.trend-down { border-left-color: #ff4d4f; }

        .history-change-dim {
            flex-shrink: 0;
            width: 34px;
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 0;
            border-radius: 3px;
            background: rgba(22, 119, 255, 0.1);
            color: #1677ff;
            border: 1px solid rgba(22, 119, 255, 0.2);
        }

        .history-change-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1px;
            min-width: 0;
        }

        .history-change-label {
            font-size: 10px;
            color: #6e7d95;
            letter-spacing: 0.5px;
        }

        .history-change-value {
            color: #5a6a82;
            font-weight: 500;
            line-height: 1.4;
        }

        .history-change-trend {
            flex-shrink: 0;
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
        }

        .trend-up .history-change-trend { color: #52c41a; }
        .trend-flat .history-change-trend { color: #ffa940; }
        .trend-down .history-change-trend { color: #ff4d4f; }

        /* 关联技术 */
        .history-related {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
        }

        .history-related-tag {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 4px;
            background: rgba(138, 180, 248, 0.08);
            color: #8ab4f8;
            border: 1px solid rgba(138, 180, 248, 0.15);
        }

        /* 风险信号 */
        .history-risk {
            background: rgba(255, 77, 79, 0.06);
            border: 1px solid rgba(255, 77, 79, 0.15);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 12px;
            color: #ff7875;
            line-height: 1.6;
            margin-top: 10px;
            position: relative;
            padding-left: 24px;
        }

        .history-risk::before {
            content: '⚠';
            position: absolute;
            left: 10px;
            top: 10px;
            color: #ff4d4f;
            font-size: 11px;
        }

        /* 筛选栏 */
        .history-filter-bar {
            display: flex;
            align-items: flex-end;
            gap: 16px;
            margin-bottom: 20px;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(22, 119, 255, 0.12);
            border-radius: 8px;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-label {
            font-size: 12px;
            color: #6e7d95;
            font-weight: 500;
        }

        .filter-select {
            min-width: 160px;
            padding: 6px 10px;
            background: #ffffff;
            border: 1px solid rgba(22, 119, 255, 0.2);
            border-radius: 6px;
            color: #2b3a4f;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }

        .filter-select:hover, .filter-select:focus {
            border-color: rgba(22, 119, 255, 0.4);
            background: #eef4fc;
        }

        .filter-select option {
            background: #e6ecf4;
            color: #2b3a4f;
        }

        .filter-reset {
            padding: 6px 16px;
            background: rgba(22, 119, 255, 0.1);
            border: 1px solid rgba(22, 119, 255, 0.25);
            border-radius: 6px;
            color: #1677ff;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            margin-left: auto;
        }

        .filter-reset:hover {
            background: rgba(22, 119, 255, 0.2);
            border-color: #1677ff;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #6e7d95;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .scan-section {
                grid-template-columns: 1fr;
            }
            .new-tech-panel {
                max-height: none;
            }
        }

        /* ========== 技术维度详情弹层 ========== */
        .tech-dim-popup {
            position: fixed;
            display: none;
            width: 340px;
            max-height: calc(100vh - 40px);
            background: rgba(255, 255, 255, 0.92);

            padding: 16px;
            z-index: 200;

        .tech-dim-popup::-webkit-scrollbar { width: 5px; }

        // ========== 迷你四维雷达图生成器（纯SVG） ==========
        function getMiniRadar(dim) {
            const cx = 100, cy = 82, r = 46;
            const scores = [dim.novelty, dim.value, dim.relevance, dim.prospect];
            const labels = ['新颖性', '价值性', '关联性', '前瞻性'];
            const angleStep = (Math.PI * 2) / 4;
            const startAngle = -Math.PI / 2; // 从顶部开始

            // 计算四个顶点坐标
            function getPoint(score, idx) {
                const angle = startAngle + idx * angleStep;
                const ratio = score / 100;
                return { x: cx + r * ratio * Math.cos(angle), y: cy + r * ratio * Math.sin(angle) };
            }

            const points = scores.map((s, i) => getPoint(s, i));
            const polyPoints = points.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');

            // 生成背景网格
            let gridPolys = '';
            [0.25, 0.5, 0.75, 1.0].forEach((ratio, idx) => {
                const gPoints = [0, 1, 2, 3].map(i => {
                    const angle = startAngle + i * angleStep;
                    return `${cx + r * ratio * Math.cos(angle)},${cy + r * ratio * Math.sin(angle)}`;
                }).join(' ');
                const opacity = 0.05 + idx * 0.03;
                gridPolys += `<polygon points="${gPoints}" fill="rgba(82, 196, 26,${opacity})" stroke="rgba(82, 196, 26,0.15)" stroke-width="0.5"/>`;
            });

            // 轴线
            let axes = '';
            [0, 1, 2, 3].forEach(i => {
                const angle = startAngle + i * angleStep;
                const x2 = cx + r * Math.cos(angle);
                const y2 = cy + r * Math.sin(angle);
                axes += `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="rgba(82, 196, 26,0.2)" stroke-width="0.5"/>`;
            });

            // 标签位置（稍远一点）
            const labelDist = r + 16;
            const labelPoints = labels.map((text, i) => {
                const angle = startAngle + i * angleStep;
                const x = cx + labelDist * Math.cos(angle);
                const y = cy + labelDist * Math.sin(angle);
                const anchor = i === 0 ? 'middle' : i === 1 ? 'start' : i === 2 ? 'middle' : 'end';
                return `<text x="${x}" y="${y + 4}" text-anchor="${anchor}" fill="#6e7d95" font-size="10" font-family="system-ui, sans-serif">${text}</text>`;
            }).join('');

            // 数据点圆点
            const dots = points.map((p, i) => {
                const color = ['#52c41a', '#73d13d', '#ffa940', '#ff4d4f'][i];
                return `<circle cx="${p.x}" cy="${p.y}" r="3" fill="${color}" stroke="#eef2f7" stroke-width="1.5"/>`;
            }).join('');

            return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" style="width:100%;height:auto;max-height:160px;">${gridPolys}${axes}<polygon points="${polyPoints}" fill="rgba(82, 196, 26,0.15)" stroke="#52c41a" stroke-width="1.5" stroke-linejoin="round"/>${dots}${labelPoints}</svg>`;

                    { source: '中国科学院 · 储能领域专家', tag: '技术走势', view: '从技术路线看，硫化物电解质离子电导率接近甚至超越液态体系、最具性能潜力，但对生产环境与空气稳定性要求苛刻；氧化物与聚合物复合路线在工程化与安全性上更易落地。专家研判，未来3-5年行业将进入半固态电池规模装车、全固态电池示范验证的关键窗口期，谁能率先突破量产良率与界面稳定性难题，谁就能在下一代电池竞争中占据主导地位。', cite: '数据来源：中国科学院物理研究所固态电池研究组公开访谈；《储能科学与技术》2024 年综述。' },
                    { source: '麦肯锡（McKinsey）', tag: '产业影响', view: '麦肯锡分析指出，固态电池或将深刻重塑全球动力电池竞争格局：掌握固态电解质材料、锂金属负极与界面工程核心专利的企业将获得显著的技术溢价与超额收益，而高度依赖液态体系的传统电芯与材料供应商则面临价值重分配甚至被边缘化的风险。这一变革将推动产业链上下游重新洗牌，催生材料、装备与回收等新兴高价值环节。', cite: '数据来源：McKinsey & Company《Battery 2030: Resilient, sustainable, and circular》系列报告。' },
                    { source: '高工锂电 · 行业研究机构', tag: '风险与影响', view: '行业研究机构提醒，当前固态电池领域存在"半固态≠全固态"的概念混淆与资本炒作风险，部分宣传夸大了量产进度。从产业落地看，量产良率偏低、锂硫等关键矿产供应与地缘风险、回收与梯次利用法规缺位、安全与认证标准尚未统一等问题，仍是制约规模化的主要不确定性，需要企业理性投入、监管同步完善，避免技术泡沫与无序竞争。', cite: '数据来源：高工锂电（GGII）《固态电池产业发展研究报告 2024》；行业产能与良率调研。' }

        // ========== 纯SVG降级雷达图（无ECharts依赖） ==========
        function renderFallbackRadar(container) {
            const W=600, H=480, CX=300, CY=240, R=170;
            const dims=['技术新颖性','技术价值性','技术关联性','技术前瞻性'];
            const angles=[-Math.PI/2,0,Math.PI/2,Math.PI];
            const newTechList=weeklyTechs.filter(t=>t.isNew);

            // 动态归一化：让所有技术均匀分布在雷达图内
            const allRawX=weeklyTechs.map(t=>(t.dimensions4.value-t.dimensions4.prospect)/2);
            const allRawY=weeklyTechs.map(t=>(t.dimensions4.relevance-t.dimensions4.novelty)/2);
            const maxAbsX=Math.max(...allRawX.map(Math.abs),1);
            const maxAbsY=Math.max(...allRawY.map(Math.abs),1);

            function calcPos(d4){
                const rawX=(d4.value-d4.prospect)/2, rawY=(d4.relevance-d4.novelty)/2;
                return {x:CX+(rawX/maxAbsX)*R*0.85, y:CY+(rawY/maxAbsY)*R*0.85};
            }

            // 背景网格（同心圆）
            let grid='';
            [0.25,0.5,0.75,1].forEach((ratio,idx)=>{
                const op=0.03+idx*0.02;
                const fillOp = 0.04 + idx * 0.03;
                grid+=`<circle cx="${CX}" cy="${CY}" r="${(R*ratio).toFixed(1)}" fill="rgba(82, 196, 26,${fillOp})" stroke="rgba(82, 196, 26,0.20)" stroke-width="0.5"/>`;
            });
            // 中心填充区域（最内层半透明圆）
            grid+=`<circle cx="${CX}" cy="${CY}" r="${(R*0.25).toFixed(1)}" fill="rgba(82, 196, 26,0.03)" stroke="none"/>`;
            // 轴线
            let axes='';
            angles.forEach(a=>{
                const x=CX+R*Math.cos(a), y=CY+R*Math.sin(a);
                axes+=`<line x1="${CX}" y1="${CY}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="rgba(82, 196, 26,0.15)" stroke-width="0.5"/>`;
            });
            // 维度标签（带闪烁）
            let labels='';
            const labelDist=R+30;
            angles.forEach((a,i)=>{
                const x=CX+labelDist*Math.cos(a), y=CY+labelDist*Math.sin(a);
                labels+=`<text x="${x.toFixed(1)}" y="${(y+5).toFixed(1)}" text-anchor="middle" fill="#52c41a" font-size="12" font-weight="600" font-family="system-ui,sans-serif" style="animation:dimBlink 3s ease-in-out infinite;animation-delay:${i*0.75}s;text-shadow:0 0 10px rgba(82, 196, 26,0.5);">${dims[i]}</text>`;
            });
            // 技术点（SMIL 半径/透明度动画，避免 CSS transform 位移 bug）
            let dots='';
            weeklyTechs.forEach((tech,idx)=>{
                const pos=calcPos(tech.dimensions4);
                const isNew=tech.isNew, color=isNew?'#1677ff':'#ffa940';
                const newIdx=newTechList.findIndex(t=>t.id===tech.id);
                const dly=(idx*0.2).toFixed(1);
                dots+=`<g transform="translate(${pos.x.toFixed(1)},${pos.y.toFixed(1)})" style="cursor:pointer;"
                    class="fallback-tech-dot" data-name="${tech.name}" data-cat="${tech.category}" data-score="${tech.score}" data-isnew="${isNew}" data-newidx="${newIdx}"
                    onclick="fallbackDotClick(this)" onmouseenter="fallbackDotEnter(this,event)" onmouseleave="fallbackDotLeave()" onmousemove="fallbackDotMove(this,event)"
                >
                    <circle fill="url(#dotGlow${isNew?'N':'O'})" opacity="0.5">
                        <animate attributeName="r" values="10;16;10" dur="2.2s" repeatCount="indefinite" begin="${dly}s" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1"/>
                        <animate attributeName="opacity" values="0.5;0.85;0.5" dur="2.2s" repeatCount="indefinite" begin="${dly}s" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1"/>
                    </circle>
                    <circle fill="${color}" stroke="#eef2f7" stroke-width="1.5">
                        <animate attributeName="r" values="4;5.5;4" dur="2.2s" repeatCount="indefinite" begin="${dly}s" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1"/>
                    </circle>
                </g>`;
            });

            container.innerHTML=`
                <svg id="fallbackRadarSvg" viewBox="0 0 ${W} ${H}" style="width:100%;height:100%;display:block;">
                    <defs>
                        <linearGradient id="scanGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="rgba(82, 196, 26,0)"/><stop offset="100%" stop-color="rgba(82, 196, 26,0.50)"/></linearGradient>
                        <radialGradient id="dotGlowN"><stop offset="0%" stop-color="rgba(22, 119, 255,0.6)"/><stop offset="100%" stop-color="rgba(22, 119, 255,0)"/></radialGradient>
                        <radialGradient id="dotGlowO"><stop offset="0%" stop-color="rgba(255,169,64,0.6)"/><stop offset="100%" stop-color="rgba(255,169,64,0)"/></radialGradient>
                    </defs>
                    ${grid}${axes}${labels}${dots}
                    <g style="transform-origin:${CX}px ${CY}px;animation:fallbackRotate 4s linear infinite;">
                        <path d="M ${CX} ${CY} L ${(CX+R*Math.cos(-0.35)).toFixed(1)} ${(CY+R*Math.sin(-0.35)).toFixed(1)} A ${R} ${R} 0 0 1 ${(CX+R*Math.cos(0.35)).toFixed(1)} ${(CY+R*Math.sin(0.35)).toFixed(1)} Z" fill="url(#scanGrad)" opacity="0.5" pointer-events="none"/>
                    </g>
                </svg>
                <div id="fallbackRadarTooltip" class="radar-tooltip-el"></div>
            `;
            container.style.position='relative';

            window._fallbackScan=function(){
                const g=container.querySelector('#fallbackRadarSvg > g:last-child');
                if(g) g.style.animationDuration='0.8s';
                container.querySelectorAll('.fallback-tech-dot').forEach(d=>{ d.style.animationDuration='0.6s'; });
                setTimeout(()=>{
                    if(g) g.style.animationDuration='4s';
                    container.querySelectorAll('.fallback-tech-dot').forEach(d=>{ d.style.animationDuration='2.2s'; });
                },2500);
            };
        }

        // 降级方案点交互（全局函数供SVG onclick调用）
        function fallbackDotEnter(el,e){
            const ttip=document.getElementById('fallbackRadarTooltip');
            if(!ttip) return;
            const tech = weeklyTechs.find(t => t.name === el.dataset.name);

            const d4 = tech?.dimensions4 || {};

                { key: 'prospect',  label: '前瞻性', color: '#ffa940', barColor: 'linear-gradient(90deg,#ffa940,#ffc53d)' },

                    <span style="color:#6e7d95;">${el.dataset.cat}</span>
                    <span style="color:#1677ff;font-weight:700;">${el.dataset.score}分</span>
                    <span style="color:#6e7d95;font-size:12px;">${el.dataset.isnew==='true'?'本周新识别':'持续追踪'}</span>
                </div>
                ${dimRows}
                <div style="margin-top:6px;font-size:11px;color:#6e7d95;">点击查看详细评分依据</div>`;

        // ========== 雷达图全局状态 ==========
        let radarChartInstance = null;

        let scanRotation = 0;

        // ========== 绘制雷达图DOM叠加层（技术点 + 维度标签 + 扫描线） ==========
        function drawRadarOverlay(container) {
            container.querySelectorAll('.radar-overlay-el').forEach(el=> el.remove());
            const rect = container.getBoundingClientRect();
            const cx = rect.width / 2, cy = rect.height / 2, r = Math.min(cx, cy) * 0.65;
            const dims = ['技术新颖性','技术价值性','技术关联性','技术前瞻性'];
            const angles = [-Math.PI/2, 0, Math.PI/2, Math.PI];
            const newTechList = weeklyTechs.filter(t=> t.isNew);

            // 动态归一化：让所有技术均匀分布在雷达图内
            const allRawX = weeklyTechs.map(t => (t.dimensions4.value - t.dimensions4.prospect) / 2);
            const allRawY = weeklyTechs.map(t => (t.dimensions4.relevance - t.dimensions4.novelty) / 2);
            const maxAbsX = Math.max(...allRawX.map(Math.abs), 1);
            const maxAbsY = Math.max(...allRawY.map(Math.abs), 1);

            function calcPos(d4) {
                const rawX = (d4.value - d4.prospect) / 2;
                const rawY = (d4.relevance - d4.novelty) / 2;
                return {
                    x: cx + (rawX / maxAbsX) * r * 0.85,
                    y: cy + (rawY / maxAbsY) * r * 0.85
                };
            }

            // 维度标签（带闪烁）
            const labelDist = r + 30;
            dims.forEach((text, i) => {
                const a = angles[i];
                const el = document.createElement('div');
                el.className = 'radar-dim-label radar-overlay-el';
                el.textContent = text;
                el.style.left = (cx + labelDist * Math.cos(a)) + 'px';
                el.style.top = (cy + labelDist * Math.sin(a) + 4) + 'px';
                el.style.animationDelay = `${i * 0.75}s`;
                container.appendChild(el);
            });

            // 扫描线 SVG
            const svgNS = 'http://www.w3.org/2000/svg';
            const svg = document.createElementNS(svgNS, 'svg');
            svg.setAttribute('width', rect.width);
            svg.setAttribute('height', rect.height);
            svg.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;z-index:4;';
            svg.classList.add('radar-overlay-el');
            const defs = document.createElementNS(svgNS, 'defs');
            const grad = document.createElementNS(svgNS, 'linearGradient');
            grad.setAttribute('id', 'domScanGrad');
            grad.innerHTML = '<stop offset="0%" stop-color="rgba(82, 196, 26,0)"/><stop offset="100%" stop-color="rgba(82, 196, 26,0.45)"/>';
            defs.appendChild(grad);
            svg.appendChild(defs);
            const scanG = document.createElementNS(svgNS, 'g');
            scanG.style.cssText = `transform-origin:${cx}px ${cy}px;animation:scanRotate 4s linear infinite;`;
            const scanPath = document.createElementNS(svgNS, 'path');
            const p1x = cx + r * Math.cos(-0.35), p1y = cy + r * Math.sin(-0.35);
            const p2x = cx + r * Math.cos(0.35), p2y = cy + r * Math.sin(0.35);
            scanPath.setAttribute('d', `M ${cx} ${cy} L ${p1x} ${p1y} A ${r} ${r} 0 0 1 ${p2x} ${p2y} Z`);
            scanPath.setAttribute('fill', 'url(#domScanGrad)');
            scanPath.setAttribute('opacity', '0.5');
            scanG.appendChild(scanPath);
            svg.appendChild(scanG);
            container.appendChild(svg);

            // Tooltip
            const tooltip = document.createElement('div');
            tooltip.className = 'radar-tooltip-el radar-overlay-el';
            container.appendChild(tooltip);

            // 技术点（呼吸闪烁）
            weeklyTechs.forEach((tech, idx) => {
                const pos = calcPos(tech.dimensions4);
                const isNew = tech.isNew, color = isNew ? '#1677ff' : '#ffa940';
                const newIdx = newTechList.findIndex(t => t.id === tech.id);
                const dot = document.createElement('div');
                dot.className = `radar-tech-dot ${isNew ? 'new-tech-dot' : 'old-tech-dot'} radar-overlay-el`;
                dot.style.left = pos.x + 'px';
                dot.style.top = pos.y + 'px';
                dot.style.color = color;
                dot.style.animationDelay = `${idx * 0.2}s`;
                dot.innerHTML = `<div class="radar-tech-dot-glow" style="background:radial-gradient(circle, ${color} 0%, transparent 70%);"></div>
                    <div class="radar-tech-dot-inner" style="background:${color};"></div>`;
                dot.addEventListener('mouseenter', e => {
                    const ev = tech.dimensionEvidence || {};
                    const d4 = tech.dimensions4 || {};
                    const dimRows = [
                        { key: 'novelty',   label: '新颖性', color: '#ff4d4f', barColor: 'linear-gradient(90deg,#ff4d4f,#ff7875)' },
                        { key: 'prospect',  label: '前瞻性', color: '#ffa940', barColor: 'linear-gradient(90deg,#ffa940,#ffc53d)' },
                        { key: 'relevance', label: '关联性', color: '#1677ff', barColor: 'linear-gradient(90deg,#1677ff,#69c0ff)' },
                        { key: 'value',     label: '价值性', color: '#73d13d', barColor: 'linear-gradient(90deg,#73d13d,#95de64)' }
                    ].map(dim => {
                        const score = ev[dim.key]?.score || d4[dim.key] || 0;
                        return buildDimWithSubsHtml(dim.key, dim.label, dim.color, dim.barColor, tech.name, score);
                    }).join('');
                    tooltip.innerHTML = `
                        <div style="font-weight:600;margin-bottom:6px;font-size:15px;">${tech.name}</div>
                        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
                            <span style="color:#6e7d95;">${tech.category}</span>
                            <span style="color:#1677ff;font-weight:700;">${tech.score}分</span>
                            <span style="color:#6e7d95;font-size:12px;">${isNew ? '本周新识别' : '持续追踪'}</span>
                        </div>
                        ${dimRows}
                        <div style="margin-top:6px;font-size:11px;color:#6e7d95;">点击查看详细评分依据</div>
                    `;
                    tooltip.style.display = 'block';
                    tooltip.style.width = '260px';
                    tooltip.style.whiteSpace = 'normal';
                    const crect = container.getBoundingClientRect();
                    tooltip.style.left = (e.clientX - crect.left + 12) + 'px';
                    tooltip.style.top = (e.clientY - crect.top - 8) + 'px';
                });
                dot.addEventListener('mousemove', e => {
                    const crect = container.getBoundingClientRect();
                    tooltip.style.left = (e.clientX - crect.left + 12) + 'px';
                    tooltip.style.top = (e.clientY - crect.top - 8) + 'px';
                });
                dot.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
                dot.addEventListener('click', () => {
                    if (isNew && newIdx >= 0) slideNewTechTo(newIdx);
                    showTechDimPopup(tech, dot);
                });
                container.appendChild(dot);
            });
        }

        // ========== 点击雷达点定位到右侧卡片 ==========

            const dotsContainer = document.getElementById('sliderDots');

        // ========== 手动扫描（新版：控制DOM动画） ==========
        function triggerManualScan() {
            const btn = document.getElementById('manualScanBtn');
            const effect = document.getElementById('radarScanEffect');
            const timeLabel = document.getElementById('lastScanTime');
            if (btn.classList.contains('scanning')) return;

            btn.classList.add('scanning');
            effect.classList.add('scanning');

            // 降级方案同步调用
            if (typeof window._fallbackScan === 'function') window._fallbackScan();

            // 加速所有扫描线
            document.querySelectorAll('#radarChart svg g[style*="scanRotate"], #fallbackRadarSvg g[style*="fallbackRotate"]').forEach(g => {
                g.style.animationDuration = '0.8s';
            });

        // ========== 渲染新技术清单（滑动卡片 + 迷你雷达 + 分数对比） ==========

                                </div>
                            `).join('')}

            }).join('');

            // 渲染指示器

                <div class="slider-dot ${i === 0 ? 'active' : ''}" data-index="${i}"></div>

            // 滑动逻辑
            let currentIndex = 0;

            function updateSlider() {
                track.style.transform = `translateX(-${currentIndex * 100}%)`;

        // 技术成熟度 TRL（根据 lifecycleScore 映射到 9 个阶段）
        function getTrlByScore(score) {
            const stages = [
                { min: 0,  label: 'TRL 1 基本原理发现' },
                { min: 12, label: 'TRL 2 技术概念形成' },
                { min: 23, label: 'TRL 3 关键功能验证' },
                { min: 34, label: 'TRL 4 实验室环境验证' },
                { min: 45, label: 'TRL 5 相关环境验证' },
                { min: 56, label: 'TRL 6 系统/子系统模型验证' },
                { min: 67, label: 'TRL 7 真实环境系统验证' },
                { min: 78, label: 'TRL 8 系统完成并验证' },
                { min: 89, label: 'TRL 9 系统实际应用' }
            ];
            for (let i = stages.length - 1; i >= 0; i--) {
                if (score >= stages[i].min) return stages[i].label;
            }
            return stages[0].label;
        }

        // ========== 渲染历史技术清单（融合图片8维度 + 一二级领域筛选） ==========
        function renderHistoryList() {
            const container = document.getElementById('historyGrid');
            const primaryFilter = document.getElementById('filterPrimary')?.value || '';
            const secondaryFilter = document.getElementById('filterSecondary')?.value || '';
            const sortValue = document.getElementById('filterSort')?.value || 'lastActive-desc';

            const filtered = historyTechs.filter(tech => {
                if (primaryFilter && tech.primaryField !== primaryFilter) return false;
                if (secondaryFilter && tech.secondaryField !== secondaryFilter) return false;
                return true;
            });

            filtered.sort((a, b) => {
                switch (sortValue) {
                    case 'lastActive-desc':
                        return (b.lastActive || '').localeCompare(a.lastActive || '');
                    case 'lastActive-asc':
                        return (a.lastActive || '').localeCompare(b.lastActive || '');
                    case 'firstSeen-desc':
                        return (b.firstSeen || '').localeCompare(a.firstSeen || '');
                    case 'firstSeen-asc':
                        return (a.firstSeen || '').localeCompare(b.firstSeen || '');
                    case 'score-desc':
                        return (b.score || 0) - (a.score || 0);
                    case 'score-asc':
                        return (a.score || 0) - (b.score || 0);
                    case 'novelty-desc':
                        return (b.dimensions4?.novelty || 0) - (a.dimensions4?.novelty || 0);
                    case 'value-desc':
                        return (b.dimensions4?.value || 0) - (a.dimensions4?.value || 0);
                    case 'relevance-desc':
                        return (b.dimensions4?.relevance || 0) - (a.dimensions4?.relevance || 0);
                    case 'prospect-desc':
                        return (b.dimensions4?.prospect || 0) - (a.dimensions4?.prospect || 0);
                    default:
                        return 0;
                }
            });

            // 更新总数显示
            const badge = document.getElementById('historyBadge');
            if (badge) badge.textContent = `累计识别（${filtered.length}/${historyTechs.length}项）`;

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-state-icon">🔍</div>
                        <div>当前筛选条件下无匹配技术</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(tech => {
                const hasDetails = !!tech.lifecycle;
                const details = techDetailsMap[tech.name] || {};

                // 技术变革理由（量化动态指标：论文/专利/智库/产业）
                const changeBasisHtml = tech.changeBasis && tech.changeBasis.length ? `
                    <div class="history-section-title history-section-title-row">
                        <span>技术变革理由</span>
                        ${tech.lastActive ? `<span class="history-last-active">🕐 最近活跃 ${tech.lastActive}</span>` : ''}
                    </div>
                    <div class="history-change-basis">${tech.changeBasis.map(c => `
                        <div class="history-change-item trend-${c.trend}">
                            <span class="history-change-value">${c.value}</span>
                        </div>
                    `).join('')}</div>
                ` : '';

                // 主要玩家
                const playersHtml = details.keyPlayers && details.keyPlayers.length ? `
                    <div class="history-section-title">主要玩家</div>
                    <div class="history-players">${details.keyPlayers.map(p => `
                        <span class="history-player-tag">${p}</span>
                    `).join('')}</div>
                ` : '';

                // 关键指标
                const metricHtml = hasDetails && tech.keyMetrics ? `
                    <div class="history-section-title">关键指标</div>
                    <div class="history-metrics">${tech.keyMetrics.map(m => `
                        <span class="history-metric-tag">${m.label} ${m.value}</span>
                    `).join('')}</div>
                ` : '';

                // 评估维度标签（已移除展示）

                // 风险信号
                const riskHtml = hasDetails && tech.riskSignals ? `
                    <div class="history-risk">${tech.riskSignals.join('；')}</div>
                ` : '';

                // 技术成熟度 TRL（根据 lifecycleScore 映射到 9 个阶段）
                const lifeHtml = hasDetails && tech.lifecycle ? `
                    <div class="history-lifecycle">

                        </div>
                        <div class="history-lifecycle-bar">
                            <div class="history-lifecycle-bar-inner" style="width:${tech.lifecycleScore}%"></div>
                        </div>
                    </div>
                ` : '';

                return `
                    <div class="history-card" data-id="${tech.id}" style="cursor:pointer;">

                                <span class="history-card-name">${tech.name}</span>

            // 绑定卡片点击打开详情页

        // ========== 初始化历史清单筛选器 ==========
        function initHistoryFilter() {
            const primarySelect = document.getElementById('filterPrimary');
            const secondarySelect = document.getElementById('filterSecondary');
            const sortSelect = document.getElementById('filterSort');
            const resetBtn = document.getElementById('filterReset');
            if (!primarySelect || !secondarySelect) return;

            // 提取唯一领域值
            const primarySet = new Set();
            const secondaryMap = new Map(); // primary -> Set of secondary
            historyTechs.forEach(tech => {
                if (tech.primaryField) primarySet.add(tech.primaryField);
                if (tech.primaryField && tech.secondaryField) {
                    if (!secondaryMap.has(tech.primaryField)) secondaryMap.set(tech.primaryField, new Set());
                    secondaryMap.get(tech.primaryField).add(tech.secondaryField);
                }
            });

            const sortedPrimary = Array.from(primarySet).sort();
            const allSecondary = new Set();
            historyTechs.forEach(t => { if (t.secondaryField) allSecondary.add(t.secondaryField); });
            const sortedAllSecondary = Array.from(allSecondary).sort();

            // 填充一级领域
            primarySelect.innerHTML = '<option value="">全部领域</option>' + sortedPrimary.map(p => `<option value="${p}">${p}</option>`).join('');

            // 填充二级领域（全部）
            function fillSecondary(primaryVal) {
                let list = sortedAllSecondary;
                if (primaryVal && secondaryMap.has(primaryVal)) {
                    list = Array.from(secondaryMap.get(primaryVal)).sort();
                }
                const currentSec = secondarySelect.value;
                secondarySelect.innerHTML = '<option value="">全部</option>' + list.map(s => `<option value="${s}">${s}</option>`).join('');
                // 如果当前值仍在列表中则保留
                if (currentSec && list.includes(currentSec)) secondarySelect.value = currentSec;
            }
            fillSecondary('');

            // 事件绑定
            primarySelect.addEventListener('change', () => {
                fillSecondary(primarySelect.value);
                renderHistoryList();
            });
            secondarySelect.addEventListener('change', () => {
                renderHistoryList();
            });
            if (sortSelect) {
                sortSelect.addEventListener('change', () => {
                    renderHistoryList();
                });
            }
            resetBtn.addEventListener('click', () => {
                primarySelect.value = '';
                fillSecondary('');
                if (sortSelect) sortSelect.value = 'lastActive-desc';
                renderHistoryList();
            });
        }

        // ========== 技术维度详情弹层控制 ==========
        const dimConfig = [
            { key: 'novelty',   label: '新颖性', icon: '💡', color: '#ff4d4f', barColor: 'linear-gradient(90deg,#ff4d4f,#ff7875)' },
            { key: 'prospect',  label: '前瞻性', icon: '🔭', color: '#ffa940', barColor: 'linear-gradient(90deg,#ffa940,#ffc53d)' },
            { key: 'relevance', label: '关联性', icon: '🔗', color: '#1677ff', barColor: 'linear-gradient(90deg,#1677ff,#69c0ff)' },
            { key: 'value',     label: '价值性', icon: '💎', color: '#73d13d', barColor: 'linear-gradient(90deg,#73d13d,#95de64)' }
        ];

        function getDimSummary(dimKey, score) {
            if (score >= 90) {
                if (dimKey === 'novelty') return '该维度表现突出，技术处于高度创新活跃期，近期专利与论文增长迅速，原创性成果密集涌现。';
                if (dimKey === 'prospect') return '发展前景广阔，技术路线清晰，产业化预期明确，未来3-5年有望实现规模化突破。';
                if (dimKey === 'relevance') return '与产业链上下游及核心应用场景关联性极高，技术落地路径顺畅，生态支撑完善。';
                if (dimKey === 'value') return '经济价值显著，投资回报可期，规模化应用后有望带来明显的成本下降与效率提升。';
            } else if (score >= 80) {
                if (dimKey === 'novelty') return '创新活跃度较高，专利与论文保持稳健增长，技术持续迭代优化。';
                if (dimKey === 'prospect') return '发展趋势向好，关键瓶颈逐步突破，具备中长期产业化潜力。';
                if (dimKey === 'relevance') return '与主流应用场景匹配度良好，已具备一定的产业链协同基础。';
                if (dimKey === 'value') return '具备较好的商业化价值，随着成本下降和技术成熟，投资回报率将进一步提升。';
            } else if (score >= 70) {
                if (dimKey === 'novelty') return '创新活动较为平稳，技术进入工程优化阶段，原创性突破相对较少。';
                if (dimKey === 'prospect') return '发展前景尚可，但部分技术路线和商业模式仍需进一步验证。';
                if (dimKey === 'relevance') return '与部分应用场景关联性一般，需进一步拓展适配场景。';
                if (dimKey === 'value') return '价值潜力有待释放，当前成本或市场接受度仍是主要制约因素。';
            } else {
                if (dimKey === 'novelty') return '技术相对成熟或创新活跃度较低，近期重大原创成果较少。';
                if (dimKey === 'prospect') return '发展前景受限，可能面临技术瓶颈或替代路线竞争。';
                if (dimKey === 'relevance') return '与当前主流应用场景关联性有限，落地空间较小。';
                if (dimKey === 'value') return '短期经济价值有限，需等待技术突破或成本大幅下降。';
            }
        }

        // 构建雷达图 tooltip 中“维度 + 子指标”的 HTML
        function buildDimWithSubsHtml(dimKey, label, color, barColor, techName, score) {
            const subs = getSubIndicators(dimKey, techName, score);
            const subHtml = subs.map(sub => `
                <div style="display:flex;align-items:center;gap:4px;font-size:11px;margin-left:12px;margin-top:2px;">
                    <span style="width:90px;color:#6e7d95;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${sub.label}">${sub.label}</span>
                    <div style="flex:1;height:3px;background:rgba(40, 70, 120, 0.08);border-radius:2px;"><div style="width:${sub.score}%;height:100%;background:${barColor};border-radius:2px;"></div></div>
                    <span style="width:26px;text-align:right;color:${color};font-weight:600;">${sub.score}</span>
                </div>
            `).join('');
            return `
                <div style="margin-bottom:6px;">
                    <div style="display:flex;align-items:center;gap:6px;font-size:12px;">
                        <span style="width:40px;color:${color};">${label}</span>
                        <div style="flex:1;height:4px;background:rgba(40, 70, 120, 0.10);border-radius:2px;"><div style="width:${score}%;height:100%;background:${barColor};border-radius:2px;"></div></div>
                        <span style="width:32px;text-align:right;color:${color};font-weight:600;">${score}</span>
                    </div>
                    ${subHtml}
                </div>
            `;
        }

        function showTechDimPopup(tech, anchorEl) {
            const popup = document.getElementById('techDimPopup');
            if (!popup) return;

            // Header
            document.getElementById('popupIcon').innerHTML = `<img src="${getTechIcon(tech.category)}" alt="${tech.name}">`;
            document.getElementById('popupName').textContent = tech.name;
            document.getElementById('popupScore').textContent = `综合评分：${tech.score}`;

            // Dimensions
            const dimList = document.getElementById('popupDimList');
            const ev = tech.dimensionEvidence || {};
            dimList.innerHTML = dimConfig.map((dim, idx) => {
                const d = ev[dim.key] || { score: (tech.dimensions4 || {})[dim.key] || 0, patents: 0, papers: 0, patentList: [], paperList: [] };
                const summary = getDimSummary(dim.key, d.score);
                const subIndicators = getSubIndicators(dim.key, tech.name, d.score);
                const subCfg = subIndicatorConfig[dim.key] || {};
                const subHtml = subIndicators.map(sub => `
                    <div class="popup-sub-indicator">
                        <span class="popup-sub-name" title="${sub.label}">${sub.label}</span>
                        <div class="popup-sub-bar"><div class="popup-sub-bar-inner" style="width:${sub.score}%;background:${subCfg.barColor || dim.barColor};"></div></div>
                        <span class="popup-sub-score" style="color:${subCfg.color || dim.color};">${sub.score}</span>
                    </div>
                `).join('');
                return `
                    <div class="popup-dim" data-dim="${dim.key}">
                        <div class="popup-dim-main" onclick="toggleDimEvidence(this)">
                            <span class="popup-dim-icon" style="background:${dim.color}22;color:${dim.color};border:1px solid ${dim.color}44;">${dim.icon}</span>
                            <span class="popup-dim-name">${dim.label}</span>
                            <div class="popup-dim-bar"><div class="popup-dim-bar-inner" style="width:${d.score}%;background:${dim.barColor};"></div></div>
                            <span class="popup-dim-score" style="color:${dim.color};">${d.score}</span>
                            <span class="popup-dim-toggle">▶</span>
                        </div>
                        <div class="popup-evidence">
                            <div class="popup-evidence-summary">${summary}</div>
                            <div class="popup-sub-indicators">${subHtml}</div>
                        </div>
                    </div>
                `;
            }).join('');

            // Position
            const rect = anchorEl.getBoundingClientRect();
            const popupRect = popup.getBoundingClientRect();
            let left = rect.left + rect.width / 2 - 170;
            let top = rect.top - 360;
            if (top < 10) top = rect.bottom + 10;
            if (left < 10) left = 10;
            if (left + 340 > window.innerWidth) left = window.innerWidth - 350;
            popup.style.left = left + 'px';
            popup.style.top = top + 'px';
            popup.classList.add('show');
        }

        function hideTechDimPopup() {
            const popup = document.getElementById('techDimPopup');
            if (popup) popup.classList.remove('show');
        }

        // 生成技术详情页跟踪总结与建议
        function generateTechAdvice(tech) {
            const advices = [];
            const d4 = tech.dimensions4 || {};
            if (tech.score >= 90) {
                advices.push('该技术综合评分较高，建议纳入重点跟踪清单，关注其产业化进展。');
            } else if (tech.score >= 80) {
                advices.push('该技术具备较好的发展潜力，建议持续监测其关键指标变化。');
            } else {
                advices.push('该技术目前评分一般，可作为长期观察对象，等待突破性进展。');
            }

            if (tech.lifecycleScore >= 78) {
                advices.push('技术成熟度较高，建议关注商业化落地场景和规模化应用机会。');
            } else if (tech.lifecycleScore < 56) {
                advices.push('技术仍处于早期阶段，建议重点关注技术瓶颈突破和实验室进展。');
            }

            if (tech.riskSignals && tech.riskSignals.length) {
                advices.push(`存在 ${tech.riskSignals.length} 项潜在风险，建议结合风险因素制定跟踪策略。`);
            }

            if (d4.prospect && d4.prospect >= 90) {
                advices.push('前瞻性强，建议提前布局相关技术生态。');
            }

            return '<ul style="margin:0;padding-left:18px;">' + advices.map(a => `<li style="margin-bottom:6px;">${a}</li>`).join('') + '</ul>';
        }

        // 渲染富文本详情块
        function renderRichSection(data) {
            if (!data) return '<span style="color:#6e7d95;font-size:12px;">暂无数据</span>';
            if (Array.isArray(data)) {
                return `
                    <ul class="tech-detail-rich-list">
                        ${data.map(item => {
                            if (typeof item === 'string') return `<li>${item}</li>`;
                            return `
                                <li>
                                    <strong style="color:#2b3a4f;">${item.title || ''}</strong>：
                                    ${item.content || ''}
                                </li>
                            `;
                        }).join('')}
