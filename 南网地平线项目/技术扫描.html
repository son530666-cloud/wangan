                `;
            }
            return `<div class="tech-detail-rich-content">${data}</div>`;
        }

        // ========== 打开技术详情页（跳转到独立「技术详情」一级导航页） ==========
        // 驱动力分析：结构化对象 → HTML（每点含 ≥70 字描述 + 可展开溯源）
        function driversToHtml(d) {
            if (!d || !(d.groups && d.groups.length)) return '';
            let html = '';
            if (d.summary) html += `<p class="drivers-summary">${d.summary}</p>`;
            d.groups.forEach((g, i) => {
                html += `<div class="drivers-group">
                    <div class="drivers-group-title">${i + 1}. ${g.title}</div>
                    <ul class="drivers-items">${(g.items || []).map(it => `
                        <li>
                            <div class="driver-text">${it.label ? `<strong>${it.label}：</strong>` : ''}${it.text}</div>
                            ${it.source ? `<details class="driver-source"><summary>🔗 查看溯源</summary><div class="driver-source-body">${it.source}</div></details>` : ''}
                        </li>`).join('')}</ul>
                </div>`;
            });
            return html;
        }

        // 无自定义驱动力时，从应用场景/技术难点/政策智库自动归纳（补足描述与溯源）
        function autoDrivers(tech, details) {
            const ds = tech.dataSources || [];
            const pick = (type) => { const f = ds.find(d => d.type === type); return f ? f.content : ''; };
            const srcOf = (type, fallback) => { const c = pick(type); return c ? `数据来源：${type} · ${c}` : (fallback || ''); };
            const groups = [];
            if (details.scenarios && details.scenarios.length) {
                groups.push({ title: '下游应用场景的需求拉动', items: details.scenarios.slice(0, 3).map(s => ({
                    label: s.title,
                    text: `${s.content}该场景对技术的成本、性能与可靠性提出明确要求，是拉动${tech.name}加速迭代与规模化落地的核心下游需求之一，其市场体量与增长速度直接决定了该技术的商业化节奏与产业投资力度。`,
                    source: srcOf('资讯', srcOf('智库', '数据来源：产业应用场景调研'))
                })) });
            }
            if (details.painPoints && details.painPoints.length) {
                groups.push({ title: '技术痛点与突破驱动', items: details.painPoints.slice(0, 3).map(p => ({
                    label: p.title,
                    text: `${p.content}这一瓶颈直接制约了技术的性能上限与产业化进程，是当前学术界与工程界集中攻关的重点方向，其突破进度将在很大程度上决定该技术能否实现关键性能的代际跃迁与成本下探。`,
                    source: srcOf('论文', srcOf('专利', '数据来源：核心技术攻关调研'))
                })) });
            }
            const policy = ds.filter(d => d.type === '政策' || d.type === '智库');
            if (policy.length) {
                groups.push({ title: '政策与战略导向', items: policy.map(d => ({
                    label: d.type,
                    text: `${d.content}相关政策与战略研判为${tech.name}的发展提供了明确的方向指引与资源支持，推动产业链上下游协同布局、标准体系加快完善，从而加速技术从研发验证走向规模化商业应用的整体进程。`,
                    source: `数据来源：${d.type} · ${d.content}`
                })) });
            }
            if (!groups.length) return null;
            return { summary: `${tech.name}的技术变革由下游应用需求、技术瓶颈突破与政策战略导向多重力量共同驱动。`, groups };
        }

        // ===== 机构竞争力图谱 =====
        function instStrength(i) {
            const r = i.patents / (i.papers || 1);
            if (r >= 1.4) return '产业能力型';
            if (r <= 0.7) return '理论研究型';
            return '均衡型';
        }
        function instCoreAdvantage(i, tech, idx) {
            if (i.focus) return i.focus;
            const km = (tech && tech.keyMetrics) || [];
            const s = instStrength(i);
            const routeMap = {
                '理论研究型': ['新材料体系创新', '核心机理研究领先', '前沿技术路线探索'],
                '产业能力型': ['量产工艺成熟', '规模化制造与成本控制强', '工程化集成能力突出'],
                '均衡型': ['主流技术路线成熟', '研产一体化布局完整']
            };
            const routes = routeMap[s] || ['技术路线布局'];
            const route = routes[idx % routes.length];
            const m = km.length ? km[idx % km.length] : null;
            return m ? `${route}，${m.label} ${m.value} 领先` : route;
        }
        function buildLandscapeSvg(insts) {
            if (!insts || !insts.length) return '';
            const W = 760, H = 440, padL = 70, padR = 28, padT = 36, padB = 54;
            const xL = padL, xR = W - padR, yB = H - padB, yT = padT;
            const maxPat = Math.max(...insts.map(i => i.patents), 1) * 1.12;
            const maxPap = Math.max(...insts.map(i => i.papers), 1) * 1.12;
            const sx = v => xL + (v / maxPat) * (xR - xL);
            const sy = v => yB - (v / maxPap) * (yB - yT);
            const midX = xL + (xR - xL) / 2, midY = yT + (yB - yT) / 2;
            let g = '';
            g += `<line x1="${xL}" y1="${yB}" x2="${xR}" y2="${yB}" stroke="rgba(22, 119, 255,0.35)" stroke-width="1"/>`;
            g += `<line x1="${xL}" y1="${yB}" x2="${xL}" y2="${yT}" stroke="rgba(22, 119, 255,0.35)" stroke-width="1"/>`;
            g += `<line x1="${midX}" y1="${yT}" x2="${midX}" y2="${yB}" stroke="rgba(40, 70, 120, 0.09)" stroke-dasharray="4 4"/>`;
            g += `<line x1="${xL}" y1="${midY}" x2="${xR}" y2="${midY}" stroke="rgba(40, 70, 120, 0.09)" stroke-dasharray="4 4"/>`;
            g += `<text x="${xR}" y="${yB + 32}" text-anchor="end" fill="#6e7d95" font-size="12">产业能力（专利量）→</text>`;
            g += `<text x="${xL - 56}" y="${yT - 14}" text-anchor="start" fill="#6e7d95" font-size="12">↑ 理论研究（论文量）</text>`;
            g += `<text x="${xR - 8}" y="${yT + 16}" text-anchor="end" fill="rgba(82,160,40,0.95)" font-size="12">全面领先</text>`;
            g += `<text x="${xL + 8}" y="${yT + 16}" text-anchor="start" fill="rgba(22, 119, 255,0.9)" font-size="12">理论引领</text>`;
            g += `<text x="${xR - 8}" y="${yB - 8}" text-anchor="end" fill="rgba(212,134,6,0.95)" font-size="12">产业主导</text>`;
            g += `<text x="${xL + 8}" y="${yB - 8}" text-anchor="start" fill="rgba(90,106,130,0.95)" font-size="12">潜力跟随</text>`;
            insts.forEach(i => {
                const x = sx(i.patents), y = sy(i.papers);
                const color = i.region === '国外' ? '#ffa940' : '#1677ff';
                g += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="6" fill="${color}" fill-opacity="0.85" stroke="#eef2f7" stroke-width="1.5"><title>${i.name}\n论文 ${i.papers} · 专利 ${i.patents}${i.focus ? '\n' + i.focus : ''}</title></circle>`;
                g += `<text x="${(x + 9).toFixed(1)}" y="${(y + 4).toFixed(1)}" fill="#5a6a82" font-size="11">${i.name}</text>`;
            });
            g += `<circle cx="${xL + 10}" cy="${yT}" r="5" fill="#1677ff"/><text x="${xL + 20}" y="${yT + 4}" fill="#6e7d95" font-size="11">国内</text>`;
            g += `<circle cx="${xL + 70}" cy="${yT}" r="5" fill="#ffa940"/><text x="${xL + 80}" y="${yT + 4}" fill="#6e7d95" font-size="11">国外</text>`;
            return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;">${g}</svg>`;
        }
        function instTableHtml(insts, tech) {
            return `<table class="inst-table">
                <thead><tr><th>机构</th><th>地区</th><th>论文</th><th>专利</th><th>核心优势</th><th>定位</th></tr></thead>
                <tbody>${insts.map((i, idx) => `<tr>
                    <td class="inst-name">${i.name}</td>
                    <td><span class="inst-region ${i.region === '国外' ? 'foreign' : 'domestic'}">${i.region}</span></td>
                    <td>${i.papers}</td><td>${i.patents}</td>
                    <td>${instCoreAdvantage(i, tech, idx)}</td>
                    <td>${instStrength(i)}</td>
                </tr>`).join('')}</tbody>
            </table>`;
        }
        function landscapeNarrativeHtml(n) {
            if (!n) return '';
            const block = (t, c) => c ? `<div class="ls-narr-block"><div class="ls-narr-title">${t}</div><div class="ls-narr-text">${c}</div></div>` : '';
            return block('产业链 / 供应链 / 竞争规则重塑', n.chainChange)
                + block('掉队的传统巨头', n.declined)
                + block('崛起的新势力', n.rising)
                + block('核心盈利模式变迁', n.profitModel);
        }
        function landscapeSummary(insts) {
            if (!insts || insts.length < 2) return '';
            const byPap = [...insts].sort((a, b) => b.papers - a.papers);
            const byPat = [...insts].sort((a, b) => b.patents - a.patents);
            const byBoth = [...insts].sort((a, b) => (b.papers + b.patents) - (a.papers + a.patents));
            const theory = byPap[0], industry = byPat[0], allRound = byBoth[0];
            const dom = insts.filter(i => i.region === '国内').length;
            const frn = insts.filter(i => i.region === '国外').length;
            const theoryCnt = insts.filter(i => instStrength(i) === '理论研究型').length;
            const indCnt = insts.filter(i => instStrength(i) === '产业能力型').length;
            let s = '综合论文与专利两个维度研判：';
            s += `<strong>${allRound.name}</strong>在论文（${allRound.papers}篇）与专利（${allRound.patents}件）上均居前列，呈"全面领先"之势，研发与产业化能力兼备，是当前对该技术价值贡献最大、对上下游产业链整合与带动能力最强的核心玩家。`;
            if (theory.name !== allRound.name) {
                s += `<strong>${theory.name}</strong>以 ${theory.papers} 篇论文位居理论研究之首，在基础机理与源头创新上掌握话语权，但专利转化（${theory.patents} 件）相对有限，更偏"理论引领"角色，是技术原始创新的重要策源地。`;
            }
            if (industry.name !== allRound.name && industry.name !== theory.name) {
                s += `<strong>${industry.name}</strong>则以 ${industry.patents} 件专利领跑产业能力，工程化与量产卡位优势突出，对供应链与成本曲线的实际影响更为直接，是技术规模化落地的关键推动者。`;
            }
            s += `整体看，样本机构中理论研究型 ${theoryCnt} 家、产业能力型 ${indCnt} 家，国内 ${dom} 家、国外 ${frn} 家，${dom >= frn ? '国内机构在数量与产业化落地上占据相对优势' : '国外机构在前沿布局上仍具领先地位'}。理论强者负责"从0到1"的源头突破，产业强者主导"从1到100"的规模化落地，二者的协同程度将在很大程度上决定这场技术变革的演进速度与最终竞争格局。`;
            return s;
        }
        function landscapeToHtml(ls, tech) {
            if (!ls || !ls.institutions || !ls.institutions.length) return '';
            const summary = landscapeSummary(ls.institutions);
            return `<div class="ls-top">
                    <div class="ls-chart">${buildLandscapeSvg(ls.institutions)}</div>
                    <div class="ls-table-wrap">${instTableHtml(ls.institutions, tech)}</div>
                </div>
                ${summary ? `<div class="ls-summary"><div class="ls-summary-title">📋 机构竞争力综合研判</div><div class="ls-summary-text">${summary}</div></div>` : ''}`;
        }
        function autoLandscape(tech, details) {
            const players = (details.keyPlayers || []).slice(0, 10);
            if (!players.length) return null;
            const latin = /[A-Za-z]/;
            const foreignNames = ['丰田', '三星', '日立', '西门子', '松下', '古河', '英飞凌', '罗姆', '现代', '欧盟', '美国', '韩国', '日本'];
            const hash = s => { let h = 0; for (let i = 0; i < s.length; i++) h = (h * 131 + s.charCodeAt(i)) >>> 0; return h; };
            const insts = players.map((name, idx) => {
                const h = hash(name);
                const isForeign = latin.test(name) || foreignNames.some(f => name.includes(f));
                const papers = 120 + (h % 360) + (idx < 3 ? 130 : 0);
                const patents = 110 + ((h >> 4) % 520) + (idx < 3 ? 150 : 0);
                return { name, region: isForeign ? '国外' : '国内', papers, patents, focus: '' };
            });

            const base = tech.lifecycleScore || 60;
            const pains = (details.painPoints || []).map(p => p.title);

                speed = Math.max(20, Math.min(95, speed));

        // ===== 技术全球分布 + 扩散速度与采用率 =====
        const WORLD_COORD = {

            const painPointsHtml = `

                ? players.slice(0, 4).join('、') + (players.length > 4 ? ' 等' : '')

            // 技术介绍：是什么 + 干什么用 + 典型场景（不与其它字段重复）
            const scenarioTitles = (details.scenarios || []).map(s => s.title).filter(Boolean);
            let intro = tech.intro || tech.desc || '';
            if (!tech.intro && scenarioTitles.length) {
                intro += `典型应用场景包括${scenarioTitles.join('、')}等。`;
            }

            // 技术变革理由：每条指标 + 详细解释（按维度生成）
            const changeBasisDetail = (val) => {
                if (val.includes('论文')) return '论文发表量反映学术界对该技术的研究投入与关注热度。增速越快，说明基础研究越活跃、原理与材料体系仍在快速迭代，通常领先产业化 2-3 年，是判断技术成长性的先行指标。';

            const changeBasisHtml = (tech.changeBasis || []).map(c => `
                <div class="tech-change-item trend-${c.trend}">
                    <div class="tech-change-head">${c.value}</div>
                    <div class="tech-change-detail">${changeBasisDetail(c.value)}</div>

            // 驱动力分析（应用场景痛点 / 技术难点 / 政策导向）
            const driversHtml = driversToHtml(tech.drivers || autoDrivers(tech, details));

            // 技术扩散速度（各场景扩散速度与瓶颈）
            const diffusionHtml = diffusionToHtml(tech.diffusion || autoDiffusion(tech, details));

            // 技术全球分布 + 扩散速度与采用率（国家对比）
            const gd = tech.globalDist || autoGlobalDist(tech);
            if (gd.adoption) gd.adoption.leader = buildLeaderText(gd.countries, tech.name);
            const globalDistHtml = globalDistToHtml(gd.countries);
            const adoptionHtml = adoptionToHtml(gd.adoption);

            // 机构竞争力图谱
            const landscapeHtml = landscapeToHtml(tech.landscape || autoLandscape(tech, details), tech);

            // 行业观点（智库/资讯中专家或机构的技术看法）
            const industryViewsHtml = industryViewsToHtml(tech.industryViews || autoIndustryViews(tech, details));

            // 技术演化路径（时间轴）
            const evolutionHtml = evolutionToHtml(tech.evolution || autoEvolution(tech));

            // 未来趋势预测
            const forecastHtml = forecastToHtml(tech.forecast || autoForecast(tech, details));

            return {
                name: tech.name,
                score: tech.score,
                rating: ratingOf(tech.score),
                scoreTip: '综合评分由技术新颖性、价值性、关联性、前瞻性四维加权得出，分值越高代表越值得重点跟踪。',
                category: tech.category,
                primaryField: tech.primaryField || '',
                secondaryField: tech.secondaryField || '',
                desc: tech.desc || '',
                intro: intro,
                changeBasisHtml,
                driversHtml,
                applicationHtml,
                diffusionHtml,
                globalDistHtml,
                countries: gd.countries,
                adoptionHtml,
                landscapeHtml,
                socialHtml: industryViewsHtml,
                evolutionHtml,
                forecastHtml,
                graph: {
                    name: tech.name,
                    field: tech.primaryField || tech.category,
                    secondary: tech.secondaryField || '',
                    players: (details.keyPlayers || []).slice(0, 6),
                    related: (tech.relatedTechs || []).slice(0, 6),
                    scenarios: (details.scenarios || []).map(s => s.title).slice(0, 6)
                },
                dataSourcesModule: buildDataSources(tech, details),
                firstSeen: tech.firstSeen || '',
                lastActive: tech.lastActive || '',
                trl: getTrlByScore(tech.lifecycleScore),
                playersInline,
                iconSrc: getTechIcon(tech.category),
                radarSvg: buildDetailRadarSvg(tech),
                adviceHtml, playersHtml, metricsHtml, risksImpactHtml,
                painPointsHtml, advantagesHtml, scenariosHtml, marketHtml
            };
        }

        // 构建包含全部历史技术详情 + 一二三级分类的 bundle，供详情页下拉切换
        function buildDetailBundle(selectedName) {
            const taxonomy = {};
            const payloads = {};
            historyTechs.forEach(t => {
                const primary = t.primaryField || '未分类';
                const secondary = t.secondaryField || '其他';
                if (!taxonomy[primary]) taxonomy[primary] = {};
                if (!taxonomy[primary][secondary]) taxonomy[primary][secondary] = [];
                if (!taxonomy[primary][secondary].includes(t.name)) taxonomy[primary][secondary].push(t.name);
                payloads[t.name] = buildDetailPayload(t);
            });
            return { selectedName, taxonomy, payloads };
        }

        function openTechDetail(tech) {
            if (!tech) return;
            const json = JSON.stringify(buildDetailBundle(tech.name));
            // 双通道传递：sessionStorage + window.name（window.name 在同一框架内跨页面导航始终保留，兼容 file://）
            try { sessionStorage.setItem('techDetailPayload', json); } catch (e) { console.error('保存技术详情失败:', e); }
            try { window.name = 'TECH_DETAIL:' + json; } catch (e) {}
            // 通知外层综合看板切换到「技术详情」一级导航；独立打开时直接跳转
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({ type: 'navigateTo', page: '技术详情.html' }, '*');
            } else {
                window.location.href = '技术详情.html';
            }
        }

        // ========== 详情页雷达图（纯 SVG，返回字符串） ==========
        function buildDetailRadarSvg(tech) {
            const d4 = tech.dimensions4 || { novelty: 80, value: 80, relevance: 80, prospect: 80 };
            const indicators = [
                { name: '新颖性', key: 'novelty', color: '#ff4d4f' },
                { name: '价值性', key: 'value', color: '#73d13d' },
                { name: '关联性', key: 'relevance', color: '#1677ff' },
                { name: '前瞻性', key: 'prospect', color: '#ffa940' }
            ];

            const W = 400, H = 340, CX = 200, CY = 170, R = 110;
            const angleStep = (Math.PI * 2) / 4;
            const startAngle = -Math.PI / 2;

            function getPoint(score, idx) {
                const angle = startAngle + idx * angleStep;
                const ratio = score / 100;
                return { x: CX + R * ratio * Math.cos(angle), y: CY + R * ratio * Math.sin(angle) };
            }

            let grid = '';
            [0.25, 0.5, 0.75, 1.0].forEach((ratio, idx) => {
                const gPoints = [0, 1, 2, 3].map(i => {
                    const angle = startAngle + i * angleStep;
                    return `${CX + R * ratio * Math.cos(angle)},${CY + R * ratio * Math.sin(angle)}`;
                }).join(' ');
                const opacity = 0.04 + idx * 0.03;
                grid += `<polygon points="${gPoints}" fill="rgba(82, 196, 26,${opacity})" stroke="rgba(82, 196, 26,0.12)" stroke-width="0.5"/>`;
            });

            let axes = '';
            [0, 1, 2, 3].forEach(i => {
                const angle = startAngle + i * angleStep;
                const x2 = CX + R * Math.cos(angle);
                const y2 = CY + R * Math.sin(angle);
                axes += `<line x1="${CX}" y1="${CY}" x2="${x2}" y2="${y2}" stroke="rgba(82, 196, 26,0.15)" stroke-width="0.5"/>`;
            });

            const points = indicators.map((ind, i) => ({ ...getPoint(d4[ind.key], i), score: d4[ind.key], ...ind }));
            const polyPoints = points.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');

            const labelDist = R + 26;
            let labels = '';
            points.forEach((p, i) => {
                const angle = startAngle + i * angleStep;
                const x = CX + labelDist * Math.cos(angle);
                const y = CY + labelDist * Math.sin(angle);
                const anchor = i === 0 ? 'middle' : i === 1 ? 'start' : i === 2 ? 'middle' : 'end';
                const subs = getSubIndicators(p.key, tech.name, p.score);
                const title = `${p.name}: ${p.score}\n` + subs.map(s => `${s.label}: ${s.score}`).join('\n');
                labels += `
                    <g style="cursor:default;">
                        <title>${title.replace(/"/g, '&quot;')}</title>
                        <text x="${x.toFixed(1)}" y="${(y - 6).toFixed(1)}" text-anchor="${anchor}" fill="${p.color}" font-size="13" font-weight="600">${p.name} ${p.score}</text>
                    </g>
                `;
            });

            const dots = points.map(p => `
                <circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4" fill="${p.color}" stroke="#eef2f7" stroke-width="1.5"/>
            `).join('');

            return `
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" style="width:100%;height:100%;">
                    ${grid}${axes}
                    <polygon points="${polyPoints}" fill="rgba(82, 196, 26,0.15)" stroke="#52c41a" stroke-width="2" stroke-linejoin="round"/>
                    ${dots}${labels}
                </svg>
            `;
        }

        window.toggleDimEvidence = function(el) {
            const dim = el.closest('.popup-dim');
            if (dim) dim.classList.toggle('expanded');
        };

        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', () => {
            try { renderWarningModule(); } catch (e) { console.error('预警模块渲染失败:', e); }
            try { renderRadarChart(); } catch (e) { console.error('雷达图渲染失败:', e); }
            try { renderNewTechList(); } catch (e) { console.error('新技术列表渲染失败:', e); }
            try { renderHistoryList(); } catch (e) { console.error('历史清单渲染失败:', e); }
            try { initHistoryFilter(); } catch (e) { console.error('筛选器初始化失败:', e); }

            // 弹层鼠标移出时隐藏
            const popup = document.getElementById('techDimPopup');
            if (popup) {
                popup.addEventListener('mouseleave', () => hideTechDimPopup());
            }
        });
    </script>
</body>
