        function showTechDimPopup(tech, anchorEl) {
            const popup = document.getElementById('techDimPopup');
            if (!popup) return;

            // Header
            document.getElementById('popupIcon').innerHTML = `<img src="${getTechIcon(tech.category)}" alt="${tech.name}">`;
            document.getElementById('popupName').textContent = tech.name;
            document.getElementById('popupScore').textContent = `综合评分：${tech.score}`;

            // Dimensions
            const dimList = document.getElementById('popupDimList');
            const ev = tech.dimensionEvidence || {};
            dimList.innerHTML = dimConfig.map((dim, idx) => {
                const d = ev[dim.key] || { score: (tech.dimensions4 || {})[dim.key] || 0, patents: 0, papers: 0, patentList: [], paperList: [] };
                const summary = getDimSummary(dim.key, d.score);
                const subIndicators = getSubIndicators(dim.key, tech.name, d.score);
                const subCfg = subIndicatorConfig[dim.key] || {};
                const subHtml = subIndicators.map(sub => `
                    <div class="popup-sub-indicator">
                        <span class="popup-sub-name" title="${sub.label}">${sub.label}</span>
                        <div class="popup-sub-bar"><div class="popup-sub-bar-inner" style="width:${sub.score}%;background:${subCfg.barColor || dim.barColor};"></div></div>
                        <span class="popup-sub-score" style="color:${subCfg.color || dim.color};">${sub.score}</span>
                    </div>
                `).join('');
                return `
                    <div class="popup-dim" data-dim="${dim.key}">
                        <div class="popup-dim-main" onclick="toggleDimEvidence(this)">
                            <span class="popup-dim-icon" style="background:${dim.color}22;color:${dim.color};border:1px solid ${dim.color}44;">${dim.icon}</span>
                            <span class="popup-dim-name">${dim.label}</span>
                            <div class="popup-dim-bar"><div class="popup-dim-bar-inner" style="width:${d.score}%;background:${dim.barColor};"></div></div>
                            <span class="popup-dim-score" style="color:${dim.color};">${d.score}</span>
                            <span class="popup-dim-toggle">▶</span>
                        </div>
                        <div class="popup-evidence">
                            <div class="popup-evidence-summary">${summary}</div>
                            <div class="popup-sub-indicators">${subHtml}</div>
                        </div>
                    </div>
                `;
            }).join('');

            // Position
            const rect = anchorEl.getBoundingClientRect();
            const popupRect = popup.getBoundingClientRect();
            let left = rect.left + rect.width / 2 - 170;
            let top = rect.top - 360;
            if (top < 10) top = rect.bottom + 10;
            if (left < 10) left = 10;
            if (left + 340 > window.innerWidth) left = window.innerWidth - 350;
            popup.style.left = left + 'px';
            popup.style.top = top + 'px';
            popup.classList.add('show');
        }

        function hideTechDimPopup() {
            const popup = document.getElementById('techDimPopup');
            if (popup) popup.classList.remove('show');
        }

        // 生成技术详情页跟踪总结与建议
        function generateTechAdvice(tech) {
            const advices = [];
            const d4 = tech.dimensions4 || {};
            if (tech.score >= 90) {
                advices.push('该技术综合评分较高，建议纳入重点跟踪清单，关注其产业化进展。');
            } else if (tech.score >= 80) {
                advices.push('该技术具备较好的发展潜力，建议持续监测其关键指标变化。');
            } else {
                advices.push('该技术目前评分一般，可作为长期观察对象，等待突破性进展。');
            }

            if (tech.lifecycleScore >= 78) {
                advices.push('技术成熟度较高，建议关注商业化落地场景和规模化应用机会。');
            } else if (tech.lifecycleScore < 56) {
                advices.push('技术仍处于早期阶段，建议重点关注技术瓶颈突破和实验室进展。');
            }

            if (tech.riskSignals && tech.riskSignals.length) {
                advices.push(`存在 ${tech.riskSignals.length} 项潜在风险，建议结合风险因素制定跟踪策略。`);
            }

            if (d4.prospect && d4.prospect >= 90) {
                advices.push('前瞻性强，建议提前布局相关技术生态。');
            }

            return '<ul style="margin:0;padding-left:18px;">' + advices.map(a => `<li style="margin-bottom:6px;">${a}</li>`).join('') + '</ul>';
        }

        // 渲染富文本详情块
        function renderRichSection(data) {
            if (!data) return '<span style="color:#8896b3;font-size:12px;">暂无数据</span>';
            if (Array.isArray(data)) {
                return `
                    <ul class="tech-detail-rich-list">
                        ${data.map(item => {
                            if (typeof item === 'string') return `<li>${item}</li>`;
                            return `
                                <li>
                                    <strong style="color:#e0e6ed;">${item.title || ''}</strong>：
                                    ${item.content || ''}
                                </li>
                            `;
                        }).join('')}
                    </ul>
                `;
            }
            return `<div class="tech-detail-rich-content">${data}</div>`;
        }

        // ========== 打开技术详情页（跳转到独立「技术详情」一级导航页） ==========
        function buildDetailPayload(tech) {
            const details = techDetailsMap[tech.name] || {};

            const adviceHtml = generateTechAdvice(tech);

            const playersHtml = (details.keyPlayers && details.keyPlayers.length)
                ? `<ul>${details.keyPlayers.map(p => `<li>${p}</li>`).join('')}</ul>`
                : '<span style="color:#8896b3;font-size:12px;">暂无主要玩家数据</span>';

            const metricsHtml = (tech.keyMetrics && tech.keyMetrics.length)
                ? tech.keyMetrics.map(m => `<span class="tech-detail-metric">${m.label} ${m.value}</span>`).join('')
                : '<span style="color:#8896b3;font-size:12px;">暂无关键指标</span>';

            let risksImpactHtml = '';
            if (tech.riskSignals && tech.riskSignals.length) {
                risksImpactHtml += `
                    <div class="tech-detail-rich-block">
                        <div class="tech-detail-rich-title">潜在风险</div>
                        ${tech.riskSignals.map(r => `<div class="tech-detail-risk-item">${r}</div>`).join('')}
                    </div>`;
            }
            if (details.potentialImpact) {
                risksImpactHtml += `
                    <div class="tech-detail-rich-block">
                        <div class="tech-detail-rich-title">潜在影响</div>
                        ${renderRichSection(details.potentialImpact)}
                    </div>`;
            }
            if (!risksImpactHtml) risksImpactHtml = '<span style="color:#8896b3;font-size:12px;">暂无风险与影响数据</span>';

            const painPointsHtml = `
                <div class="tech-detail-rich-block">
                    <div class="tech-detail-rich-title">技术难点</div>
                    ${renderRichSection(details.painPoints)}
                </div>
                <div class="tech-detail-rich-block">
                    <div class="tech-detail-rich-title">解决方案</div>
                    ${renderRichSection(details.solutions)}
                </div>`;

            const advHalf = Math.ceil((details.advantages?.length || 0) / 2);
            const advantagesHtml = `
                <div class="tech-detail-rich-block">
                    <div class="tech-detail-rich-title">关键指标</div>
                    ${renderRichSection(details.advantages?.slice(0, advHalf))}
                </div>
                <div class="tech-detail-rich-block">
                    <div class="tech-detail-rich-title">竞争优势</div>
                    ${renderRichSection(details.advantages?.slice(advHalf) || [])}
                </div>`;

            const scenariosHtml = `
                <div class="tech-detail-rich-block">
                    <div class="tech-detail-rich-title">典型应用场景</div>
                    ${renderRichSection(details.scenarios)}
                </div>`;

            const marketHtml = `
                <div class="tech-detail-rich-block">
                    <div class="tech-detail-rich-title">市场分析</div>
                    ${renderRichSection(details.marketAnalysis)}
                </div>`;

            const ratingOf = (s) => s >= 85 ? '极高' : s >= 75 ? '高' : s >= 60 ? '中' : '低';
            const players = details.keyPlayers || [];
            const playersInline = players.length
                ? players.slice(0, 4).join('、') + (players.length > 4 ? ' 等' : '')
                : '暂无';

            return {
                name: tech.name,
                score: tech.score,
                rating: ratingOf(tech.score),
                scoreTip: '综合评分由技术新颖性、价值性、关联性、前瞻性四维加权得出，分值越高代表越值得重点跟踪。',
                category: tech.category,
                primaryField: tech.primaryField || '',
                secondaryField: tech.secondaryField || '',
                desc: tech.desc || '',
                firstSeen: tech.firstSeen || '',
                lastActive: tech.lastActive || '',
                trl: getTrlByScore(tech.lifecycleScore),
                playersInline,
                iconSrc: getTechIcon(tech.category),
                radarSvg: buildDetailRadarSvg(tech),
                adviceHtml, playersHtml, metricsHtml, risksImpactHtml,
                painPointsHtml, advantagesHtml, scenariosHtml, marketHtml
            };
        }

        // 构建包含全部历史技术详情 + 一二三级分类的 bundle，供详情页下拉切换
        function buildDetailBundle(selectedName) {
            const taxonomy = {};
            const payloads = {};
            historyTechs.forEach(t => {
                const primary = t.primaryField || '未分类';
                const secondary = t.secondaryField || '其他';
                if (!taxonomy[primary]) taxonomy[primary] = {};
                if (!taxonomy[primary][secondary]) taxonomy[primary][secondary] = [];
                if (!taxonomy[primary][secondary].includes(t.name)) taxonomy[primary][secondary].push(t.name);
                payloads[t.name] = buildDetailPayload(t);
            });
            return { selectedName, taxonomy, payloads };
        }

        function openTechDetail(tech) {
            if (!tech) return;
            const json = JSON.stringify(buildDetailBundle(tech.name));
            // 双通道传递：sessionStorage + window.name（window.name 在同一框架内跨页面导航始终保留，兼容 file://）
            try { sessionStorage.setItem('techDetailPayload', json); } catch (e) { console.error('保存技术详情失败:', e); }
            try { window.name = 'TECH_DETAIL:' + json; } catch (e) {}
            // 通知外层综合看板切换到「技术详情」一级导航；独立打开时直接跳转
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({ type: 'navigateTo', page: '技术详情.html' }, '*');
            } else {
                window.location.href = '技术详情.html';
            }
        }

        // ========== 详情页雷达图（纯 SVG，返回字符串） ==========
        function buildDetailRadarSvg(tech) {
            const d4 = tech.dimensions4 || { novelty: 80, value: 80, relevance: 80, prospect: 80 };
            const indicators = [
                { name: '新颖性', key: 'novelty', color: '#ff4d4f' },
                { name: '价值性', key: 'value', color: '#73d13d' },
                { name: '关联性', key: 'relevance', color: '#40a9ff' },
                { name: '前瞻性', key: 'prospect', color: '#ffa940' }
            ];

            const W = 400, H = 340, CX = 200, CY = 170, R = 110;
            const angleStep = (Math.PI * 2) / 4;
            const startAngle = -Math.PI / 2;

            function getPoint(score, idx) {
                const angle = startAngle + idx * angleStep;
                const ratio = score / 100;
                return { x: CX + R * ratio * Math.cos(angle), y: CY + R * ratio * Math.sin(angle) };
            }

            let grid = '';
            [0.25, 0.5, 0.75, 1.0].forEach((ratio, idx) => {
                const gPoints = [0, 1, 2, 3].map(i => {
                    const angle = startAngle + i * angleStep;
                    return `${CX + R * ratio * Math.cos(angle)},${CY + R * ratio * Math.sin(angle)}`;
                }).join(' ');
                const opacity = 0.04 + idx * 0.03;
                grid += `<polygon points="${gPoints}" fill="rgba(57,255,20,${opacity})" stroke="rgba(57,255,20,0.12)" stroke-width="0.5"/>`;
            });

            let axes = '';
            [0, 1, 2, 3].forEach(i => {
                const angle = startAngle + i * angleStep;
                const x2 = CX + R * Math.cos(angle);
                const y2 = CY + R * Math.sin(angle);
                axes += `<line x1="${CX}" y1="${CY}" x2="${x2}" y2="${y2}" stroke="rgba(57,255,20,0.15)" stroke-width="0.5"/>`;
            });

            const points = indicators.map((ind, i) => ({ ...getPoint(d4[ind.key], i), score: d4[ind.key], ...ind }));
            const polyPoints = points.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');

            const labelDist = R + 26;
            let labels = '';
            points.forEach((p, i) => {
                const angle = startAngle + i * angleStep;
                const x = CX + labelDist * Math.cos(angle);
                const y = CY + labelDist * Math.sin(angle);
                const anchor = i === 0 ? 'middle' : i === 1 ? 'start' : i === 2 ? 'middle' : 'end';
                const subs = getSubIndicators(p.key, tech.name, p.score);
                const title = `${p.name}: ${p.score}\n` + subs.map(s => `${s.label}: ${s.score}`).join('\n');
                labels += `
                    <g style="cursor:default;">
                        <title>${title.replace(/"/g, '&quot;')}</title>
                        <text x="${x.toFixed(1)}" y="${(y - 6).toFixed(1)}" text-anchor="${anchor}" fill="${p.color}" font-size="13" font-weight="600">${p.name} ${p.score}</text>
                    </g>
                `;
            });

            const dots = points.map(p => `
                <circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4" fill="${p.color}" stroke="#0a1628" stroke-width="1.5"/>
            `).join('');

            return `
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" style="width:100%;height:100%;">
                    ${grid}${axes}
                    <polygon points="${polyPoints}" fill="rgba(57,255,20,0.15)" stroke="#39ff14" stroke-width="2" stroke-linejoin="round"/>
                    ${dots}${labels}
                </svg>
            `;
        }

        window.toggleDimEvidence = function(el) {
            const dim = el.closest('.popup-dim');
            if (dim) dim.classList.toggle('expanded');
        };

        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', () => {
            try { renderWarningModule(); } catch (e) { console.error('预警模块渲染失败:', e); }
            try { renderRadarChart(); } catch (e) { console.error('雷达图渲染失败:', e); }
            try { renderNewTechList(); } catch (e) { console.error('新技术列表渲染失败:', e); }
            try { renderHistoryList(); } catch (e) { console.error('历史清单渲染失败:', e); }
            try { initHistoryFilter(); } catch (e) { console.error('筛选器初始化失败:', e); }

            // 弹层鼠标移出时隐藏
            const popup = document.getElementById('techDimPopup');
            if (popup) {
                popup.addEventListener('mouseleave', () => hideTechDimPopup());
            }
        });
    </script>
</body>
</html>
