<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术发展趋势预测 - 河流图</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #0a1628 0%, #0d1b2a 100%);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .chart-wrapper {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(6, 26, 61, 0.6);
            border: 1px solid rgba(0, 212, 255, 0.15);
            border-radius: 8px;
            padding: 20px;
            position: relative;
        }
        .chart-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
        }
        .chart-title {
            font-size: 18px;
            font-weight: 600;
            color: #00d4ff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chart-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 18px;
            background: linear-gradient(180deg, #00d4ff, #0099ff);
            border-radius: 2px;
        }
        .chart-subtitle {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-left: 12px;
            font-weight: normal;
        }
        .legend-hint {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }
        .hint-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .hint-band {
            width: 20px;
            height: 10px;
            border-radius: 2px;
            background: linear-gradient(90deg, #00d4ff, #0099ff);
            opacity: 0.6;
        }
        .hint-line {
            width: 20px;
            height: 2px;
            background: repeating-linear-gradient(90deg, #ff9f43, #ff9f43 3px, transparent 3px, transparent 6px);
        }
        #trendChart {
            width: 100%;
            height: 420px;
        }
    </style>
</head>
<body>
    <div class="chart-wrapper">
        <div class="chart-header">
            <div class="chart-title">
                技术发展趋势预测
                <span class="chart-subtitle">基于多源数据融合分析 | 2026-2029 为趋势预测</span>
            </div>
            <div class="legend-hint">
                <div class="hint-item">
                    <div class="hint-band"></div>
                    <span>历史数据</span>
                </div>
                <div class="hint-item">
                    <div class="hint-line"></div>
                    <span>预测走向</span>
                </div>
            </div>
        </div>
        <div id="trendChart"></div>
    </div>

    <script>
        const chartDom = document.getElementById('trendChart');
        const myChart = echarts.init(chartDom);

        const categories = [
            { name: '智库报告', color: '#2E86AB' },
            { name: '资讯',     color: '#1B5299' },
            { name: '政策',     color: '#00A8E8' },
            { name: '管控清单', color: '#D64045' },
            { name: '专利',     color: '#1DD3B0' },
            { name: '项目',     color: '#8B5CF6' },
            { name: '论文',     color: '#F9A620' },
            { name: '奖项',     color: '#F86624' },
            { name: '机构',     color: '#3A86FF' },
            { name: '人才',     color: '#06D6A0' }
        ];

        const years = ['2018','2019','2020','2021','2022','2023','2024','2025','2026','2027','2028','2029'];

        // 历史数据 (2018-2025)
        const rawHistory = {
            '智库报告': [120, 145, 180, 220, 265, 310, 358, 420],
            '资讯':     [850, 1120, 1480, 1850, 2300, 2800, 3350, 3900],
            '政策':     [45, 58, 72, 88, 105, 128, 155, 180],
            '管控清单':  [12, 18, 25, 32, 42, 55, 68, 82],
            '专利':     [320, 410, 520, 680, 850, 1050, 1280, 1520],
            '项目':     [85, 110, 145, 190, 240, 300, 370, 450],
            '论文':     [560, 720, 910, 1150, 1420, 1750, 2100, 2480],
            '奖项':     [28, 35, 45, 58, 72, 88, 108, 130],
            '机构':     [65, 82, 105, 135, 170, 210, 255, 310],
            '人才':     [150, 195, 250, 320, 400, 490, 590, 700]
        };

        // 预测数据 (2026-2029)
        const rawPredict = {
            '智库报告': [485, 560, 640, 730],
            '资讯':     [4500, 5200, 6000, 6900],
            '政策':     [210, 245, 285, 330],
            '管控清单':  [98, 118, 142, 170],
            '专利':     [1780, 2080, 2420, 2800],
            '项目':     [520, 605, 700, 810],
            '论文':     [2850, 3280, 3760, 4300],
            '奖项':     [155, 185, 220, 260],
            '机构':     [365, 430, 505, 590],
            '人才':     [820, 960, 1120, 1300]
        };

        const series = [];
        const legendData = categories.map(c => c.name);

        categories.forEach(cat => {
            const hist = rawHistory[cat.name];
            const pred = rawPredict[cat.name];
            const data = [];

            // 历史数据：无线条（width:0），纯河流色块
            for (let i = 0; i < hist.length; i++) {
                const item = { value: hist[i] };
                // 历史段不画线，只有面积
                item.lineStyle = { width: 0 };
                item.symbol = 'none';
                data.push(item);
            }

            // 预测数据：虚线轮廓，标示走向
            for (let i = 0; i < pred.length; i++) {
                const item = { value: pred[i] };
                item.lineStyle = { type: 'dashed', width: 1.5, color: cat.color };
                item.itemStyle = { color: 'transparent', borderColor: cat.color, borderWidth: 1.5 };
                item.symbol = 'emptyCircle';
                item.symbolSize = 4;
                data.push(item);
            }

            series.push({
                name: cat.name,
                type: 'line',
                stack: 'River',
                smooth: 0.5,
                showSymbol: false,
                lineStyle: { width: 0 },
                itemStyle: { color: cat.color },
                areaStyle: {
                    opacity: 0.55,
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: cat.color },
                        { offset: 1, color: adjustOpacity(cat.color, 0.15) }
                    ])
                },
                emphasis: {
                    focus: 'series',
                    lineStyle: { width: 0 },
                    areaStyle: { opacity: 0.75 }
                },
                data: data
            });
        });

        // 辅助：给 hex 颜色调整透明度
        function adjustOpacity(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        // 预测区域背景 + 分割线（加到第一个 series 上）
        if (series.length > 0) {
            series[0].markArea = {
                silent: true,
                data: [[
                    { xAxis: '2025', itemStyle: { color: 'rgba(255, 159, 67, 0.03)' } },
                    { xAxis: '2029' }
                ]]
            };
            series[0].markLine = {
                silent: true,
                symbol: 'none',
                lineStyle: { color: 'rgba(255, 159, 67, 0.4)', type: 'dashed', width: 1 },
                label: { show: true, position: 'end', formatter: '预测起点', color: '#ff9f43', fontSize: 10, distance: [0, -18] },
                data: [{ xAxis: '2025' }]
            };
        }

        const option = {
            backgroundColor: 'transparent',
            tooltip: {
                trigger: 'axis',
                axisPointer: { type: 'cross', crossStyle: { color: 'rgba(255,255,255,0.15)' }, label: { backgroundColor: 'rgba(0,0,0,0.7)', color: '#fff' } },
                backgroundColor: 'rgba(6, 26, 61, 0.95)',
                borderColor: 'rgba(0, 212, 255, 0.25)',
                borderWidth: 1,
                textStyle: { color: '#fff', fontSize: 12 },
                formatter: function(params) {
                    const year = params[0].axisValue;
                    const isPredict = ['2026','2027','2028','2029'].includes(year);
                    let html = `<div style="font-weight:600;margin-bottom:8px;color:#00d4ff;font-size:14px;">${year}年 ${isPredict ? '<span style="color:#ff9f43;font-size:12px;">(预测)</span>' : ''}</div>`;
                    let total = 0;
                    params.forEach(p => { if (p.value != null && p.value !== '-') total += Number(p.value); });
                    html += `<div style="margin-bottom:6px;color:rgba(255,255,255,0.5);font-size:11px;">数据总量: ${total.toLocaleString()}</div>`;
                    html += '<table style="width:100%;border-collapse:collapse;">';
                    params.forEach(p => {
                        const marker = `<span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${p.color};margin-right:6px;vertical-align:middle;"></span>`;
                        html += `<tr><td style="padding:3px 0;">${marker}${p.seriesName}</td><td style="padding:3px 0 3px 16px;text-align:right;font-weight:500;">${Number(p.value).toLocaleString()}</td></tr>`;
                    });
                    html += '</table>';
                    return html;
                }
            },
            legend: {
                data: legendData,
                top: 0,
                right: 0,
                icon: 'roundRect',
                itemWidth: 12,
                itemHeight: 8,
                itemGap: 14,
                textStyle: { color: 'rgba(255,255,255,0.7)', fontSize: 11 },
                pageIconColor: '#00d4ff',
                pageTextStyle: { color: 'rgba(255,255,255,0.5)' }
            },
            grid: { left: '2%', right: '3%', bottom: '5%', top: '14%', containLabel: true },
            xAxis: {
                type: 'category',
                boundaryGap: false,
                data: years,
                axisLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } },
                axisTick: { show: false },
                axisLabel: {
                    color: function(value) { return ['2026','2027','2028','2029'].includes(value) ? '#ff9f43' : 'rgba(255,255,255,0.6)'; },
                    fontSize: 11,
                    margin: 12
                },
                splitLine: { show: false }
            },
            yAxis: {
                type: 'value',
                axisLine: { show: false },
                axisTick: { show: false },
                axisLabel: { color: 'rgba(255,255,255,0.5)', fontSize: 11, formatter: v => v >= 1000 ? (v/1000).toFixed(1) + 'k' : v },
                splitLine: { lineStyle: { color: 'rgba(255,255,255,0.06)', type: 'dashed' } }
            },
            series: series,
            animationDuration: 1800,
            animationEasing: 'cubicOut'
        };

        myChart.setOption(option);
        window.addEventListener('resize', () => myChart.resize());
    </script>
</body>
</html>
