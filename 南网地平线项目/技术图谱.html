<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术图谱 - 技术变革地平线全景扫描系统</title>
    <script src="https://lib.baomitu.com/echarts/5.4.3/echarts.min.js"></script>
    <script>
        // ECharts CDN 多源降级
        (function () {
            var cdnList = [
                'https://lib.baomitu.com/echarts/5.4.3/echarts.min.js',
                'https://lf9-cdn-tos.bytecdntp.com/cdn/expire-1-M/echarts/5.4.3/echarts.min.js',
                'https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js'
            ];
            var tried = 1;
            function tryNext() {
                if (typeof echarts !== 'undefined') return;
                if (tried < cdnList.length) {
                    var s = document.createElement('script');
                    s.src = cdnList[tried];
                    tried++;
                    s.onerror = tryNext;
                    document.head.appendChild(s);
                }
            }
            setTimeout(tryNext, 1500);
        })();
    </script>
    <style>
        :root {
            --bg: #eef2f7;
            --bg-grad: linear-gradient(160deg, #f4f7fb 0%, #e9eef5 100%);
            --panel: #ffffff;
            --primary: #1677ff;
            --text: #2b3a4f;
            --text-secondary: #7a8aa0;
            --border: rgba(22, 119, 255, 0.14);
            --shadow: 0 2px 12px rgba(40, 70, 120, 0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-grad);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex; align-items: center; justify-content: space-between;
            height: 56px; padding: 0 24px;
            background: #ffffff;
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow);
            flex-shrink: 0;
            z-index: 2;
        }
        header .h-title { font-size: 18px; font-weight: 700; color: var(--primary); letter-spacing: 1px; }
        header .h-sub { font-size: 12px; color: var(--text-secondary); margin-left: 12px; }

        /* 工具栏 */
        .toolbar {
            display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.7);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .toolbar .tb-group { display: flex; align-items: center; gap: 6px; }
        .toolbar label { font-size: 13px; color: var(--text-secondary); }
        .toolbar input[type="text"], .toolbar select {
            background: #ffffff;
            border: 1px solid #d4ddea;
            color: var(--text);
            padding: 7px 12px;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
        }
        .toolbar input[type="text"]:focus, .toolbar select:focus { border-color: var(--primary); }
        .toolbar input[type="text"] { width: 220px; }
        .toolbar input[type="text"]::placeholder { color: #aab4c4; }
        .toolbar select { cursor: pointer; min-width: 130px; }
        .toolbar select option { background: #fff; }
        .toolbar button {
            background: rgba(22, 119, 255, 0.1);
            border: 1px solid rgba(22, 119, 255, 0.3);
            color: var(--primary);
            padding: 7px 16px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .toolbar button:hover { background: rgba(22, 119, 255, 0.2); }
        .toolbar .tb-hint { font-size: 12px; color: var(--text-secondary); margin-left: auto; }

        /* 图例 */
        .legend-bar {
            display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.45);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .legend-bar .lg-label { font-size: 12px; color: var(--text-secondary); margin-right: 4px; }
        .legend-item {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 12px;
            border-radius: 14px;
            font-size: 12px;
            color: var(--text);
            cursor: pointer;
            border: 1px solid transparent;
            user-select: none;
            transition: all 0.15s;
        }
        .legend-item .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .legend-item.off { opacity: 0.4; text-decoration: line-through; }
        .legend-item:hover { background: rgba(22, 119, 255, 0.08); }

        /* 主区 */
        .main { flex: 1; display: flex; position: relative; overflow: hidden; }
        #graph { flex: 1; height: 100%; }

        /* 详情面板 */
        .detail-panel {
            width: 0;
            background: var(--panel);
            border-left: 1px solid var(--border);
            box-shadow: -2px 0 12px rgba(40, 70, 120, 0.08);
            overflow: hidden;
            transition: width 0.25s;
            flex-shrink: 0;
            display: flex; flex-direction: column;
        }
        .detail-panel.open { width: 420px; }
        .detail-head {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 18px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .detail-head .dh-title { font-size: 16px; font-weight: 600; }
        .detail-head .dh-count { font-size: 12px; color: var(--primary); margin-top: 4px; }
        .detail-head .dh-close {
            background: none; border: none; color: var(--text-secondary);
            font-size: 22px; cursor: pointer; line-height: 1;
        }
        .detail-head .dh-close:hover { color: var(--text); }
        .dp-search-bar {
            padding: 10px 18px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .dp-search-bar input {
            width: 100%;
            background: #ffffff;
            border: 1px solid #d4ddea;
            color: var(--text);
            padding: 7px 12px;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
        }
        .dp-search-bar input:focus { border-color: var(--primary); }
        .dp-search-bar input::placeholder { color: #aab4c4; }
        .detail-body { flex: 1; overflow-y: auto; padding: 12px 18px 24px; }
        .detail-body .dp-row {
            padding: 12px 0;
            border-bottom: 1px solid rgba(40, 70, 120, 0.08);
        }
        .detail-body .dp-row-title { font-size: 13px; line-height: 1.5; margin-bottom: 6px; color: var(--text); }
        .detail-body .dp-meta { font-size: 12px; color: var(--text-secondary); display: flex; flex-wrap: wrap; gap: 4px 14px; }
        .detail-body .dp-meta b { color: #4a5a72; font-weight: 600; }
        .detail-body .dp-foot { font-size: 12px; color: var(--text-secondary); margin-top: 14px; padding-top: 10px; }

        .detail-body::-webkit-scrollbar { width: 6px; }
        .detail-body::-webkit-scrollbar-thumb { background: rgba(22, 119, 255, 0.25); border-radius: 3px; }

        .empty-tip {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            color: var(--text-secondary); font-size: 14px; text-align: center; pointer-events: none;
        }
    </style>
</head>
<body>

<div class="toolbar">
    <div class="tb-group">
        <label>一级领域</label>
        <select id="primarySelect"><option value="">全部</option></select>
    </div>
    <div class="tb-group">
        <label>二级领域</label>
        <select id="secondarySelect"><option value="">全部</option></select>
    </div>
    <div class="tb-group">
        <button id="expandAllBtn">展开全部情报</button>
        <button id="collapseAllBtn">收起全部</button>
    </div>
    <span class="tb-hint">点击「技术」节点可展开/收起其情报类型 · 点击情报节点查看明细</span>
</div>

<div class="legend-bar" id="legendBar">
    <span class="lg-label">图例（点击勾选 / 取消）：</span>
</div>

<div class="main">
    <div id="graph"></div>
    <div class="detail-panel" id="detailPanel">
        <div class="detail-head">
            <div>
                <div class="dh-title" id="dpTitle">明细</div>
                <div class="dh-count" id="dpCount"></div>
            </div>
            <button class="dh-close" id="dpClose">&times;</button>
        </div>
        <div class="dp-search-bar">
            <input type="text" id="dpSearch" placeholder="在该类结果中检索…">
        </div>
        <div class="detail-body" id="dpBody"></div>
    </div>
</div>

<script>
/* ===================== 数据 ===================== */
// 一级 / 二级 / 三级（技术）映射
const fieldMap = {
    '固态电池技术':       { primary: '储能技术',         secondary: '固态电池' },
    '钠离子电池':         { primary: '储能技术',         secondary: '钠离子电池' },
    '数字孪生电网':       { primary: '数字化与智能',     secondary: '数字孪生' },
    '量子加密通信':       { primary: '数字化与智能',     secondary: '量子通信' },
    'AI电网调度大脑':     { primary: '数字化与智能',     secondary: 'AI应用' },
    '边缘计算终端':       { primary: '数字化与智能',     secondary: '边缘计算' },
    '超导电缆输电':       { primary: '输配电技术',       secondary: '超导输电' },
    '无线电能传输':       { primary: '输配电技术',       secondary: '无线输电' },
    '分布式能源路由器':   { primary: '输配电技术',       secondary: '能源路由器' },
    '柔性直流电网':       { primary: '输配电技术',       secondary: '柔性直流' },
    '虚拟电厂聚合平台':   { primary: '能源交易与互联网', secondary: '虚拟电厂' },
    '区块链电力交易':     { primary: '能源交易与互联网', secondary: '区块链交易' },
    '第三代半导体SiC':    { primary: '电力电子技术',     secondary: '宽禁带半导体' },
    '石墨烯电力器件':     { primary: '电力电子技术',     secondary: '石墨烯器件' },

// 主要玩家（用于机构 / 人才 / 专利等明细）
const playersMap = {
    '固态电池技术':     ['丰田汽车', 'QuantumScape', '宁德时代', '三星SDI', 'Solid Power', '卫蓝新能源'],
    '钠离子电池':       ['宁德时代', '中科海钠', '华阳股份', '孚能科技', '多氟多', 'Farasis'],
    '数字孪生电网':     ['PTC', 'AVEVA', '西门子', '南瑞信通', '国网浙江电力', '华为'],
    '量子加密通信':     ['国盾量子', '科大国创', '中国电科', '华为', '东芝', 'ID Quantique'],
    'AI电网调度大脑':   ['Google DeepMind', '华为', '阿里云', '南瑞集团', '国家电网', 'OpenAI'],
    '边缘计算终端':     ['华为', '研华科技', '英伟达', '南瑞集团', '阿里云', '浪潮'],
    '超导电缆输电':     ['古河电工', '日立', '西部超导', '上海电缆所', '美国SuperPower', '韩国LS电缆'],
    '无线电能传输':     ['WiTricity', 'Plugless Power', '比亚迪', '华为', 'Qualcomm Halo', 'Bombardier'],
    '分布式能源路由器': ['ABB', '西门子', '华为数字能源', '南瑞集团', '阳光电源', '特变电工'],
    '柔性直流电网':     ['ABB', '西门子', '南瑞集团', '许继电气', '国家电网', '南方电网'],
    '虚拟电厂聚合平台': ['特斯拉Autobidder', 'Next Kraftwerke', 'AutoGrid', '国电投', '华能', '阿里云能耗云'],
    '区块链电力交易':   ['PowerLedger', 'Enerchain', 'IBM', '蚂蚁链', '趣链科技', '国家电网电商公司'],
    '第三代半导体SiC':  ['英飞凌', 'Wolfspeed', '意法半导体', '三安光电', '比亚迪半导体', '华润微'],
    '石墨烯电力器件':   ['IBM', '华为', '欧盟石墨烯旗舰', '广汽集团', 'Skeleton Technologies', '贝特瑞'],
    '钙钛矿太阳能电池': ['Oxford PV', '协鑫光电', '纤纳光电', '隆基绿能', '宁德时代', '极电光能'],
    '氢能储运一体化':   ['国家能源集团', '隆基氢能', '亿华通', '美锦能源', '西门子能源', '康明斯']
};

// 情报类型定义（颜色 + 计数基准）—— 与「技术扫描」buildDataSources 保持一致口径
const intelTypes = [
    { key: 'think',   label: '智库报告', color: '#f5222d', base: 80,   mod: 300 },
    { key: 'news',    label: '资讯',     color: '#13c2c2', base: 2000, mod: 9000 },
    { key: 'policy',  label: '政策',     color: '#52c41a', base: 60,   mod: 200 },
    { key: 'patent',  label: '专利',     color: '#d48806', base: 3000, mod: 12000 },
    { key: 'project', label: '项目',     color: '#2f54eb', base: 40,   mod: 200 },
    { key: 'paper',   label: '论文',     color: '#fa541c', base: 1500, mod: 8000 },
    { key: 'award',   label: '奖项',     color: '#eb2f96', base: 5,    mod: 30 },
    { key: 'org',     label: '机构',     color: '#1890ff', base: 80,   mod: 400 },
    { key: 'talent',  label: '人才',     color: '#722ed1', base: 200,  mod: 1500 }
];

// 层级节点颜色
const LEVEL_COLORS = {
    root:      '#096dd9',
    primary:   '#08979c',
    secondary: '#9254de',
    tech:      '#fa8c16'
};

/* ===================== 情报明细生成（移植自技术扫描 buildDataSources） ===================== */
function hashStr(s) { let h = 0; for (let i = 0; i < s.length; i++) h = (h * 131 + s.charCodeAt(i)) >>> 0; return h; }
function buildIntel(techName) {
    const h = hashStr(techName);
    const N = techName;
    const cat = fieldMap[techName] ? fieldMap[techName].primary : '电网技术';
    const players = playersMap[techName] || ['宁德时代', '丰田汽车', 'QuantumScape', '中科院'];
    const p = i => players[i % players.length];
    const baseY = 2026;
    const y = off => baseY - off;
    const pad = n => String(n).padStart(2, '0');
    const d = (off, mo, da) => `${y(off)}-${pad(mo)}-${pad(da)}`;
    const c = (base, mod) => base + ((h >> (base % 7)) % mod);
    const isForeign = nm => /[A-Za-z]/.test(nm) || ['丰田', '三星', '松下', '日立', '西门子', '东芝'].some(f => nm.includes(f));
    const pno = seed => (seed % 900000 + 100000);
    const statuses = ['授权', '实质审查', '公开', 'PCT国际阶段'];

    const data = {
        think: {
            count: c(80, 300),
            rows: [
                { title: `${N}产业发展与投资前景研究报告`, meta: { 发布机构: 'BloombergNEF', 发布日期: d(1, 3, 12), 类型: '产业研究' } },
                { title: `全球${N}技术成熟度评估`, meta: { 发布机构: 'Gartner', 发布日期: d(1, 6, 8), 类型: '技术评估' } },
                { title: `${N}对能源转型的影响白皮书`, meta: { 发布机构: 'IEA', 发布日期: d(2, 9, 20), 类型: '白皮书' } },
                { title: `${cat}赛道投资图谱`, meta: { 发布机构: '麦肯锡', 发布日期: d(2, 11, 3), 类型: '投资图谱' } }
            ]
        },
        news: {
            count: c(2000, 9000),
            rows: [
                { title: `${p(0)}宣布${N}重大技术突破`, meta: { 来源: '财联社', 日期: d(0, 2, 18) } },
                { title: `${N}迎来量产元年，多家企业加速布局`, meta: { 来源: '第一财经', 日期: d(0, 5, 9) } },
                { title: `${p(1)}与车企/电网达成${N}战略合作`, meta: { 来源: '盖世汽车', 日期: d(0, 7, 22) } },
                { title: `${N}成本快速下探，平价拐点临近`, meta: { 来源: '高工锂电', 日期: d(1, 1, 15) } }
            ]
        },
        policy: {
            count: c(60, 200),
            rows: [
                { title: `关于推动${cat}高质量发展的指导意见`, meta: { 发文机构: '国家发改委', 发布日期: d(1, 4, 1), 级别: '国家级' } },
                { title: `${N}产业发展行动计划`, meta: { 发文机构: '工业和信息化部', 发布日期: d(1, 8, 16), 级别: '部委级' } },
                { title: `新型技术示范应用支持政策`, meta: { 发文机构: '国家能源局', 发布日期: d(2, 10, 11), 级别: '国家级' } },
                { title: `欧盟相关法规与补贴方案`, meta: { 发文机构: 'European Commission', 发布日期: d(2, 12, 5), 级别: '国际' } }
            ]
        },
        patent: {
            count: c(3000, 12000),
            rows: [
                { title: `一种${N}用核心材料及其制备方法`, meta: { 申请人: p(0), 申请日: d(1, 3, 21), 类型: '发明专利', 法律状态: statuses[h % 4], 公开号: `CN${y(1)}1${pno(h)}A` } },
                { title: `${N}界面修饰结构及电化学器件`, meta: { 申请人: p(1), 申请日: d(1, 7, 5), 类型: '发明专利', 法律状态: '授权', 公开号: `CN${y(1)}2${pno(h >> 3)}B` } },
                { title: `高可靠${N}封装与系统集成工艺`, meta: { 申请人: p(2), 申请日: d(2, 9, 28), 类型: '发明专利', 法律状态: '在审', 公开号: `US${y(2)}/${pno(h >> 5)}A1` } },
                { title: `${N}规模化制备装备与方法`, meta: { 申请人: p(3), 申请日: d(2, 11, 2), 类型: '实用新型', 法律状态: '实质审查', 公开号: `CN${y(2)}3${pno(h >> 7)}A` } }
            ]
        },
        project: {
            count: c(40, 200),
            rows: [
                { title: `${N}关键材料与工程化研究`, meta: { 承担单位: p(0), 资助机构: '国家重点研发计划', 起止: `${y(2)}–${y(-2)}`, 经费: '¥8000万' } },
                { title: `${cat}示范应用工程`, meta: { 承担单位: p(1), 资助机构: '国家能源局', 起止: `${y(1)}–${y(-1)}`, 经费: '¥1.2亿' } },
                { title: `${N}产业化中试线建设`, meta: { 承担单位: p(2), 资助机构: '地方产业基金', 起止: `${y(1)}–${y(-2)}`, 经费: '¥5000万' } }
            ]
        },
        paper: {
            count: c(1500, 8000),
            rows: [
                { title: `High-performance ${N} via interface engineering`, meta: { 期刊: 'Nature Energy', 团队: p(3), 年份: y(1), 被引: c(120, 400) } },
                { title: `${N}核心机理与材料体系研究`, meta: { 期刊: 'J. Power Sources', 团队: '清华大学团队', 年份: y(1), 被引: c(60, 200) } },
                { title: `Scalable manufacturing of ${N}`, meta: { 期刊: 'Joule', 团队: 'MIT Group', 年份: y(2), 被引: c(40, 150) } }
            ]
        },
        award: {
            count: c(5, 30),
            rows: [
                { title: `${cat}科学技术奖`, meta: { 获奖单位: p(0), 颁奖机构: '中国电力企业联合会', 年份: y(1), 等级: '一等奖' } },
                { title: `国家技术发明奖`, meta: { 获奖单位: p(1), 颁奖机构: '国务院', 年份: y(2), 等级: '二等奖' } },
                { title: `国际技术创新奖`, meta: { 获奖单位: p(2), 颁奖机构: 'IEEE', 年份: y(2), 等级: '年度创新' } }
            ]
        },
        org: {
            count: c(80, 400),
            rows: players.slice(0, 6).map(pl => ({
                title: pl,
                meta: { 类型: isForeign(pl) ? '国外企业/机构' : '国内企业/机构', 地区: isForeign(pl) ? '海外' : '中国', 方向: `${N}研发与产业化` }
            }))
        },
        talent: {
            count: c(200, 1500),
            rows: [
                { title: `${N}首席科学家`, meta: { 单位: p(0), 头衔: '首席科学家 / 技术总监', 方向: `${N}核心工艺与材料` } },
                { title: `${cat}学科带头人`, meta: { 单位: '重点高校 / 科研院所', 头衔: '教授 / 院士', 方向: `${N}基础研究` } },
                { title: `${N}总工程师`, meta: { 单位: p(1), 头衔: '总工程师', 方向: '工程化与规模量产' } }
            ]
        }
    };
    return data;
}

// 预生成每个技术的情报
const intelCache = {};
Object.keys(fieldMap).forEach(t => { intelCache[t] = buildIntel(t); });

// 聚合一级/二级领域情报（汇总其下所有技术）
function aggregateIntel(techList) {
    const agg = {};
    intelTypes.forEach(it => {
        let count = 0, rows = [];
        techList.forEach(t => {
            const node = intelCache[t][it.key];
            count += node.count;
            rows = rows.concat(node.rows.slice(0, 2).map(r => Object.assign({ _tech: t }, r)));
        });
        agg[it.key] = { count, rows: rows.slice(0, 18) };
    });
    return agg;
}
const primaryTechs = {}, secondaryTechs = {};
Object.keys(fieldMap).forEach(t => {
    const f = fieldMap[t];
    (primaryTechs[f.primary] = primaryTechs[f.primary] || []).push(t);
    const sk = f.primary + '/' + f.secondary;
    (secondaryTechs[sk] = secondaryTechs[sk] || []).push(t);
});
const primaryIntelCache = {}, secondaryIntelCache = {};
Object.keys(primaryTechs).forEach(p => { primaryIntelCache[p] = aggregateIntel(primaryTechs[p]); });
Object.keys(secondaryTechs).forEach(sk => { secondaryIntelCache[sk] = aggregateIntel(secondaryTechs[sk]); });

/* ===================== 节点类型 / 图例 ===================== */
// 类别顺序：层级三类 + 9 情报类型
const categories = [
    { key: 'primary',   name: '一级领域', color: LEVEL_COLORS.primary },
    { key: 'secondary', name: '二级领域', color: LEVEL_COLORS.secondary },
    { key: 'tech',      name: '技术',     color: LEVEL_COLORS.tech }
].concat(intelTypes.map(t => ({ key: t.key, name: t.label, color: t.color })));

const catIndex = {};
categories.forEach((c, i) => { catIndex[c.key] = i; });

// 图例选中状态（全部默认开启）
const legendState = {};
categories.forEach(c => { legendState[c.name] = true; });

/* ===================== 交互状态 ===================== */
const expandedNodes = new Set();   // 已展开情报的节点 id（一级/二级/技术通用）
let filterPrimary = '';
let filterSecondary = '';
let keyword = '';

/* ===================== 构建图数据 ===================== */
function buildGraph() {
    const nodes = [];
    const links = [];
    const nodeIds = new Set();

    function addNode(n) {
        if (nodeIds.has(n.id)) return;
        nodeIds.add(n.id);
        nodes.push(n);
    }

    // 为某个节点挂载 9 类情报子节点
    function addIntelNodes(ownerId, ownerName, intelObj) {
        intelTypes.forEach(it => {
            const node = intelObj[it.key];
            const iid = 'I_' + ownerId + '_' + it.key;
            addNode({
                id: iid,
                name: `${it.label} ${node.count}`,
                category: catIndex[it.key],
                value: it.label,
                symbolSize: 15,
                dataType: 'intel',
                intelKey: it.key,
                ownerName: ownerName,
                intelData: node,
                label: { fontSize: 11, color: '#5a6a82' }
            });
            links.push({ source: ownerId, target: iid, lineStyle: { color: it.color, opacity: 0.45 } });
        });
    }

    // 根节点
    const ROOT = '__root__';
    addNode({
        id: ROOT, name: '电网技术图谱', value: 'root',
        symbolSize: 64, itemStyle: { color: LEVEL_COLORS.root },
        label: { fontSize: 16, fontWeight: 'bold' }
    });

    const kw = keyword.trim().toLowerCase();
    const matchKw = txt => kw && txt.toLowerCase().indexOf(kw) >= 0;
    const expStyle = (matched, expanded) => matched
        ? { borderColor: '#ff4d4f', borderWidth: 3 }
        : (expanded ? { borderColor: '#1f2d3d', borderWidth: 2 } : undefined);

    // 收集层级
    const primaries = {};   // primary -> { secondaries: { secondary -> [techs] } }
    Object.keys(fieldMap).forEach(tech => {
        const f = fieldMap[tech];
        if (filterPrimary && f.primary !== filterPrimary) return;
        if (filterSecondary && f.secondary !== filterSecondary) return;
        primaries[f.primary] = primaries[f.primary] || {};
        primaries[f.primary][f.secondary] = primaries[f.primary][f.secondary] || [];
        primaries[f.primary][f.secondary].push(tech);
    });

    Object.keys(primaries).forEach(primary => {
        const pid = 'P_' + primary;
        const pExpanded = expandedNodes.has(pid);
        addNode({
            id: pid, name: primary, category: catIndex.primary, value: '一级领域',
            symbolSize: 48, dataType: 'primary',
            itemStyle: expStyle(matchKw(primary), pExpanded),
            label: { fontSize: 14, fontWeight: 'bold' }
        });
        links.push({ source: ROOT, target: pid });
        if (pExpanded) addIntelNodes(pid, primary, primaryIntelCache[primary]);

        Object.keys(primaries[primary]).forEach(secondary => {
            const sid = 'S_' + primary + '_' + secondary;
            const sExpanded = expandedNodes.has(sid);
            addNode({
                id: sid, name: secondary, category: catIndex.secondary, value: '二级领域',
                symbolSize: 34, dataType: 'secondary',
                itemStyle: expStyle(matchKw(secondary), sExpanded),
                label: { fontSize: 13 }
            });
            links.push({ source: pid, target: sid });
            if (sExpanded) addIntelNodes(sid, secondary, secondaryIntelCache[primary + '/' + secondary]);

            primaries[primary][secondary].forEach(tech => {
                const tid = 'T_' + tech;
                const tExpanded = expandedNodes.has(tid);
                addNode({
                    id: tid, name: tech, category: catIndex.tech, value: '技术',
                    symbolSize: 26, dataType: 'tech', techName: tech,
                    itemStyle: expStyle(matchKw(tech), tExpanded),
                    label: { fontSize: 12 }
                });
                links.push({ source: sid, target: tid });
                if (tExpanded) addIntelNodes(tid, tech, intelCache[tech]);
            });
        });
    });

    return { nodes, links };
}

/* ===================== 渲染 ===================== */
let chart = null;

function render() {
    const { nodes, links } = buildGraph();

    // 依据图例状态过滤显示的类别
    const selected = {};
    categories.forEach(c => { selected[c.name] = legendState[c.name]; });

    const option = {
        backgroundColor: 'transparent',
        tooltip: {
            backgroundColor: 'rgba(255,255,255,0.98)',
            borderColor: 'rgba(22,119,255,0.3)',
            textStyle: { color: '#2b3a4f', fontSize: 12 },
            extraCssText: 'box-shadow:0 4px 16px rgba(40,70,120,0.15);',
            formatter: params => {
                if (params.dataType === 'edge') return '';
                const d = params.data;
                if (d.dataType === 'intel') {
                    return `<b>${d.ownerName}</b><br/>${d.name}<br/><span style="color:#9aa7ba">点击查看明细</span>`;
                }
                if (d.dataType === 'primary' || d.dataType === 'secondary' || d.dataType === 'tech') {
                    const lv = d.dataType === 'primary' ? '一级领域' : (d.dataType === 'secondary' ? '二级领域' : '技术');
                    return `<b>${d.name}</b>（${lv}）<br/><span style="color:#9aa7ba">点击${expandedNodes.has(d.id) ? '收起' : '展开'}情报类型</span>`;
                }
                return `<b>${d.name}</b><br/>${d.value || ''}`;
            }
        },
        legend: [{ show: false, data: categories.map(c => c.name), selected }],
        animationDuration: 600,
        animationEasingUpdate: 'cubicOut',
        series: [{
            type: 'graph',
            layout: 'force',
            roam: true,
            draggable: true,
            focusNodeAdjacency: true,
            categories: categories.map(c => ({ name: c.name, itemStyle: { color: c.color } })),
            label: {
                show: true,
                position: 'right',
                color: '#3a4a60',
                formatter: '{b}'
            },
            edgeLabel: { show: false },
            lineStyle: { color: 'rgba(120,140,170,0.35)', width: 1, curveness: 0.05 },
            emphasis: {
                focus: 'adjacency',
                lineStyle: { width: 2.5 },
                label: { color: '#1f2d3d', fontWeight: 'bold' }
            },
            force: {
                repulsion: 240,
                gravity: 0.08,
                edgeLength: [40, 130],
                friction: 0.55,
                layoutAnimation: true
            },
            data: nodes,
            links: links,
            selectedMode: false
        }]
    };
    chart.setOption(option, { notMerge: true });
    setTimeout(() => chart && chart.resize(), 50);
}

// 点击节点：技术 -> 展开/收起；情报 -> 明细面板
function attachChartEvents() {
    chart.on('click', params => {
        const d = params.data;
        if (!d || params.dataType === 'edge') return;
        if (d.dataType === 'primary' || d.dataType === 'secondary' || d.dataType === 'tech') {
            if (expandedNodes.has(d.id)) expandedNodes.delete(d.id);
            else expandedNodes.add(d.id);
            closeDetail();
            render();
        } else if (d.dataType === 'intel') {
            openDetail(d.ownerName, d.intelKey, d.intelData);
        }
    });
    window.addEventListener('resize', () => chart && chart.resize());
}

/* ===================== 图例（HTML 自定义，支持勾选/取消） ===================== */
function buildLegend() {
    const bar = document.getElementById('legendBar');
    categories.forEach(c => {
        const item = document.createElement('span');
        item.className = 'legend-item';
        item.dataset.name = c.name;
        item.innerHTML = `<span class="dot" style="background:${c.color}"></span>${c.name}`;
        item.addEventListener('click', () => {
            legendState[c.name] = !legendState[c.name];
            item.classList.toggle('off', !legendState[c.name]);
            render();
        });
        bar.appendChild(item);
    });
}

/* ===================== 详情面板 ===================== */
const detailPanel = document.getElementById('detailPanel');
let dpState = { tech: '', it: null, count: 0, rows: [] };

function renderDetailRows(filterText) {
    const it = dpState.it;
    if (!it) return;
    const kw = (filterText || '').trim().toLowerCase();
    const rows = kw
        ? dpState.rows.filter(r => {
            if (r.title.toLowerCase().indexOf(kw) >= 0) return true;
            if (r._tech && r._tech.toLowerCase().indexOf(kw) >= 0) return true;
            return Object.values(r.meta).some(v => String(v).toLowerCase().indexOf(kw) >= 0);
        })
        : dpState.rows;

    const body = document.getElementById('dpBody');
    if (!rows.length) {
        body.innerHTML = `<div class="dp-foot" style="margin-top:20px;">未找到匹配「${filterText}」的条目。</div>`;
        return;
    }
    body.innerHTML = rows.map(r => {
        const metaHtml = Object.keys(r.meta).map(k => `<span><b>${k}：</b>${r.meta[k]}</span>`).join('');
        const techTag = r._tech ? `<span style="display:inline-block;font-size:11px;color:#1677ff;background:rgba(22,119,255,0.1);border-radius:4px;padding:0 6px;margin-right:6px;">${r._tech}</span>` : '';
        return `<div class="dp-row" style="border-left:3px solid ${it.color};padding-left:10px;">
            <div class="dp-row-title">${techTag}${r.title}</div>
            <div class="dp-meta">${metaHtml}</div>
        </div>`;
    }).join('') + `<div class="dp-foot">${kw ? `匹配 ${rows.length} 条 · ` : ''}以上为代表性示例，完整 ${dpState.count.toLocaleString()} 条数据可在「技术扫描 / 技术详情」相关数据源中查看。</div>`;
}

function openDetail(ownerName, intelKey, node) {
    const it = intelTypes.find(t => t.key === intelKey);
    dpState = { owner: ownerName, it, count: node.count, rows: node.rows };
    document.getElementById('dpTitle').textContent = `${ownerName} · ${it.label}`;
    document.getElementById('dpCount').textContent = `共约 ${node.count.toLocaleString()} 条 · 示例 ${node.rows.length} 条`;
    const search = document.getElementById('dpSearch');
    search.value = '';
    renderDetailRows('');
    detailPanel.classList.add('open');
    setTimeout(() => chart.resize(), 280);
}
function closeDetail() {
    detailPanel.classList.remove('open');
    setTimeout(() => chart.resize(), 280);
}
document.getElementById('dpClose').addEventListener('click', closeDetail);
document.getElementById('dpSearch').addEventListener('input', e => renderDetailRows(e.target.value));

/* ===================== 筛选器 ===================== */
function buildFilters() {
    const primarySelect = document.getElementById('primarySelect');
    const secondarySelect = document.getElementById('secondarySelect');

    const primaries = [...new Set(Object.values(fieldMap).map(f => f.primary))];
    primarySelect.innerHTML = '<option value="">全部</option>' + primaries.map(p => `<option value="${p}">${p}</option>`).join('');

    function refreshSecondary() {
        let secs = Object.values(fieldMap);
        if (filterPrimary) secs = secs.filter(f => f.primary === filterPrimary);
        const list = [...new Set(secs.map(f => f.secondary))];
        secondarySelect.innerHTML = '<option value="">全部</option>' + list.map(s => `<option value="${s}">${s}</option>`).join('');
    }
    refreshSecondary();

    primarySelect.addEventListener('change', () => {
        filterPrimary = primarySelect.value;
        filterSecondary = '';
        refreshSecondary();
        render();
    });
    secondarySelect.addEventListener('change', () => {
        filterSecondary = secondarySelect.value;
        render();
    });
}

/* ===================== 展开/收起全部 ===================== */
document.getElementById('expandAllBtn').addEventListener('click', () => {
    Object.keys(fieldMap).forEach(t => {
        const f = fieldMap[t];
        if (filterPrimary && f.primary !== filterPrimary) return;
        if (filterSecondary && f.secondary !== filterSecondary) return;
        expandedNodes.add('P_' + f.primary);
        expandedNodes.add('S_' + f.primary + '_' + f.secondary);
        expandedNodes.add('T_' + t);
    });
    render();
});
document.getElementById('collapseAllBtn').addEventListener('click', () => {
    expandedNodes.clear();
    closeDetail();
    render();
});

/* ===================== 初始化 ===================== */
function init() {
    if (typeof echarts === 'undefined') { setTimeout(init, 300); return; }
    chart = echarts.init(document.getElementById('graph'));
    attachChartEvents();
    buildLegend();
    buildFilters();
    render();
}
init();
</script>

</body>
