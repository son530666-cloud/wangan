<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术详情 - 技术变革地平线</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #080e1a;
            font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
            color: #e0e6ed;
            min-height: 100vh;
        }

        .detail-page {
            max-width: 1440px;
            margin: 0 auto;
            padding: 20px 20px 48px;
        }

        /* 一二三级技术级联筛选 */
        .detail-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            align-items: flex-end;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(64, 169, 255, 0.10);
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 22px;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .filter-group label {
            font-size: 12px;
            color: #8896b3;
            letter-spacing: 0.5px;
        }
        .filter-select {
            min-width: 180px;
            font-size: 14px;
            color: #e0e6ed;
            background: rgba(10, 22, 45, 0.9);
            border: 1px solid rgba(64, 169, 255, 0.25);
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            outline: none;
        }
        .filter-select:focus { border-color: rgba(64, 169, 255, 0.55); }
        .filter-select option { background: #0a162d; color: #e0e6ed; }
        .filter-sep { color: #46506a; align-self: center; padding-bottom: 8px; font-size: 13px; }

        /* ===== 头部横幅（融合评分/识别时间/成熟度/主要玩家/简介） ===== */
        .detail-banner {
            display: flex;
            gap: 24px;
            align-items: flex-start;
            background: linear-gradient(135deg, rgba(64, 169, 255, 0.10), rgba(8, 14, 26, 0));
            border: 1px solid rgba(64, 169, 255, 0.14);
            border-radius: 14px;
            padding: 22px 26px;
            margin-bottom: 24px;
        }
        .banner-main { flex: 1; min-width: 0; }
        .banner-side {
            flex-shrink: 0;
            width: 300px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
        }
        .banner-radar {
            width: 260px;
            height: 200px;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 10px;
            padding: 6px;
        }
        .banner-top {
            display: flex;
            align-items: center;
            gap: 18px;
        }
        .banner-icon {
            width: 60px;
            height: 60px;
            border-radius: 14px;
            background: rgba(64, 169, 255, 0.12);
            border: 1px solid rgba(64, 169, 255, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            padding: 11px;
        }
        .banner-icon img { width: 100%; height: 100%; object-fit: contain; }
        .banner-title {
            flex: 1;
            min-width: 0;
            font-size: 26px;
            font-weight: 700;
            color: #fff;
        }
        .banner-score {
            display: flex;
            flex-direction: row;
            align-items: baseline;
            justify-content: flex-end;
            gap: 10px;
            white-space: nowrap;
        }
        .banner-score-label {
            font-size: 13px;
            color: #8896b3;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .banner-score-val {
            font-size: 30px;
            font-weight: 800;
            color: #ff4d4f;
            line-height: 1;
        }
        .banner-score-rating {
            font-size: 12px;
            color: #ff7875;
            background: rgba(255, 77, 79, 0.12);
            border: 1px solid rgba(255, 77, 79, 0.25);
            border-radius: 4px;
            padding: 1px 8px;
        }

        .banner-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 14px 36px;
            margin-top: 18px;
            padding-top: 16px;
            border-top: 1px solid rgba(64, 169, 255, 0.12);
        }
        .meta-cell {
            display: flex;
            align-items: baseline;
            gap: 8px;
            font-size: 14px;
        }
        .meta-cell.full { flex-basis: 100%; }
        .meta-cell.metrics { align-items: center; }
        .meta-metrics { display: inline-flex; flex-wrap: wrap; gap: 8px; }
        .meta-cell.intro-cell { flex-direction: column; align-items: flex-start; gap: 6px; }
        .banner-intro { font-size: 13px; line-height: 1.85; color: #b0c0d8; }
        .banner-intro p { margin: 0; }
        .meta-label {
            color: #8896b3;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }
        .meta-value { color: #e0e6ed; font-weight: 500; }
        .meta-value.score { color: #ff7875; font-weight: 700; }
        .info-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1px solid #8896b3;
            color: #8896b3;
            font-size: 10px;
            font-style: normal;
            cursor: help;
        }

        .banner-desc {
            margin-top: 16px;
            font-size: 13px;
            line-height: 1.85;
            color: #b0c0d8;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 14px 16px;
        }

        .tech-detail-intro {
            font-size: 14px;
            line-height: 1.9;
            color: #b0c0d8;
        }
        .tech-detail-intro strong { color: #e0e6ed; font-weight: 600; }

        /* 技术变革理由 */
        .tech-change-list { display: flex; flex-direction: column; gap: 12px; }
        .tech-change-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(64, 169, 255, 0.10);
            border-left: 3px solid #39ff14;
            border-radius: 8px;
            padding: 12px 16px;
        }
        .tech-change-item.trend-down { border-left-color: #ff4d4f; }
        .tech-change-head {
            font-size: 14px;
            font-weight: 600;
            color: #e0e6ed;
            margin-bottom: 6px;
        }
        .tech-change-detail {
            font-size: 13px;
            line-height: 1.75;
            color: #9fb0cc;
        }

        /* 技术演化路径时间轴 */
        .evo-timeline { padding-left: 6px; }
        .evo-item {
            position: relative;
            padding-left: 20px;
            padding-bottom: 16px;
            border-left: 2px solid rgba(64, 169, 255, 0.18);
        }
        .evo-item:last-child { border-left-color: transparent; padding-bottom: 0; }
        .evo-dot {
            position: absolute;
            left: -7px;
            top: 3px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid #0a162d;
        }
        .evo-dot.paper { background: #40a9ff; }
        .evo-dot.patent { background: #73d13d; }
        .evo-dot.news { background: #ffa940; }
        .evo-dot.policy { background: #b37feb; }
        .evo-head { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .evo-src-inline { display: inline-block; vertical-align: middle; margin-left: 8px; }
        .evo-src-inline .driver-source-body { width: 240px; }
        .evo-year { font-size: 13px; font-weight: 700; color: #e0e6ed; }
        .evo-type { font-size: 11px; padding: 1px 7px; border-radius: 4px; }
        .evo-type.paper { color: #40a9ff; background: rgba(64,169,255,0.1); border: 1px solid rgba(64,169,255,0.2); }
        .evo-type.patent { color: #73d13d; background: rgba(115,209,61,0.1); border: 1px solid rgba(115,209,61,0.2); }
        .evo-type.news { color: #ffa940; background: rgba(255,169,64,0.1); border: 1px solid rgba(255,169,64,0.2); }
        .evo-type.policy { color: #b37feb; background: rgba(179,127,235,0.1); border: 1px solid rgba(179,127,235,0.2); }
        .evo-title { font-size: 13px; line-height: 1.7; color: #b0c0d8; }
        .evo-param { font-size: 12px; color: #39ff14; margin-top: 4px; }

        /* 驱动力分析 */
        .drivers-summary {
            font-size: 13px;
            line-height: 1.85;
            color: #b0c0d8;
            margin: 0 0 14px;
            padding: 10px 14px;
            background: rgba(64, 169, 255, 0.06);
            border: 1px solid rgba(64, 169, 255, 0.12);
            border-radius: 8px;
        }
        .drivers-group { margin-bottom: 16px; }
        .drivers-group:last-child { margin-bottom: 0; }
        .drivers-group-title {
            font-size: 14px;
            font-weight: 600;
            color: #40a9ff;
            margin-bottom: 8px;
        }
        .drivers-items { margin: 0; padding-left: 20px; }
        .drivers-items li {
            font-size: 13px;
            line-height: 1.8;
            color: #9fb0cc;
            margin-bottom: 12px;
        }
        .drivers-items strong { color: #e0e6ed; }
        .driver-text { color: #9fb0cc; }

        /* 技术应用分析 */
        .app-sub { margin-bottom: 16px; }
        .app-sub:last-child { margin-bottom: 0; }
        .app-sub-title { font-size: 13px; font-weight: 600; color: #40a9ff; margin-bottom: 8px; }
        .app-list { margin: 0; padding-left: 18px; }
        .app-list li { font-size: 13px; line-height: 1.8; color: #9fb0cc; margin-bottom: 6px; }
        .app-list strong { color: #e0e6ed; }

        /* 技术扩散速度 */
        .diff-list { display: flex; flex-direction: column; gap: 16px; }
        .diff-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(64, 169, 255, 0.1);
            border-radius: 8px;
            padding: 12px 14px;
        }
        .diff-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .diff-scene { font-size: 14px; font-weight: 600; color: #e0e6ed; }
        .diff-level { font-size: 13px; font-weight: 700; }
        .diff-bar { height: 8px; background: rgba(255, 255, 255, 0.06); border-radius: 4px; overflow: hidden; }
        .diff-bar-inner { height: 100%; border-radius: 4px; transition: width 0.4s; }
        .diff-bottleneck { font-size: 12px; line-height: 1.7; color: #9fb0cc; margin-top: 8px; }

        /* 技术全球分布（世界地图热力） */
        .world-heat { background: rgba(0, 0, 0, 0.2); border-radius: 10px; padding: 8px; }
        .heat-legend { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; font-size: 12px; color: #8896b3; margin-top: 12px; }
        .hl-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin: 0 3px 0 10px; }
        .heat-notes { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 24px; margin-top: 14px; }
        .heat-note { font-size: 12px; line-height: 1.6; }
        .heat-note-name { color: #e0e6ed; font-weight: 600; margin-right: 6px; }
        .heat-note-text { color: #8896b3; }
        @media (max-width: 768px) { .heat-notes { grid-template-columns: 1fr; } }

        /* 扩散速度与采用率 */
        .ad-block { margin-bottom: 14px; }
        .ad-block:last-child { margin-bottom: 0; }
        .ad-label { font-size: 13px; font-weight: 600; color: #40a9ff; margin-bottom: 6px; }
        .ad-text { font-size: 13px; line-height: 1.8; color: #9fb0cc; }
        .ad-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .ad-tag {
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 4px;
            color: #ff7875;
            background: rgba(255, 77, 79, 0.08);
            border: 1px solid rgba(255, 77, 79, 0.18);
        }

        /* 未来趋势预测 */
        .fc-summary {
            font-size: 13px;
            line-height: 1.85;
            color: #b0c0d8;
            margin: 0 0 18px;
            padding: 12px 14px;
            background: rgba(64, 169, 255, 0.06);
            border: 1px solid rgba(64, 169, 255, 0.12);
            border-radius: 8px;
        }
        .fc-timeline { padding-left: 6px; margin-bottom: 16px; }
        .fc-item {
            position: relative;
            padding-left: 22px;
            padding-bottom: 18px;
            border-left: 2px solid rgba(64, 169, 255, 0.18);
        }
        .fc-item:last-child { border-left-color: transparent; padding-bottom: 0; }
        .fc-dot {
            position: absolute;
            left: -8px;
            top: 2px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid #0a162d;
            background: #40a9ff;
        }
        .fc-dot.short { background: #39ff14; }
        .fc-dot.mid { background: #ffa940; }
        .fc-dot.long { background: #b37feb; }
        .fc-head { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 6px; }
        .fc-term { font-size: 11px; padding: 1px 8px; border-radius: 4px; }
        .fc-term.short { color: #39ff14; background: rgba(57,255,20,0.1); border: 1px solid rgba(57,255,20,0.2); }
        .fc-term.mid { color: #ffa940; background: rgba(255,169,64,0.1); border: 1px solid rgba(255,169,64,0.2); }
        .fc-term.long { color: #b37feb; background: rgba(179,127,235,0.1); border: 1px solid rgba(179,127,235,0.2); }
        .fc-title { font-size: 15px; font-weight: 600; color: #e0e6ed; }
        .fc-period { font-size: 12px; color: #8896b3; }
        .fc-desc { font-size: 13px; line-height: 1.85; color: #9fb0cc; }
        .fc-extra {
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(64, 169, 255, 0.1);
            border-radius: 8px;
            padding: 12px 14px;
            margin-top: 10px;
        }
        .fc-extra-label { flex-shrink: 0; font-size: 13px; font-weight: 600; color: #40a9ff; }
        .fc-extra-text { font-size: 13px; line-height: 1.8; color: #9fb0cc; }

        /* 机构竞争力图谱 */
        .ls-top {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            align-items: center;
            margin-bottom: 18px;
        }
        .ls-chart {
            background: rgba(0, 0, 0, 0.18);
            border-radius: 10px;
            padding: 12px;
        }
        .inst-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .inst-table th {
            text-align: left;
            font-weight: 600;
            color: #8896b3;
            padding: 8px 10px;
            border-bottom: 1px solid rgba(64, 169, 255, 0.18);
            white-space: nowrap;
        }
        .inst-table td {
            padding: 8px 10px;
            color: #b0c0d8;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .inst-table tr:hover td { background: rgba(64, 169, 255, 0.04); }
        .inst-name { color: #e0e6ed; font-weight: 600; }
        .inst-region {
            font-size: 11px;
            padding: 1px 8px;
            border-radius: 4px;
        }
        .inst-region.domestic { color: #40a9ff; background: rgba(64, 169, 255, 0.1); border: 1px solid rgba(64, 169, 255, 0.2); }
        .inst-region.foreign { color: #ffa940; background: rgba(255, 169, 64, 0.1); border: 1px solid rgba(255, 169, 64, 0.2); }
        .ls-narrative { display: flex; flex-direction: column; gap: 12px; }
        .ls-summary {
            background: linear-gradient(135deg, rgba(64, 169, 255, 0.1), rgba(64, 169, 255, 0.02));
            border: 1px solid rgba(64, 169, 255, 0.2);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 18px;
        }
        .ls-summary-title { font-size: 14px; font-weight: 600; color: #40a9ff; margin-bottom: 8px; }
        .ls-summary-text { font-size: 13px; line-height: 1.95; color: #c0cee0; }
        .ls-summary-text strong { color: #fff; font-weight: 600; }
        .ls-narr-block {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(64, 169, 255, 0.1);
            border-left: 3px solid #40a9ff;
            border-radius: 8px;
            padding: 12px 14px;
        }
        .ls-narr-title { font-size: 13px; font-weight: 600; color: #40a9ff; margin-bottom: 6px; }
        .ls-narr-text { font-size: 13px; line-height: 1.8; color: #9fb0cc; }

        /* 行业观点 */
        .iv-list { display: flex; flex-direction: column; gap: 12px; }
        .iv-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(64, 169, 255, 0.1);
            border-radius: 8px;
            padding: 12px 14px;
        }
        .iv-head { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .iv-tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; white-space: nowrap; }
        .iv-tag.forecast { color: #40a9ff; background: rgba(64, 169, 255, 0.1); border: 1px solid rgba(64, 169, 255, 0.2); }
        .iv-tag.trend { color: #39ff14; background: rgba(57, 255, 20, 0.08); border: 1px solid rgba(57, 255, 20, 0.18); }
        .iv-tag.risk { color: #ff7875; background: rgba(255, 77, 79, 0.08); border: 1px solid rgba(255, 77, 79, 0.18); }
        .iv-tag.industry { color: #b37feb; background: rgba(179, 127, 235, 0.1); border: 1px solid rgba(179, 127, 235, 0.2); }
        .iv-src { font-size: 13px; font-weight: 600; color: #c8d4e8; }
        .iv-text { font-size: 13px; line-height: 1.8; color: #9fb0cc; }
        .driver-source { margin-top: 5px; }
        .driver-source summary {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            color: #40a9ff;
            font-size: 12px;
            list-style: none;
            user-select: none;
        }
        .driver-source summary::-webkit-details-marker { display: none; }
        .driver-source summary:hover { text-decoration: underline; }
        .driver-source-body {
            margin-top: 6px;
            font-size: 12px;
            color: #8896b3;
            line-height: 1.7;
            background: rgba(64, 169, 255, 0.06);
            border: 1px solid rgba(64, 169, 255, 0.12);
            border-radius: 6px;
            padding: 8px 10px;
        }

        /* ===== 内容区：扁平分块，去弹窗感 ===== */
        .detail-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            align-items: start;
        }
        .detail-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(64, 169, 255, 0.10);
            border-radius: 12px;
            padding: 18px 20px;
            margin-bottom: 20px;
        }
        .detail-body .detail-card { margin-bottom: 0; }
        .detail-card-title {
            font-size: 14px;
            font-weight: 600;
            color: #40a9ff;
            margin-bottom: 14px;
            padding-left: 10px;
            border-left: 3px solid #40a9ff;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tech-detail-metrics { display: flex; flex-wrap: wrap; gap: 10px; }
        .tech-detail-metrics .tech-detail-metric {
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 6px;
            background: rgba(64, 169, 255, 0.08);
            color: #40a9ff;
            border: 1px solid rgba(64, 169, 255, 0.15);
        }

        .tech-detail-advice {
            background: rgba(57, 255, 20, 0.05);
            border: 1px solid rgba(57, 255, 20, 0.12);
            border-radius: 8px;
            padding: 14px;
            font-size: 13px;
            color: #b0c0d8;
            line-height: 1.7;
        }
        .tech-detail-advice strong { color: #39ff14; }
        .tech-detail-advice ul { margin: 0; padding-left: 18px; }

        .tech-detail-players ul { margin: 0; padding-left: 4px; list-style: none; }
        .tech-detail-players li {
            font-size: 13px;
            color: #b0c0d8;
            line-height: 1.9;
            position: relative;
            padding-left: 16px;
        }
        .tech-detail-players li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 11px;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #40a9ff;
        }

        .tech-detail-risks-impact { display: flex; flex-direction: column; gap: 12px; }
        .tech-detail-rich { display: flex; flex-direction: column; gap: 12px; }
        .tech-detail-rich-block {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 212, 255, 0.08);
            border-radius: 8px;
            padding: 12px 14px;
        }
        .tech-detail-rich-title {
            font-size: 13px;
            font-weight: 600;
            color: #40a9ff;
            margin-bottom: 6px;
        }
        .tech-detail-rich-content { font-size: 13px; color: #b0c0d8; line-height: 1.7; }
        .tech-detail-rich-list { margin: 0; padding-left: 18px; }
        .tech-detail-rich-list li { font-size: 13px; color: #b0c0d8; line-height: 1.7; margin-bottom: 4px; }

        .tech-detail-radar {
            width: 100%;
            height: 230px;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 10px;
            padding: 8px;
        }
        .tech-detail-risk-item {
            font-size: 13px;
            color: #ff7875;
            background: rgba(255, 77, 79, 0.06);
            border: 1px solid rgba(255, 77, 79, 0.12);
            border-radius: 8px;
            padding: 10px 12px;
            line-height: 1.6;
        }
        .tech-detail-risk-item::before { content: '⚠'; margin-right: 6px; }

        .detail-empty { text-align: center; padding: 80px 20px; color: #8896b3; }
        .detail-empty .icon { font-size: 48px; margin-bottom: 16px; }
        .detail-empty .hint { font-size: 14px; line-height: 1.8; }

        @media (max-width: 900px) {
            .detail-banner { flex-direction: column; }
            .banner-side { width: 100%; align-items: flex-start; }
            .ls-top { grid-template-columns: 1fr; }
        }
        @media (max-width: 768px) {
            .detail-body { grid-template-columns: 1fr; }
            .banner-meta { gap: 12px 20px; }
        }
    </style>
</head>
<body>
    <div class="detail-page">
        <div class="detail-filters" id="detailFilters" style="display:none;">
            <div class="filter-group">
                <label>一级领域</label>
                <select class="filter-select" id="lv1"></select>
            </div>
            <span class="filter-sep">›</span>
            <div class="filter-group">
                <label>二级领域</label>
                <select class="filter-select" id="lv2"></select>
            </div>
            <span class="filter-sep">›</span>
            <div class="filter-group">
                <label>三级技术</label>
                <select class="filter-select" id="lv3"></select>
            </div>
        </div>

        <div id="detailRoot"></div>
    </div>

    <script>
        let BUNDLE = null;      // { selectedName, taxonomy, payloads }
        let currentName = null;

        function renderEmpty() {
            document.getElementById('detailFilters').style.display = 'none';
            document.getElementById('detailRoot').innerHTML = `
                <div class="detail-empty">
                    <div class="icon">📄</div>
                    <div class="hint">尚未选择技术。<br>请前往「技术扫描」页，点击任意技术卡片查看其详情。</div>
                </div>
            `;
        }

        function fillSelect(sel, options, selected) {
            sel.innerHTML = options.map(o => `<option value="${o}"${o === selected ? ' selected' : ''}>${o}</option>`).join('');
        }

        // 根据技术名定位其一二级路径，回显三个下拉框
        function findPath(name) {
            const tax = BUNDLE.taxonomy;
            for (const p of Object.keys(tax)) {
                for (const s of Object.keys(tax[p])) {
                    if (tax[p][s].includes(name)) return { primary: p, secondary: s };
                }
            }
            return null;
        }

        function syncFilters(name) {
            const tax = BUNDLE.taxonomy;
            const path = findPath(name) || {};
            const lv1 = document.getElementById('lv1');
            const lv2 = document.getElementById('lv2');
            const lv3 = document.getElementById('lv3');

            fillSelect(lv1, Object.keys(tax), path.primary);
            fillSelect(lv2, Object.keys(tax[path.primary] || {}), path.secondary);
            fillSelect(lv3, (tax[path.primary] && tax[path.primary][path.secondary]) || [], name);
        }

        function showTech(name) {
            const payload = BUNDLE.payloads[name];
            if (!payload) return;
            currentName = name;
            renderDetail(payload);
            syncFilters(name);
            document.title = `${payload.name} - 技术详情`;
        }

        function bindFilters() {
            const lv1 = document.getElementById('lv1');
            const lv2 = document.getElementById('lv2');
            const lv3 = document.getElementById('lv3');
            const tax = BUNDLE.taxonomy;

            lv1.addEventListener('change', () => {
                const p = lv1.value;
                const sec = Object.keys(tax[p] || {});
                fillSelect(lv2, sec, sec[0]);
                const third = (tax[p][sec[0]]) || [];
                fillSelect(lv3, third, third[0]);
                if (third[0]) showTech(third[0]);
            });
            lv2.addEventListener('change', () => {
                const p = lv1.value, s = lv2.value;
                const third = (tax[p][s]) || [];
                fillSelect(lv3, third, third[0]);
                if (third[0]) showTech(third[0]);
            });
            lv3.addEventListener('change', () => {
                if (lv3.value) showTech(lv3.value);
            });
        }

        function renderDetail(p) {
            document.getElementById('detailFilters').style.display = 'flex';
            const introHtml = p.intro ? `<p>${p.intro}</p>` : '';
            document.getElementById('detailRoot').innerHTML = `
                <div class="detail-banner">
                    <div class="banner-main">
                        <div class="banner-top">
                            <div class="banner-icon">${p.iconSrc ? `<img src="${p.iconSrc}" alt="${p.name}">` : ''}</div>
                            <div class="banner-title">${p.name || ''}</div>
                        </div>
                        <div class="banner-meta">
                            ${p.lastActive ? `<div class="meta-cell"><span class="meta-label">最近活跃时间</span><span class="meta-value">${p.lastActive}</span></div>` : ''}
                            ${p.firstSeen ? `<div class="meta-cell"><span class="meta-label">识别时间</span><span class="meta-value">${p.firstSeen}</span></div>` : ''}
                            ${p.trl ? `<div class="meta-cell"><span class="meta-label">技术成熟度</span><span class="meta-value">${p.trl}</span></div>` : ''}
                            ${p.category ? `<div class="meta-cell"><span class="meta-label">所属领域</span><span class="meta-value">${p.category}</span></div>` : ''}
                            ${p.playersInline ? `<div class="meta-cell full"><span class="meta-label">主要玩家</span><span class="meta-value">${p.playersInline}</span></div>` : ''}
                            ${p.metricsHtml ? `<div class="meta-cell full metrics"><span class="meta-label">技术关键指标</span><span class="meta-metrics">${p.metricsHtml}</span></div>` : ''}
                            ${introHtml ? `<div class="meta-cell full intro-cell"><span class="meta-label">📖 技术介绍</span><div class="banner-intro">${introHtml}</div></div>` : ''}
                        </div>
                    </div>
                    <div class="banner-side">
                        <div class="banner-score">
                            <span class="banner-score-label">综合评分 ${p.scoreTip ? `<i class="info-mark" title="${p.scoreTip}">?</i>` : ''}</span>
                            <span class="banner-score-val">${p.score}</span>
                        </div>
                        <div class="banner-radar">${p.radarSvg || ''}</div>
                    </div>
                </div>

                <div class="detail-body">
                    ${p.changeBasisHtml ? `
                    <div class="detail-card">
                        <div class="detail-card-title">📈 技术变革理由</div>
                        <div class="tech-change-list">${p.changeBasisHtml}</div>
                    </div>` : ''}
                    ${p.evolutionHtml ? `
                    <div class="detail-card">
                        <div class="detail-card-title">🧬 技术演化路径</div>
                        ${p.evolutionHtml}
                    </div>` : ''}
                </div>

                <div class="detail-body">
                    ${p.driversHtml ? `
                    <div class="detail-card">
                        <div class="detail-card-title">🚀 驱动力分析</div>
                        <div class="drivers-wrap">${p.driversHtml}</div>
                    </div>` : ''}
                    ${p.applicationHtml ? `
                    <div class="detail-card">
                        <div class="detail-card-title">🧩 技术应用分析</div>
                        <div class="app-wrap">${p.applicationHtml}</div>
                    </div>` : ''}
                </div>

                ${p.globalDistHtml ? `
                <div class="detail-card">
                    <div class="detail-card-title">🌍 技术全球分布</div>
                    <div class="gd-wrap">${p.globalDistHtml}</div>
                </div>` : ''}

                ${p.adoptionHtml ? `
                <div class="detail-card">
                    <div class="detail-card-title">📊 技术扩散速度</div>
                    <div class="ad-wrap">${p.adoptionHtml}</div>
                </div>` : ''}

                ${p.landscapeHtml ? `
                <div class="detail-card">
                    <div class="detail-card-title">🗺️ 机构竞争力图谱</div>
                    <div class="landscape-wrap">${p.landscapeHtml}</div>
                </div>` : ''}

                ${p.socialHtml ? `
                <div class="detail-card">
                    <div class="detail-card-title">💬 行业观点</div>
                    <div class="social-wrap">${p.socialHtml}</div>
                </div>` : ''}

                ${p.forecastHtml ? `
                <div class="detail-card">
                    <div class="detail-card-title">🔮 未来趋势预测</div>
                    <div class="forecast-wrap">${p.forecastHtml}</div>
                </div>` : ''}
            `;
        }

        (function init() {
            let raw = null;
            try { raw = sessionStorage.getItem('techDetailPayload'); } catch (e) {}
            if (!raw && typeof window.name === 'string' && window.name.indexOf('TECH_DETAIL:') === 0) {
                raw = window.name.slice('TECH_DETAIL:'.length);
            }

            let data = null;
            try { if (raw) data = JSON.parse(raw); } catch (e) { console.error('读取技术详情失败:', e); }

            // 兼容旧的单 payload 结构
            if (data && !data.payloads && data.name) {
                data = { selectedName: data.name, taxonomy: {}, payloads: { [data.name]: data } };
            }

            if (data && data.payloads && data.selectedName && data.payloads[data.selectedName]) {
                BUNDLE = data;
                if (Object.keys(BUNDLE.taxonomy).length) bindFilters();
                showTech(BUNDLE.selectedName);
                if (!Object.keys(BUNDLE.taxonomy).length) {
                    document.getElementById('detailFilters').style.display = 'none';
                }
            } else {
                renderEmpty();
            }
        })();
    </script>
</body>
</html>
