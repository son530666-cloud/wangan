<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术详情 - 技术变革地平线</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #080e1a;
            font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
            color: #e0e6ed;
            min-height: 100vh;
        }

        .detail-page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 28px 48px;
        }

        .detail-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            font-size: 14px;
            color: #40a9ff;
            background: rgba(64, 169, 255, 0.08);
            border: 1px solid rgba(64, 169, 255, 0.25);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .back-btn:hover { background: rgba(64, 169, 255, 0.18); color: #fff; }
        .detail-crumb { font-size: 13px; color: #8896b3; }

        /* ===== 头部横幅（融合评分/识别时间/成熟度/主要玩家/简介） ===== */
        .detail-banner {
            background: linear-gradient(135deg, rgba(64, 169, 255, 0.10), rgba(8, 14, 26, 0));
            border: 1px solid rgba(64, 169, 255, 0.14);
            border-radius: 14px;
            padding: 22px 26px;
            margin-bottom: 24px;
        }
        .banner-top {
            display: flex;
            align-items: center;
            gap: 18px;
        }
        .banner-icon {
            width: 60px;
            height: 60px;
            border-radius: 14px;
            background: rgba(64, 169, 255, 0.12);
            border: 1px solid rgba(64, 169, 255, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            padding: 11px;
        }
        .banner-icon img { width: 100%; height: 100%; object-fit: contain; }
        .banner-title {
            flex: 1;
            min-width: 0;
            font-size: 26px;
            font-weight: 700;
            color: #fff;
        }
        .banner-score {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
        }
        .banner-score-val {
            font-size: 30px;
            font-weight: 800;
            color: #ff4d4f;
            line-height: 1;
        }
        .banner-score-rating {
            font-size: 12px;
            color: #ff7875;
            background: rgba(255, 77, 79, 0.12);
            border: 1px solid rgba(255, 77, 79, 0.25);
            border-radius: 4px;
            padding: 1px 8px;
        }

        .banner-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 14px 36px;
            margin-top: 18px;
            padding-top: 16px;
            border-top: 1px solid rgba(64, 169, 255, 0.12);
        }
        .meta-cell {
            display: flex;
            align-items: baseline;
            gap: 8px;
            font-size: 14px;
        }
        .meta-label {
            color: #8896b3;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }
        .meta-value { color: #e0e6ed; font-weight: 500; }
        .meta-value.score { color: #ff7875; font-weight: 700; }
        .info-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1px solid #8896b3;
            color: #8896b3;
            font-size: 10px;
            font-style: normal;
            cursor: help;
        }

        .banner-desc {
            margin-top: 16px;
            font-size: 13px;
            line-height: 1.85;
            color: #b0c0d8;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 14px 16px;
        }

        /* ===== 内容区：扁平分块，去弹窗感 ===== */
        .detail-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            align-items: start;
        }
        .detail-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(64, 169, 255, 0.10);
            border-radius: 12px;
            padding: 18px 20px;
            margin-bottom: 20px;
        }
        .detail-body .detail-card { margin-bottom: 0; }
        .detail-card-title {
            font-size: 14px;
            font-weight: 600;
            color: #40a9ff;
            margin-bottom: 14px;
            padding-left: 10px;
            border-left: 3px solid #40a9ff;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tech-detail-metrics { display: flex; flex-wrap: wrap; gap: 10px; }
        .tech-detail-metrics .tech-detail-metric {
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 6px;
            background: rgba(64, 169, 255, 0.08);
            color: #40a9ff;
            border: 1px solid rgba(64, 169, 255, 0.15);
        }

        .tech-detail-advice {
            background: rgba(57, 255, 20, 0.05);
            border: 1px solid rgba(57, 255, 20, 0.12);
            border-radius: 8px;
            padding: 14px;
            font-size: 13px;
            color: #b0c0d8;
            line-height: 1.7;
        }
        .tech-detail-advice strong { color: #39ff14; }
        .tech-detail-advice ul { margin: 0; padding-left: 18px; }

        .tech-detail-players ul { margin: 0; padding-left: 4px; list-style: none; }
        .tech-detail-players li {
            font-size: 13px;
            color: #b0c0d8;
            line-height: 1.9;
            position: relative;
            padding-left: 16px;
        }
        .tech-detail-players li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 11px;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #40a9ff;
        }

        .tech-detail-risks-impact { display: flex; flex-direction: column; gap: 12px; }
        .tech-detail-rich { display: flex; flex-direction: column; gap: 12px; }
        .tech-detail-rich-block {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 212, 255, 0.08);
            border-radius: 8px;
            padding: 12px 14px;
        }
        .tech-detail-rich-title {
            font-size: 13px;
            font-weight: 600;
            color: #40a9ff;
            margin-bottom: 6px;
        }
        .tech-detail-rich-content { font-size: 13px; color: #b0c0d8; line-height: 1.7; }
        .tech-detail-rich-list { margin: 0; padding-left: 18px; }
        .tech-detail-rich-list li { font-size: 13px; color: #b0c0d8; line-height: 1.7; margin-bottom: 4px; }

        .tech-detail-radar {
            width: 100%;
            height: 320px;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 10px;
            padding: 10px;
        }
        .tech-detail-risk-item {
            font-size: 13px;
            color: #ff7875;
            background: rgba(255, 77, 79, 0.06);
            border: 1px solid rgba(255, 77, 79, 0.12);
            border-radius: 8px;
            padding: 10px 12px;
            line-height: 1.6;
        }
        .tech-detail-risk-item::before { content: '⚠'; margin-right: 6px; }

        .detail-empty { text-align: center; padding: 80px 20px; color: #8896b3; }
        .detail-empty .icon { font-size: 48px; margin-bottom: 16px; }
        .detail-empty .hint { font-size: 14px; line-height: 1.8; }

        @media (max-width: 768px) {
            .detail-body { grid-template-columns: 1fr; }
            .banner-meta { gap: 12px 20px; }
        }
    </style>
</head>
<body>
    <div class="detail-page">
        <div class="detail-toolbar">
            <button class="back-btn" id="backBtn">← 返回技术扫描</button>
            <span class="detail-crumb">技术扫描 / 技术详情</span>
        </div>

        <div id="detailRoot"></div>
    </div>

    <script>
        document.getElementById('backBtn').addEventListener('click', () => {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({ type: 'navigateTo', page: '技术扫描.html' }, '*');
            } else {
                window.location.href = '技术扫描.html';
            }
        });

        function renderEmpty() {
            document.getElementById('detailRoot').innerHTML = `
                <div class="detail-empty">
                    <div class="icon">📄</div>
                    <div class="hint">尚未选择技术。<br>请前往「技术扫描」页，点击任意技术卡片查看其详情。</div>
                </div>
            `;
        }

        function renderDetail(p) {
            document.getElementById('detailRoot').innerHTML = `
                <div class="detail-banner">
                    <div class="banner-top">
                        <div class="banner-icon">${p.iconSrc ? `<img src="${p.iconSrc}" alt="${p.name}">` : ''}</div>
                        <div class="banner-title">${p.name || ''}</div>
                        <div class="banner-score">
                            <span class="banner-score-val">${p.score}</span>
                            ${p.rating ? `<span class="banner-score-rating">${p.rating}</span>` : ''}
                        </div>
                    </div>
                    <div class="banner-meta">
                        <div class="meta-cell">
                            <span class="meta-label">综合评分 ${p.scoreTip ? `<i class="info-mark" title="${p.scoreTip}">?</i>` : ''}</span>
                            <span class="meta-value score">${p.score}分${p.rating ? `（${p.rating}）` : ''}</span>
                        </div>
                        ${p.lastActive ? `<div class="meta-cell"><span class="meta-label">最近活跃时间</span><span class="meta-value">${p.lastActive}</span></div>` : ''}
                        ${p.firstSeen ? `<div class="meta-cell"><span class="meta-label">识别时间</span><span class="meta-value">${p.firstSeen}</span></div>` : ''}
                        ${p.trl ? `<div class="meta-cell"><span class="meta-label">技术成熟度</span><span class="meta-value">${p.trl}</span></div>` : ''}
                        ${p.category ? `<div class="meta-cell"><span class="meta-label">所属领域</span><span class="meta-value">${p.category}</span></div>` : ''}
                        ${p.playersInline ? `<div class="meta-cell"><span class="meta-label">主要玩家</span><span class="meta-value">${p.playersInline}</span></div>` : ''}
                    </div>
                    ${p.desc ? `<div class="banner-desc">${p.desc}</div>` : ''}
                </div>

                <div class="detail-body">
                    <div class="detail-card">
                        <div class="detail-card-title">📡 评估指标雷达图</div>
                        <div class="tech-detail-radar">${p.radarSvg || ''}</div>
                    </div>
                    <div class="detail-card">
                        <div class="detail-card-title">💡 跟踪总结与建议</div>
                        <div class="tech-detail-advice">${p.adviceHtml || ''}</div>
                    </div>
                </div>

                <div class="detail-body">
                    <div class="detail-card">
                        <div class="detail-card-title">🎯 技术关键指标</div>
                        <div class="tech-detail-metrics">${p.metricsHtml || ''}</div>
                    </div>
                    <div class="detail-card">
                        <div class="detail-card-title">🏢 主要玩家</div>
                        <div class="tech-detail-players">${p.playersHtml || ''}</div>
                    </div>
                </div>

                <div class="detail-card">
                    <div class="detail-card-title">⚠️ 风险与影响</div>
                    <div class="tech-detail-risks-impact">${p.risksImpactHtml || ''}</div>
                </div>

                <div class="detail-card">
                    <div class="detail-card-title">🔧 技术难点及解决方案</div>
                    <div class="tech-detail-rich">${p.painPointsHtml || ''}</div>
                </div>

                <div class="detail-card">
                    <div class="detail-card-title">🏆 关键指标及竞争优势</div>
                    <div class="tech-detail-rich">${p.advantagesHtml || ''}</div>
                </div>

                <div class="detail-card">
                    <div class="detail-card-title">🎯 应用场景</div>
                    <div class="tech-detail-rich">${p.scenariosHtml || ''}</div>
                </div>

                <div class="detail-card">
                    <div class="detail-card-title">📈 市场分析</div>
                    <div class="tech-detail-rich">${p.marketHtml || ''}</div>
                </div>
            `;
        }

        (function init() {
            let raw = null;
            try { raw = sessionStorage.getItem('techDetailPayload'); } catch (e) {}
            if (!raw && typeof window.name === 'string' && window.name.indexOf('TECH_DETAIL:') === 0) {
                raw = window.name.slice('TECH_DETAIL:'.length);
            }

            let payload = null;
            try { if (raw) payload = JSON.parse(raw); } catch (e) { console.error('读取技术详情失败:', e); }

            if (payload && payload.name) {
                renderDetail(payload);
                document.title = `${payload.name} - 技术详情`;
            } else {
                renderEmpty();
            }
        })();
    </script>
</body>
</html>
