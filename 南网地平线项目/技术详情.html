<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术详情 - 技术变革地平线</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #080e1a;
            font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
            color: #e0e6ed;
            min-height: 100vh;
        }

        .detail-page {
            max-width: 1440px;
            margin: 0 auto;
            padding: 20px 20px 48px;
        }

        /* 一二三级技术级联筛选 */
        .detail-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            align-items: flex-end;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(64, 169, 255, 0.10);
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 22px;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .filter-group label {
            font-size: 12px;
            color: #8896b3;
            letter-spacing: 0.5px;
        }
        .filter-select {
            min-width: 180px;
            font-size: 14px;
            color: #e0e6ed;
            background: rgba(10, 22, 45, 0.9);
            border: 1px solid rgba(64, 169, 255, 0.25);
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            outline: none;
        }
        .filter-select:focus { border-color: rgba(64, 169, 255, 0.55); }
        .filter-select option { background: #0a162d; color: #e0e6ed; }
        .filter-sep { color: #46506a; align-self: center; padding-bottom: 8px; font-size: 13px; }

        /* ===== 头部横幅（融合评分/识别时间/成熟度/主要玩家/简介） ===== */
        .detail-banner {
            display: flex;
            gap: 24px;
            align-items: flex-start;
            background: linear-gradient(135deg, rgba(64, 169, 255, 0.10), rgba(8, 14, 26, 0));
            border: 1px solid rgba(64, 169, 255, 0.14);
            border-radius: 14px;
            padding: 22px 26px;
            margin-bottom: 24px;
        }
        .banner-main { flex: 1; min-width: 0; }
        .banner-side {
            flex-shrink: 0;
            width: 300px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
        }
        .banner-radar {
            width: 260px;
            height: 200px;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 10px;
            padding: 6px;
        }
        .banner-top {
            display: flex;
            align-items: center;
            gap: 18px;
        }
        .banner-icon {
            width: 60px;
            height: 60px;
            border-radius: 14px;
            background: rgba(64, 169, 255, 0.12);
            border: 1px solid rgba(64, 169, 255, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            padding: 11px;
        }
        .banner-icon img { width: 100%; height: 100%; object-fit: contain; }
        .banner-title {
            flex: 1;
            min-width: 0;
            font-size: 26px;
            font-weight: 700;
            color: #fff;
        }
        .banner-score {
            display: flex;
            flex-direction: row;
            align-items: baseline;
            justify-content: flex-end;
            gap: 10px;
            white-space: nowrap;
        }
        .banner-score-label {
            font-size: 13px;
            color: #8896b3;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .banner-score-val {
            font-size: 30px;
            font-weight: 800;
            color: #ff4d4f;
            line-height: 1;
        }
        .banner-score-rating {
            font-size: 12px;
            color: #ff7875;
            background: rgba(255, 77, 79, 0.12);
            border: 1px solid rgba(255, 77, 79, 0.25);
            border-radius: 4px;
            padding: 1px 8px;
        }

        .banner-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 14px 36px;
            margin-top: 18px;
            padding-top: 16px;
            border-top: 1px solid rgba(64, 169, 255, 0.12);
        }
        .meta-cell {
            display: flex;
            align-items: baseline;
            gap: 8px;
            font-size: 14px;
        }
        .meta-cell.full { flex-basis: 100%; }
        .meta-cell.metrics { align-items: center; }
        .meta-metrics { display: inline-flex; flex-wrap: wrap; gap: 8px; }
        .meta-cell.intro-cell { flex-direction: column; align-items: flex-start; gap: 6px; }
        .banner-intro { font-size: 13px; line-height: 1.85; color: #b0c0d8; }
        .banner-intro p { margin: 0; }
        .meta-label {
            color: #8896b3;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }
        .meta-value { color: #e0e6ed; font-weight: 500; }
        .meta-value.score { color: #ff7875; font-weight: 700; }
        .info-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1px solid #8896b3;
            color: #8896b3;
            font-size: 10px;
            font-style: normal;
            cursor: help;
        }

        .banner-desc {
            margin-top: 16px;
            font-size: 13px;
            line-height: 1.85;
            color: #b0c0d8;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 14px 16px;
        }

        .tech-detail-intro {
            font-size: 14px;
            line-height: 1.9;
            color: #b0c0d8;
        }
        .tech-detail-intro strong { color: #e0e6ed; font-weight: 600; }

        /* 技术变革理由 */
        .tech-change-list { display: flex; flex-direction: column; gap: 12px; }
        .tech-change-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(64, 169, 255, 0.10);
            border-left: 3px solid #39ff14;
            border-radius: 8px;
            padding: 12px 16px;
        }
        .tech-change-item.trend-down { border-left-color: #ff4d4f; }
        .tech-change-head {
            font-size: 14px;
            font-weight: 600;
            color: #e0e6ed;
            margin-bottom: 6px;
        }
        .tech-change-detail {
            font-size: 13px;
            line-height: 1.75;
            color: #9fb0cc;
        }

        /* 技术演化路径时间轴 */
        .evo-timeline { padding-left: 6px; }
        .evo-item {
            position: relative;
            padding-left: 20px;
            padding-bottom: 16px;
            border-left: 2px solid rgba(64, 169, 255, 0.18);
        }
        .evo-item:last-child { border-left-color: transparent; padding-bottom: 0; }
        .evo-dot {
            position: absolute;
            left: -7px;
            top: 3px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid #0a162d;
        }
        .evo-dot.paper { background: #40a9ff; }
        .evo-dot.patent { background: #73d13d; }
        .evo-dot.news { background: #ffa940; }
        .evo-dot.policy { background: #b37feb; }
        .evo-head { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .evo-src-inline { display: inline-block; vertical-align: middle; margin-left: 8px; }
        .evo-src-inline .driver-source-body { width: 240px; }
        .evo-year { font-size: 13px; font-weight: 700; color: #e0e6ed; }
        .evo-type { font-size: 11px; padding: 1px 7px; border-radius: 4px; }
        .evo-type.paper { color: #40a9ff; background: rgba(64,169,255,0.1); border: 1px solid rgba(64,169,255,0.2); }
        .evo-type.patent { color: #73d13d; background: rgba(115,209,61,0.1); border: 1px solid rgba(115,209,61,0.2); }
        .evo-type.news { color: #ffa940; background: rgba(255,169,64,0.1); border: 1px solid rgba(255,169,64,0.2); }
        .evo-type.policy { color: #b37feb; background: rgba(179,127,235,0.1); border: 1px solid rgba(179,127,235,0.2); }
        .evo-title { font-size: 13px; line-height: 1.7; color: #b0c0d8; }
        .evo-param { font-size: 12px; color: #39ff14; margin-top: 4px; }

        /* 驱动力分析 */
        .drivers-summary {
            font-size: 13px;
            line-height: 1.85;
            color: #b0c0d8;
            margin: 0 0 14px;
            padding: 10px 14px;
            background: rgba(64, 169, 255, 0.06);
            border: 1px solid rgba(64, 169, 255, 0.12);
            border-radius: 8px;
        }
        .drivers-group { margin-bottom: 16px; }
        .drivers-group:last-child { margin-bottom: 0; }
        .drivers-group-title {
            font-size: 14px;
            font-weight: 600;
            color: #40a9ff;
            margin-bottom: 8px;
        }
        .drivers-items { margin: 0; padding-left: 20px; }
        .drivers-items li {
            font-size: 13px;
            line-height: 1.8;
            color: #9fb0cc;
            margin-bottom: 12px;
        }
        .drivers-items strong { color: #e0e6ed; }
        .driver-text { color: #9fb0cc; }

        /* 技术应用分析 */
        .app-sub { margin-bottom: 16px; }
        .app-sub:last-child { margin-bottom: 0; }
        .app-sub-title { font-size: 13px; font-weight: 600; color: #40a9ff; margin-bottom: 8px; }
        .app-list { margin: 0; padding-left: 18px; }
        .app-list li { font-size: 13px; line-height: 1.8; color: #9fb0cc; margin-bottom: 6px; }
        .app-list strong { color: #e0e6ed; }

        /* 技术扩散速度 */
        .diff-list { display: flex; flex-direction: column; gap: 16px; }
        .diff-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(64, 169, 255, 0.1);
            border-radius: 8px;
            padding: 12px 14px;
        }
        .diff-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .diff-scene { font-size: 14px; font-weight: 600; color: #e0e6ed; }
        .diff-level { font-size: 13px; font-weight: 700; }
        .diff-bar { height: 8px; background: rgba(255, 255, 255, 0.06); border-radius: 4px; overflow: hidden; }
        .diff-bar-inner { height: 100%; border-radius: 4px; transition: width 0.4s; }
        .diff-bottleneck { font-size: 12px; line-height: 1.7; color: #9fb0cc; margin-top: 8px; }

        /* 技术全球分布（世界地图区块热力） */
        .world-map { width: 100%; height: 390px; background: rgba(0, 0, 0, 0.2); border-radius: 10px; }
        .heat-legend { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; font-size: 12px; color: #8896b3; margin-top: 12px; }
        .hl-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin: 0 3px 0 10px; }
        .heat-notes { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 14px; }
        .heat-note { font-size: 12px; line-height: 1.6; }
        .heat-note-name { color: #e0e6ed; font-weight: 600; margin-right: 6px; }
        .heat-note-text { color: #8896b3; }
        @media (max-width: 768px) { .heat-notes { grid-template-columns: 1fr; } }

        /* 扩散速度与采用率 */
        .ad-block { margin-bottom: 14px; }
        .ad-block:last-child { margin-bottom: 0; }
        .ad-label { font-size: 13px; font-weight: 600; color: #40a9ff; margin-bottom: 6px; }
        .ad-text { font-size: 13px; line-height: 1.8; color: #9fb0cc; }
        .ad-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .ad-tag {
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 4px;
            color: #ff7875;
            background: rgba(255, 77, 79, 0.08);
            border: 1px solid rgba(255, 77, 79, 0.18);
        }
        .ad-bn-list { display: flex; flex-direction: column; gap: 12px; }
        .ad-bn-item {
            background: rgba(255, 77, 79, 0.05);
            border: 1px solid rgba(255, 77, 79, 0.14);
            border-left: 3px solid #ff4d4f;
            border-radius: 8px;
            padding: 10px 14px;
        }
        .ad-bn-title { font-size: 13px; font-weight: 600; color: #ff9c96; margin-bottom: 5px; }
        .ad-bn-reason { font-size: 13px; line-height: 1.8; color: #9fb0cc; }

        /* 未来趋势预测 */
        .fc-summary {
            font-size: 13px;
            line-height: 1.85;
            color: #b0c0d8;
            margin: 0 0 18px;
            padding: 12px 14px;
            background: rgba(64, 169, 255, 0.06);
            border: 1px solid rgba(64, 169, 255, 0.12);
            border-radius: 8px;
        }
        .fc-timeline { padding-left: 6px; margin-bottom: 16px; }
        .fc-item {
            position: relative;
            padding-left: 22px;
            padding-bottom: 18px;
            border-left: 2px solid rgba(64, 169, 255, 0.18);
        }
        .fc-item:last-child { border-left-color: transparent; padding-bottom: 0; }
        .fc-dot {
            position: absolute;
            left: -8px;
            top: 2px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid #0a162d;
            background: #40a9ff;
        }
        .fc-dot.short { background: #39ff14; }
        .fc-dot.mid { background: #ffa940; }
        .fc-dot.long { background: #b37feb; }
        .fc-head { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 6px; }
        .fc-term { font-size: 11px; padding: 1px 8px; border-radius: 4px; }
        .fc-term.short { color: #39ff14; background: rgba(57,255,20,0.1); border: 1px solid rgba(57,255,20,0.2); }
        .fc-term.mid { color: #ffa940; background: rgba(255,169,64,0.1); border: 1px solid rgba(255,169,64,0.2); }
        .fc-term.long { color: #b37feb; background: rgba(179,127,235,0.1); border: 1px solid rgba(179,127,235,0.2); }
        .fc-title { font-size: 15px; font-weight: 600; color: #e0e6ed; }
        .fc-period { font-size: 12px; color: #8896b3; }
        .fc-desc { font-size: 13px; line-height: 1.85; color: #9fb0cc; }
        .fc-extra {
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(64, 169, 255, 0.1);
            border-radius: 8px;
            padding: 12px 14px;
            margin-top: 10px;
        }
        .fc-extra-label { flex-shrink: 0; font-size: 13px; font-weight: 600; color: #40a9ff; }
        .fc-extra-text { font-size: 13px; line-height: 1.8; color: #9fb0cc; }

        /* 机构竞争力图谱 */
        .ls-top {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            align-items: center;
            margin-bottom: 18px;
        }
        .ls-chart {
            background: rgba(0, 0, 0, 0.18);
            border-radius: 10px;
            padding: 12px;
        }
        .inst-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .inst-table th {
            text-align: left;
            font-weight: 600;
            color: #8896b3;
            padding: 8px 10px;
            border-bottom: 1px solid rgba(64, 169, 255, 0.18);
            white-space: nowrap;
        }
        .inst-table td {
            padding: 8px 10px;
            color: #b0c0d8;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .inst-table tr:hover td { background: rgba(64, 169, 255, 0.04); }
        .inst-name { color: #e0e6ed; font-weight: 600; }
        .inst-region {
            font-size: 11px;
            padding: 1px 8px;
            border-radius: 4px;
        }
        .inst-region.domestic { color: #40a9ff; background: rgba(64, 169, 255, 0.1); border: 1px solid rgba(64, 169, 255, 0.2); }
        .inst-region.foreign { color: #ffa940; background: rgba(255, 169, 64, 0.1); border: 1px solid rgba(255, 169, 64, 0.2); }
        .ls-narrative { display: flex; flex-direction: column; gap: 12px; }
        .ls-summary {
            background: linear-gradient(135deg, rgba(64, 169, 255, 0.1), rgba(64, 169, 255, 0.02));
            border: 1px solid rgba(64, 169, 255, 0.2);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 18px;
        }
        .ls-summary-title { font-size: 14px; font-weight: 600; color: #40a9ff; margin-bottom: 8px; }
        .ls-summary-text { font-size: 13px; line-height: 1.95; color: #c0cee0; }
        .ls-summary-text strong { color: #fff; font-weight: 600; }
        .ls-narr-block {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(64, 169, 255, 0.1);
            border-left: 3px solid #40a9ff;
            border-radius: 8px;
            padding: 12px 14px;
        }
        .ls-narr-title { font-size: 13px; font-weight: 600; color: #40a9ff; margin-bottom: 6px; }
        .ls-narr-text { font-size: 13px; line-height: 1.8; color: #9fb0cc; }

        /* 行业观点 */
        .iv-list { display: flex; flex-direction: column; gap: 12px; }
        .iv-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(64, 169, 255, 0.1);
            border-radius: 8px;
            padding: 12px 14px;
        }
        .iv-head { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .iv-tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; white-space: nowrap; }
        .iv-tag.forecast { color: #40a9ff; background: rgba(64, 169, 255, 0.1); border: 1px solid rgba(64, 169, 255, 0.2); }
        .iv-tag.trend { color: #39ff14; background: rgba(57, 255, 20, 0.08); border: 1px solid rgba(57, 255, 20, 0.18); }
        .iv-tag.risk { color: #ff7875; background: rgba(255, 77, 79, 0.08); border: 1px solid rgba(255, 77, 79, 0.18); }
        .iv-tag.industry { color: #b37feb; background: rgba(179, 127, 235, 0.1); border: 1px solid rgba(179, 127, 235, 0.2); }
        .iv-src { font-size: 13px; font-weight: 600; color: #c8d4e8; }
        .iv-text { font-size: 13px; line-height: 1.8; color: #9fb0cc; }
        .driver-source { margin-top: 5px; }
        .driver-source summary {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            color: #40a9ff;
            font-size: 12px;
            list-style: none;
            user-select: none;
        }
        .driver-source summary::-webkit-details-marker { display: none; }
        .driver-source summary:hover { text-decoration: underline; }
        .driver-source-body {
            margin-top: 6px;
            font-size: 12px;
            color: #8896b3;
            line-height: 1.7;
            background: rgba(64, 169, 255, 0.06);
            border: 1px solid rgba(64, 169, 255, 0.12);
            border-radius: 6px;
            padding: 8px 10px;
        }

        /* ===== 内容区：扁平分块，去弹窗感 ===== */
        .detail-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            align-items: start;
            margin-bottom: 20px;
        }
        .detail-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(64, 169, 255, 0.10);
            border-radius: 12px;
            padding: 18px 20px;
            margin-bottom: 20px;
        }
        .detail-body .detail-card { margin-bottom: 0; }

        /* 成对模块等高 + 内部滚动 */
        .detail-body.eq-row, .detail-body.eq-row2 { align-items: stretch; }
        .detail-body.eq-row .detail-card { height: 540px; }
        .detail-body.eq-row2 .detail-card { height: 620px; }
        .detail-body.eq-row .detail-card, .detail-body.eq-row2 .detail-card {
            display: flex; flex-direction: column; overflow: hidden;
        }
        .eq-row .detail-card-title, .eq-row2 .detail-card-title { flex-shrink: 0; }
        .eq-row .drivers-wrap, .eq-row .app-wrap, .eq-row2 .gd-wrap, .eq-row2 .ad-wrap {
            flex: 1; min-height: 0; overflow-y: auto; padding-right: 4px;
        }
        .eq-row .drivers-wrap::-webkit-scrollbar, .eq-row .app-wrap::-webkit-scrollbar,
        .eq-row2 .gd-wrap::-webkit-scrollbar, .eq-row2 .ad-wrap::-webkit-scrollbar { width: 6px; }
        .eq-row .drivers-wrap::-webkit-scrollbar-thumb, .eq-row .app-wrap::-webkit-scrollbar-thumb,
        .eq-row2 .gd-wrap::-webkit-scrollbar-thumb, .eq-row2 .ad-wrap::-webkit-scrollbar-thumb { background: rgba(64,169,255,0.25); border-radius: 3px; }
        .detail-card-title {
            font-size: 14px;
            font-weight: 600;
            color: #40a9ff;
            margin-bottom: 14px;
            padding-left: 10px;
            border-left: 3px solid #40a9ff;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tech-detail-metrics { display: flex; flex-wrap: wrap; gap: 10px; }
        .tech-detail-metrics .tech-detail-metric {
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 6px;
            background: rgba(64, 169, 255, 0.08);
            color: #40a9ff;
            border: 1px solid rgba(64, 169, 255, 0.15);
        }

        .tech-detail-advice {
            background: rgba(57, 255, 20, 0.05);
            border: 1px solid rgba(57, 255, 20, 0.12);
            border-radius: 8px;
            padding: 14px;
            font-size: 13px;
            color: #b0c0d8;
            line-height: 1.7;
        }
        .tech-detail-advice strong { color: #39ff14; }
        .tech-detail-advice ul { margin: 0; padding-left: 18px; }

        .tech-detail-players ul { margin: 0; padding-left: 4px; list-style: none; }
        .tech-detail-players li {
            font-size: 13px;
            color: #b0c0d8;
            line-height: 1.9;
            position: relative;
            padding-left: 16px;
        }
        .tech-detail-players li::before {

        .tech-detail-risks-impact { display: flex; flex-direction: column; gap: 12px; }
        .tech-detail-rich { display: flex; flex-direction: column; gap: 12px; }
        .tech-detail-rich-block {

        .tech-detail-rich-title {
            font-size: 13px;

        .tech-detail-rich-content { font-size: 13px; color: #b0c0d8; line-height: 1.7; }
        .tech-detail-rich-list { margin: 0; padding-left: 18px; }
        .tech-detail-rich-list li { font-size: 13px; color: #b0c0d8; line-height: 1.7; margin-bottom: 4px; }

        .tech-detail-radar {
            width: 100%;

        .tech-detail-risk-item {

        .detail-empty { text-align: center; padding: 80px 20px; color: #8896b3; }
        .detail-empty .icon { font-size: 48px; margin-bottom: 16px; }

        /* 相关数据源 Tab */
        .ds-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 12px; flex-wrap: wrap; }
        .ds-view-toggle { display: flex; gap: 6px; }
        .ds-view-btn {
            font-size: 13px;
            padding: 5px 12px;

        }

        .ds-view-btn.active { background: rgba(64, 169, 255, 0.16); border-color: rgba(64, 169, 255, 0.45); color: #40a9ff; }
        .ds-river { width: 100%; height: 430px; }
        .ds-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
        .ds-tab {
            font-size: 13px;
            padding: 6px 12px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(64, 169, 255, 0.15);
            color: #b0c0d8;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;

        .ds-tab:hover { background: rgba(64, 169, 255, 0.1); }
        .ds-tab.active { background: rgba(64, 169, 255, 0.16); border-color: rgba(64, 169, 255, 0.45); color: #40a9ff; }
        .ds-count { font-size: 11px; padding: 0 7px; border-radius: 9px; background: rgba(64, 169, 255, 0.16); color: #40a9ff; }
        .ds-tab.active .ds-count { background: rgba(64, 169, 255, 0.3); }
        .ds-table-wrap { overflow-x: auto; }
        .ds-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .ds-table th { text-align: left; font-weight: 600; color: #8896b3; padding: 9px 10px; border-bottom: 1px solid rgba(64, 169, 255, 0.18); white-space: nowrap; }
        .ds-table td { padding: 9px 10px; color: #b0c0d8; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .ds-table tr:hover td { background: rgba(64, 169, 255, 0.04); }
        .ds-empty { color: #8896b3; padding: 24px; text-align: center; }
        /* 专利卡片 */
        .pt-list { display: flex; flex-direction: column; gap: 12px; }
        .pt-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(64, 169, 255, 0.12);
            border-radius: 10px;
            padding: 14px 16px;
        }
        .pt-title { font-size: 15px; font-weight: 600; color: #e0e6ed; margin-bottom: 8px; }
        .pt-inventors { font-size: 13px; color: #8896b3; margin-bottom: 8px; }
        .pt-person { color: #b0c0d8; margin-right: 4px; }
        .pt-company { color: #8896b3; }
        .pt-meta { display: flex; flex-wrap: wrap; gap: 8px 26px; font-size: 13px; color: #b0c0d8; }
        .pt-meta b { color: #8896b3; font-weight: 500; }

        @media (max-width: 900px) {
            .detail-banner { flex-direction: column; }
            .banner-side { width: 100%; align-items: flex-start; }
            .ls-top { grid-template-columns: 1fr; }
        }
        @media (max-width: 768px) {
            .detail-body { grid-template-columns: 1fr; }
            .banner-meta { gap: 12px 20px; }
        }

</head>
<body>
    <div class="detail-page">
        <div class="detail-filters" id="detailFilters" style="display:none;">
            <div class="filter-group">
                <label>一级领域</label>
                <select class="filter-select" id="lv1"></select>
            </div>
            <span class="filter-sep">›</span>
            <div class="filter-group">
                <label>二级领域</label>
                <select class="filter-select" id="lv2"></select>
            </div>
            <span class="filter-sep">›</span>
            <div class="filter-group">
                <label>三级技术</label>
                <select class="filter-select" id="lv3"></select>
            </div>
        </div>

        <div id="detailRoot"></div>
    </div>

    <script>
        let BUNDLE = null;      // { selectedName, taxonomy, payloads }
        let currentName = null;

        function renderEmpty() {
            document.getElementById('detailFilters').style.display = 'none';
            document.getElementById('detailRoot').innerHTML = `
                <div class="detail-empty">
                    <div class="icon">📄</div>
                    <div class="hint">尚未选择技术。<br>请前往「技术扫描」页，点击任意技术卡片查看其详情。</div>
                </div>
            `;
        }

        function fillSelect(sel, options, selected) {
            sel.innerHTML = options.map(o => `<option value="${o}"${o === selected ? ' selected' : ''}>${o}</option>`).join('');
        }

        // 根据技术名定位其一二级路径，回显三个下拉框
        function findPath(name) {
            const tax = BUNDLE.taxonomy;
            for (const p of Object.keys(tax)) {
                for (const s of Object.keys(tax[p])) {
                    if (tax[p][s].includes(name)) return { primary: p, secondary: s };
                }
            }
            return null;
        }

        function syncFilters(name) {
            const tax = BUNDLE.taxonomy;
            const path = findPath(name) || {};
            const lv1 = document.getElementById('lv1');
            const lv2 = document.getElementById('lv2');
            const lv3 = document.getElementById('lv3');

            fillSelect(lv1, Object.keys(tax), path.primary);
            fillSelect(lv2, Object.keys(tax[path.primary] || {}), path.secondary);
            fillSelect(lv3, (tax[path.primary] && tax[path.primary][path.secondary]) || [], name);
        }

        function showTech(name) {
            const payload = BUNDLE.payloads[name];
            if (!payload) return;
            currentName = name;
            renderDetail(payload);
            syncFilters(name);
            initWorldMap(payload.countries);
            initDataSources(payload.dataSourcesModule);
            document.title = `${payload.name} - 技术详情`;
        }

        // ===== 相关数据源 Tab =====
        function initDataSources(mod) {
            window.__dataSrc = mod;
            if (dsRiverInst) { dsRiverInst.dispose(); dsRiverInst = null; }
            dsView = 'list';
            if (!mod || !mod.types || !mod.types.length) return;
            const di = mod.types.findIndex(t => t.key === 'patent');
            showDataTab(di >= 0 ? di : 0);
        }
        // 列表 / 趋势图 视图切换
        let dsView = 'list';
        function setDataView(v) {
            dsView = v;
            document.querySelectorAll('.ds-view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === v));
            const lv = document.getElementById('dsListView'), cv = document.getElementById('dsChartView');
            if (!lv || !cv) return;
            lv.style.display = v === 'list' ? '' : 'none';
            cv.style.display = v === 'chart' ? '' : 'none';
            if (v === 'chart') initRiverChart();
        }
        window.setDataView = setDataView;

        // ===== 技术发展趋势预测（堆叠面积/河流图，移植自态势感知） =====
        let dsRiverInst = null;
        const RIVER_CATS = [
            { name: '智库报告', color: '#2E86AB' }, { name: '资讯', color: '#1B5299' }, { name: '政策', color: '#00A8E8' },
            { name: '管控清单', color: '#D64045' }, { name: '专利', color: '#1DD3B0' }, { name: '项目', color: '#8B5CF6' },
            { name: '论文', color: '#F9A620' }, { name: '奖项', color: '#F86624' }, { name: '机构', color: '#3A86FF' }, { name: '人才', color: '#06D6A0' }
        ];
        const RIVER_YEARS = ['2018', '2019', '2020', '2021', '2022', '2023', '2024', '2025', '2026', '2027', '2028', '2029'];
        const RIVER_HISTORY = {
            '智库报告': [120, 145, 180, 220, 265, 310, 358, 420], '资讯': [850, 1120, 1480, 1850, 2300, 2800, 3350, 3900],
            '政策': [45, 58, 72, 88, 105, 128, 155, 180], '管控清单': [12, 18, 25, 32, 42, 55, 68, 82],
            '专利': [320, 410, 520, 680, 850, 1050, 1280, 1520], '项目': [85, 110, 145, 190, 240, 300, 370, 450],
            '论文': [560, 720, 910, 1150, 1420, 1750, 2100, 2480], '奖项': [28, 35, 45, 58, 72, 88, 108, 130],
            '机构': [65, 82, 105, 135, 170, 210, 255, 310], '人才': [150, 195, 250, 320, 400, 490, 590, 700]
        };
        const RIVER_PREDICT = {
            '智库报告': [485, 560, 640, 730], '资讯': [4500, 5200, 6000, 6900], '政策': [210, 245, 285, 330],
            '管控清单': [98, 118, 142, 170], '专利': [1780, 2080, 2420, 2800], '项目': [520, 605, 700, 810],
            '论文': [2850, 3280, 3760, 4300], '奖项': [155, 185, 220, 260], '机构': [365, 430, 505, 590], '人才': [820, 960, 1120, 1300]
        };
        function hexToRgba(hex, a) { return `rgba(${parseInt(hex.slice(1, 3), 16)},${parseInt(hex.slice(3, 5), 16)},${parseInt(hex.slice(5, 7), 16)},${a})`; }
        function initRiverChart() {
            const dom = document.getElementById('dsRiverChart');
            if (!dom || typeof echarts === 'undefined') return;
            if (dsRiverInst) { dsRiverInst.resize(); return; }
            dsRiverInst = echarts.init(dom);
            const series = RIVER_CATS.map(cat => {
                const data = [];
                RIVER_HISTORY[cat.name].forEach(v => data.push({ value: v }));
                RIVER_PREDICT[cat.name].forEach(v => data.push({ value: v, itemStyle: { color: 'transparent', borderColor: cat.color, borderWidth: 1.5 }, symbol: 'emptyCircle', symbolSize: 4 }));
                return {
                    name: cat.name, type: 'line', stack: 'River', smooth: 0.5, showSymbol: false,
                    lineStyle: { width: 0 }, itemStyle: { color: cat.color },
                    areaStyle: { opacity: 0.55, color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: cat.color }, { offset: 1, color: hexToRgba(cat.color, 0.15) }]) },
                    emphasis: { focus: 'series', areaStyle: { opacity: 0.78 } }, data
                };
            });
            series[0].markArea = { silent: true, data: [[{ xAxis: '2025', itemStyle: { color: 'rgba(255,159,67,0.04)' }, label: { show: true, position: 'insideTopRight', offset: [0, 4], color: 'rgba(255,159,67,0.6)', fontSize: 11, formatter: '预测区间' } }, { xAxis: '2029' }]] };
            series[0].markLine = { silent: true, symbol: 'none', lineStyle: { color: 'rgba(255,159,67,0.4)', type: 'dashed', width: 1 }, label: { show: true, position: 'end', formatter: '预测起点', color: '#ff9f43', fontSize: 10, distance: [0, -18] }, data: [{ xAxis: '2025' }] };
            dsRiverInst.setOption({
                backgroundColor: 'transparent',
                title: { text: '技术发展趋势预测', subtext: '基于多源数据融合分析 | 2026-2029 为趋势预测', left: 0, top: 0, textStyle: { color: '#40a9ff', fontSize: 15, fontWeight: 600 }, subtextStyle: { color: 'rgba(255,255,255,0.45)', fontSize: 11 } },
                tooltip: {
                    trigger: 'axis', axisPointer: { type: 'cross', crossStyle: { color: 'rgba(255,255,255,0.15)' } },
                    backgroundColor: 'rgba(6,26,61,0.95)', borderColor: 'rgba(0,212,255,0.25)', borderWidth: 1, textStyle: { color: '#fff', fontSize: 12 },
                    formatter: params => {
                        const year = params[0].axisValue;
                        const isP = ['2026', '2027', '2028', '2029'].includes(year);
                        let total = 0; params.forEach(p => { if (p.value != null) total += Number(p.value); });
                        let html = `<div style="font-weight:600;margin-bottom:6px;color:#00d4ff;">${year}年 ${isP ? '<span style="color:#ff9f43;font-size:12px;">(预测)</span>' : ''}</div><div style="margin-bottom:6px;color:rgba(255,255,255,0.5);font-size:11px;">数据总量: ${total.toLocaleString()}</div><table style="width:100%;border-collapse:collapse;">`;
                        params.forEach(p => { html += `<tr><td style="padding:2px 0;"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${p.color};margin-right:6px;"></span>${p.seriesName}</td><td style="padding:2px 0 2px 16px;text-align:right;">${Number(p.value).toLocaleString()}</td></tr>`; });
                        return html + '</table>';
                    }
                },
                legend: { data: RIVER_CATS.map(c => c.name), top: 0, right: 0, icon: 'roundRect', itemWidth: 12, itemHeight: 8, itemGap: 10, textStyle: { color: 'rgba(255,255,255,0.7)', fontSize: 11 }, pageIconColor: '#00d4ff', pageTextStyle: { color: 'rgba(255,255,255,0.5)' } },
                grid: { left: '2%', right: '3%', bottom: '6%', top: '20%', containLabel: true },
                xAxis: { type: 'category', boundaryGap: false, data: RIVER_YEARS, axisLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } }, axisTick: { show: false }, axisLabel: { color: v => ['2026', '2027', '2028', '2029'].includes(v) ? '#ff9f43' : 'rgba(255,255,255,0.6)', fontSize: 11, margin: 12 }, splitLine: { show: false } },
                yAxis: { type: 'value', axisLine: { show: false }, axisTick: { show: false }, axisLabel: { color: 'rgba(255,255,255,0.5)', fontSize: 11, formatter: v => v >= 1000 ? (v / 1000).toFixed(1) + 'k' : v }, splitLine: { lineStyle: { color: 'rgba(255,255,255,0.06)', type: 'dashed' } } },
                series, animationDuration: 1500, animationEasing: 'cubicOut'
            });
        }
        function dsEscape(v) { return v == null ? '—' : String(v); }
        function renderPatentCards(rows) {
            return `<div class="pt-list">${rows.map(r => `
                <div class="pt-card">
                    <div class="pt-title">${dsEscape(r.title)}</div>
                    <div class="pt-inventors">发明人：${(r.inventors || []).map(iv => `<span class="pt-person">👤 ${iv.name}<span class="pt-company">(${iv.company})</span></span>`).join('、') || '—'}</div>
                    <div class="pt-meta">
                        <span><b>申请人：</b>${dsEscape(r.applicant)}</span>
                        <span><b>申请时间：</b>${dsEscape(r.applyDate)}</span>
                        <span><b>专利类型：</b>${dsEscape(r.type)}</span>
                        <span><b>专利权状态：</b><span class="pt-status">${dsEscape(r.status)}</span></span>
                        <span><b>公开时间：</b>${dsEscape(r.pubDate)}</span>
                    </div>
                    <div class="pt-meta pt-meta-sub">
                        <span><b>公开(公告)号：</b>${dsEscape(r.pubNo)}</span>
                        <span><b>申请号：</b>${dsEscape(r.appNo)}</span>
                    </div>
                </div>`).join('')}</div>`;
        }
        function showDataTab(i) {
            const mod = window.__dataSrc;
            if (!mod) return;
            const t = mod.types[i];
            document.querySelectorAll('.ds-tab').forEach((b, idx) => b.classList.toggle('active', idx === i));
            const wrap = document.getElementById('dsTableWrap');
            if (!wrap) return;
            if (!t || !t.rows || !t.rows.length) { wrap.innerHTML = '<div class="ds-empty">暂无数据</div>'; return; }
            if (t.render === 'patent') { wrap.innerHTML = renderPatentCards(t.rows); return; }
            wrap.innerHTML = `<table class="ds-table"><thead><tr>${t.columns.map(c => `<th>${c.label}</th>`).join('')}</tr></thead><tbody>${t.rows.map(r => `<tr>${t.columns.map(c => `<td>${dsEscape(r[c.key])}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
        }
        window.showDataTab = showDataTab;

        // ===== 技术全球分布：世界地图区块热力（颜色越深=扩散越快） =====
        let worldChart = null;
        let worldJsonPromise = null;
        const CN2EN = { '中国': 'China', '美国': 'United States', '日本': 'Japan', '韩国': 'Korea', '德国': 'Germany', '英国': 'United Kingdom', '法国': 'France', '印度': 'India', '俄罗斯': 'Russia', '加拿大': 'Canada', '欧洲': 'Germany' };
        function loadWorld() {
            if (worldJsonPromise) return worldJsonPromise;
            worldJsonPromise = fetch('https://fastly.jsdelivr.net/npm/echarts@4.9.0/map/json/world.json')
                .then(r => r.json()).then(j => { echarts.registerMap('world', j); return true; });
            return worldJsonPromise;
        }
        function initWorldMap(countries) {
            const dom = document.getElementById('worldMap');
            if (!dom || !countries || !countries.length) return;
            if (typeof echarts === 'undefined') { dom.innerHTML = '<div style="color:#8896b3;padding:24px;text-align:center;">地图组件加载失败（需联网）</div>'; return; }
            loadWorld().then(() => {
                if (worldChart) { worldChart.dispose(); worldChart = null; }
                worldChart = echarts.init(dom);
                const data = countries.map(c => ({
                    name: CN2EN[c.name] || c.name, value: c.level, _cn: c.name, _note: c.note || '',
                    label: { show: true, color: '#fff', fontSize: 12, fontWeight: 'bold', textShadowColor: '#000', textShadowBlur: 3, formatter: () => c.name }
                }));
                const vals = countries.map(c => c.level);
                worldChart.setOption({
                    backgroundColor: 'transparent',
                    tooltip: {
                        trigger: 'item',
                        formatter: pr => { const d = data.find(x => x.name === pr.name); return d ? `${d._cn} · 扩散速度 ${d.value}${d._note ? '<br/>' + d._note : ''}` : pr.name; }
                    },
                    visualMap: {
                        min: Math.min(...vals, 40), max: Math.max(...vals, 100),
                        text: ['快', '慢'], calculable: true, left: 12, bottom: 12,
                        textStyle: { color: '#8896b3' },
                        inRange: { color: ['#fde68a', '#fbbf24', '#f97316', '#ef4444', '#b91c1c'] }
                    },
                    series: [{
                        type: 'map', map: 'world', roam: false, zoom: 1.2, center: [80, 35],
                        itemStyle: { areaColor: 'rgba(18,50,90,0.35)', borderColor: 'rgba(0,212,255,0.18)', borderWidth: 0.6 },
                        emphasis: { itemStyle: { areaColor: '#00a8e8' }, label: { show: false } },
                        label: { show: false },
                        data
                    }]
                });
            }).catch(() => { dom.innerHTML = '<div style="color:#8896b3;padding:24px;text-align:center;">地图数据加载失败（需联网）</div>'; });
        }
        window.addEventListener('resize', () => { if (worldChart) worldChart.resize(); if (dsRiverInst) dsRiverInst.resize(); });

        function bindFilters() {
            const lv1 = document.getElementById('lv1');
            const lv2 = document.getElementById('lv2');
            const lv3 = document.getElementById('lv3');
            const tax = BUNDLE.taxonomy;

            lv1.addEventListener('change', () => {
                const p = lv1.value;
                const sec = Object.keys(tax[p] || {});
                fillSelect(lv2, sec, sec[0]);
                const third = (tax[p][sec[0]]) || [];
                fillSelect(lv3, third, third[0]);
                if (third[0]) showTech(third[0]);
            });
            lv2.addEventListener('change', () => {
                const p = lv1.value, s = lv2.value;
                const third = (tax[p][s]) || [];
                fillSelect(lv3, third, third[0]);
                if (third[0]) showTech(third[0]);
            });
            lv3.addEventListener('change', () => {
                if (lv3.value) showTech(lv3.value);
            });
        }

        function renderDetail(p) {
            document.getElementById('detailFilters').style.display = 'flex';
            const introHtml = p.intro ? `<p>${p.intro}</p>` : '';
            document.getElementById('detailRoot').innerHTML = `
                <div class="detail-banner">
                    <div class="banner-main">
                        <div class="banner-top">
                            <div class="banner-icon">${p.iconSrc ? `<img src="${p.iconSrc}" alt="${p.name}">` : ''}</div>
                            <div class="banner-title">${p.name || ''}</div>
                        </div>
                        <div class="banner-meta">
                            ${p.lastActive ? `<div class="meta-cell"><span class="meta-label">最近活跃时间</span><span class="meta-value">${p.lastActive}</span></div>` : ''}
                            ${p.firstSeen ? `<div class="meta-cell"><span class="meta-label">识别时间</span><span class="meta-value">${p.firstSeen}</span></div>` : ''}
                            ${p.trl ? `<div class="meta-cell"><span class="meta-label">技术成熟度</span><span class="meta-value">${p.trl}</span></div>` : ''}
                            ${p.category ? `<div class="meta-cell"><span class="meta-label">所属领域</span><span class="meta-value">${p.category}</span></div>` : ''}
                            ${p.playersInline ? `<div class="meta-cell full"><span class="meta-label">主要玩家</span><span class="meta-value">${p.playersInline}</span></div>` : ''}
                            ${p.metricsHtml ? `<div class="meta-cell full metrics"><span class="meta-label">技术关键指标</span><span class="meta-metrics">${p.metricsHtml}</span></div>` : ''}
                            ${introHtml ? `<div class="meta-cell full intro-cell"><span class="meta-label">📖 技术介绍</span><div class="banner-intro">${introHtml}</div></div>` : ''}
                        </div>
                    </div>
                    <div class="banner-side">
                        <div class="banner-score">
                            <span class="banner-score-label">综合评分 ${p.scoreTip ? `<i class="info-mark" title="${p.scoreTip}">?</i>` : ''}</span>
                            <span class="banner-score-val">${p.score}</span>
                        </div>
                        <div class="banner-radar">${p.radarSvg || ''}</div>
                    </div>
                </div>

                <div class="detail-body">
                    ${p.changeBasisHtml ? `
                    <div class="detail-card">
                        <div class="detail-card-title">📈 技术变革理由</div>
                        <div class="tech-change-list">${p.changeBasisHtml}</div>
                    </div>` : ''}
                    ${p.evolutionHtml ? `
                    <div class="detail-card">
                        <div class="detail-card-title">🧬 技术演化路径</div>
                        ${p.evolutionHtml}
                    </div>` : ''}
                </div>

                <div class="detail-body eq-row">
                    ${p.driversHtml ? `
                    <div class="detail-card">
                        <div class="detail-card-title">🚀 驱动力分析</div>
                        <div class="drivers-wrap">${p.driversHtml}</div>
                    </div>` : ''}
                    ${p.applicationHtml ? `
                    <div class="detail-card">
                        <div class="detail-card-title">🧩 技术应用分析</div>
                        <div class="app-wrap">${p.applicationHtml}</div>
                    </div>` : ''}
                </div>

                <div class="detail-body eq-row2">
                    ${p.globalDistHtml ? `
                    <div class="detail-card">
                        <div class="detail-card-title">🌍 技术全球分布</div>
                        <div class="gd-wrap">
                            <div id="worldMap" class="world-map"></div>
                            ${p.globalDistHtml}
                        </div>
                    </div>` : ''}
                    ${p.adoptionHtml ? `
                    <div class="detail-card">
                        <div class="detail-card-title">📊 技术扩散速度</div>
                        <div class="ad-wrap">${p.adoptionHtml}</div>
                    </div>` : ''}
                </div>

                ${p.landscapeHtml ? `
                <div class="detail-card">
                    <div class="detail-card-title">🗺️ 机构竞争力图谱</div>
                    <div class="landscape-wrap">${p.landscapeHtml}</div>
                </div>` : ''}

                ${p.socialHtml ? `
                <div class="detail-card">
                    <div class="detail-card-title">💬 行业观点</div>
                    <div class="social-wrap">${p.socialHtml}</div>
                </div>` : ''}

                ${p.forecastHtml ? `
                <div class="detail-card">
                    <div class="detail-card-title">🔮 未来趋势预测</div>
                    <div class="forecast-wrap">${p.forecastHtml}</div>
                </div>` : ''}

                ${p.dataSourcesModule ? `
                <div class="detail-card">
                    <div class="ds-header">
                        <div class="detail-card-title" style="margin-bottom:0;">🗂️ 相关数据源</div>
                        <div class="ds-view-toggle">
                            <button class="ds-view-btn active" data-view="list" onclick="setDataView('list')">📋 列表</button>
                            <button class="ds-view-btn" data-view="chart" onclick="setDataView('chart')">📈 趋势图</button>
                        </div>
                    </div>
                    <div id="dsListView">
                        <div class="ds-tabs">${p.dataSourcesModule.types.map((t, i) => `<button class="ds-tab" data-idx="${i}" onclick="showDataTab(${i})">${t.label}<span class="ds-count">${t.count.toLocaleString()}</span></button>`).join('')}</div>
                        <div id="dsTableWrap" class="ds-table-wrap"></div>
                    </div>
                    <div id="dsChartView" style="display:none;">
                        <div id="dsRiverChart" class="ds-river"></div>
                    </div>
                </div>` : ''}
            `;
        }

        (function init() {
            let raw = null;
            try { raw = sessionStorage.getItem('techDetailPayload'); } catch (e) {}
            if (!raw && typeof window.name === 'string' && window.name.indexOf('TECH_DETAIL:') === 0) {
                raw = window.name.slice('TECH_DETAIL:'.length);
            }

            let data = null;
            try { if (raw) data = JSON.parse(raw); } catch (e) { console.error('读取技术详情失败:', e); }

            // 兼容旧的单 payload 结构
            if (data && !data.payloads && data.name) {
                data = { selectedName: data.name, taxonomy: {}, payloads: { [data.name]: data } };
            }

            if (data && data.payloads && data.selectedName && data.payloads[data.selectedName]) {
                BUNDLE = data;
                if (Object.keys(BUNDLE.taxonomy).length) bindFilters();
                showTech(BUNDLE.selectedName);
                if (!Object.keys(BUNDLE.taxonomy).length) {
                    document.getElementById('detailFilters').style.display = 'none';
                }
            } else {
                renderEmpty();
            }
        })();
    </script>
</body>
</html>
